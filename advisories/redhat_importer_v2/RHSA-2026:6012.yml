summary: |
  A security update is now available for Red Hat JBoss Enterprise Application Platform 7.1 for Red Hat Enterprise Linux 7.

  Red Hat Product Security has rated this update as having a security impact of Important. A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed severity rating, is available for each vulnerability from the CVE link(s) in the References section.

  Red Hat JBoss Enterprise Application Platform 7 is a platform for Java applications based on the WildFly application runtime. This release of Red Hat JBoss Enterprise Application Platform 7.1.14 serves as a replacement for Red Hat JBoss Enterprise Application Platform 7.1.13, and includes bug fixes and enhancements. See the Red Hat JBoss Enterprise Application Platform 7.1.13 Release Notes for information about the most significant bug fixes and enhancements included in this release.

  Security Fix(es):

  * hibernate-core: Hibernate: Information disclosure and data deletion via second-order SQL injection (CVE-2026-0603)

  * undertow: OutOfMemory when parsing form data encoding with application/x-www-form-urlencoded (CVE-2024-3884)

  * cxf: CXF JMS Code Execution Vulnerability (CVE-2025-48913)

  For more details about the security issue(s), including the impact, a CVSS score, acknowledgments, and other related information, refer to the CVE page(s) listed in the References section.
