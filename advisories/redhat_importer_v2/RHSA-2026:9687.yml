summary: |
  An update is now available for OpenJDK.

  Red Hat Product Security has rated this update as having a security impact of Important. A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed severity rating, is available for each vulnerability from the CVE link(s) in the References section.

  The OpenJDK 17 packages provide the OpenJDK 17 Java Runtime Environment and the OpenJDK 17 Java Software Development Kit.

  This release of the Red Hat build of OpenJDK 17 (17.0.19) for portable Linux serves as a replacement for the Red Hat build of OpenJDK 17 (17.0.18) and includes security and bug fixes as well as enhancements. For further information, refer to the release notes linked to in the References section.

  Security Fix(es):

  * JDK: Enhance crypto algorithm support (CVE-2026-22007)

  * JDK: Improve Kerberos credentialing (CVE-2026-22013)

  * JDK: Enhance Path Factories Redux (CVE-2026-22016)

  * JDK: Enhance Zip file reading (CVE-2026-22018)

  * JDK: Enhance certificate chain validation (CVE-2026-22021)

  * JDK: Updating FreeType 2.14.1 (CVE-2026-23865)

  * JDK: Enhance TLS connection handling (CVE-2026-34282)

  * JDK: Enhance key generation (CVE-2026-34268)

  For more details about the security issue(s), including the impact, a CVSS score, acknowledgments, and other related information, refer to the CVE page(s) listed in the References section.
