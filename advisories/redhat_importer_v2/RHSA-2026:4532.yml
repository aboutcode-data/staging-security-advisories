summary: "An update for buildah is now available for Red Hat Enterprise Linux 9.2 Update Services\
  \ for SAP Solutions.\n\nRed Hat Product Security has rated this update as having a security\
  \ impact of Important. A Common Vulnerability Scoring System (CVSS) base score, which gives\
  \ a detailed severity rating, is available for each vulnerability from the CVE link(s) in\
  \ the References section.\n\nThe buildah package provides a tool for facilitating building\
  \ OCI container images. Among other things, buildah enables you to: Create a working container,\
  \ either from scratch or using an image as a starting point; Create an image, either from\
  \ a working container or using the instructions in a Dockerfile; Build both Docker and OCI\
  \ images. \n\nSecurity Fix(es):\n\n* runc: container escape and denial of service due to arbitrary\
  \ write gadgets and procfs write redirects (CVE-2025-52881)\n\n* golang: archive/tar: Unbounded\
  \ allocation when parsing GNU sparse map (CVE-2025-58183)\n\n* golang.org/x/crypto/ssh/agent:\
  \ golang.org/x/crypto/ssh/agent: SSH client panic due to unexpected SSH_AGENT_SUCCESS (CVE-2025-47913)\n\
  \n* github.com/sirupsen/logrus: github.com/sirupsen/logrus: Denial-of-Service due to large\
  \ single-line payload (CVE-2025-65637)\n\nFor more details about the security issue(s), including\
  \ the impact, a CVSS score, acknowledgments, and other related information, refer to the CVE\
  \ page(s) listed in the References section."
