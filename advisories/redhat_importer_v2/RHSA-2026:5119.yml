summary: |
  Updated images are now available for Red Hat OpenShift AI.

  This advisory contains the container images for Red Hat OpenShift AI 3.4.0-ea.1.

  This release is provided as Early Access (EA), offering a preview of upcoming features and functionality. It is intended for evaluation and feedback during development.

  Early Access releases are not supported and are not covered under Red Hat support agreements. They are not intended for production use.
