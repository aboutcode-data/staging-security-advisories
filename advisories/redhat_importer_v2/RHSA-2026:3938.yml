summary: "An update for nfs-utils is now available for Red Hat Enterprise Linux 8.\n\nRed Hat\
  \ Product Security has rated this update as having a security impact of Moderate. A Common\
  \ Vulnerability Scoring System (CVSS) base score, which gives a detailed severity rating,\
  \ is available for each vulnerability from the CVE link(s) in the References section.\n\n\
  The nfs-utils packages provide a daemon for the kernel Network File System (NFS) server and\
  \ related tools, which provides better performance than the traditional Linux NFS server used\
  \ by most users. These packages also contain the mount.nfs, umount.nfs, and showmount programs.\
  \ \n\nSecurity Fix(es):\n\n* nfs-utils: rpc.mountd in the nfs-utils privilege escalation (CVE-2025-12801)\n\
  \nFor more details about the security issue(s), including the impact, a CVSS score, acknowledgments,\
  \ and other related information, refer to the CVE page(s) listed in the References section."
