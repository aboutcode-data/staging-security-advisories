summary: "Red Hat build of Apache Camel 4.14.4 for Spring Boot patch release and security update\
  \ is now available.\n\nRed Hat Product Security has rated this update as having a security\
  \ impact of\nImportant. A Common Vulnerability Scoring System (CVSS) base score, which gives\n\
  a detailed severity rating, is available for each vulnerability from the CVE\nlink(s) in the\
  \ References section.\n\nRed Hat build of Apache Camel 4.14.4 for Spring Boot patch release\
  \ and security update is now available.\n\nThe purpose of this text-only errata is to inform\
  \ you about the security issues fixed.\n\nSecurity Fix(es):\n\n* undertow-core: Undertow HTTP\
  \ Server Fails to Reject Malformed Host Headers Leading to Potential Cache Poisoning and SSRF\
  \ (CVE-2025-12543)\n\n* vertx-core: static handler component cache can be manipulated to deny\
  \ the access to static files (CVE-2026-1002)\n   \n* mchange-commons-java: mchange-commons-java:\
  \ Arbitrary code execution via JNDI dereferencing of crafted objects (CVE-2026-27727)\n\n\
  * com.mchange/c3p0: c3p0: Arbitrary Code Execution via deserialization of crafted objects\
  \ (CVE-2026-27830)"
