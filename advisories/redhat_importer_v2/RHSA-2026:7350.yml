summary: "An update for the nodejs:24 module is now available for Red Hat Enterprise Linux 9.\n\
  \nRed Hat Product Security has rated this update as having a security impact of Important.\
  \ A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed severity\
  \ rating, is available for each vulnerability from the CVE link(s) in the References section.\n\
  \nNode.js is a software development platform for building fast and scalable network applications\
  \ in the JavaScript programming language. \n\nSecurity Fix(es):\n\n* nodejs: Nodejs denial\
  \ of service (CVE-2026-21637)\n\n* brace-expansion: brace-expansion: Denial of Service via\
  \ unbounded brace range expansion (CVE-2026-25547)\n\n* minimatch: minimatch: Denial of Service\
  \ via specially crafted glob patterns (CVE-2026-26996)\n\n* undici: Undici: Denial of Service\
  \ due to uncontrolled resource consumption (CVE-2026-2581)\n\n* undici: Undici: HTTP header\
  \ injection and request smuggling vulnerability (CVE-2026-1527)\n\n* undici: undici: Denial\
  \ of Service via unbounded memory consumption during WebSocket permessage-deflate decompression\
  \ (CVE-2026-1526)\n\n* undici: Undici: Denial of Service via invalid WebSocket permessage-deflate\
  \ extension parameter (CVE-2026-2229)\n\n* undici: Undici: HTTP Request Smuggling and Denial\
  \ of Service due to duplicate Content-Length headers (CVE-2026-1525)\n\n* undici: undici:\
  \ Denial of Service via crafted WebSocket frame with large length (CVE-2026-1528)\n\n* nghttp2:\
  \ nghttp2: Denial of Service via malformed HTTP/2 frames after session termination (CVE-2026-27135)\n\
  \n* Node.js: Node.js: Denial of Service via malformed Internationalized Domain Name processing\
  \ (CVE-2026-21712)\n\n* Node.js: Node.js: Denial of Service due to crafted HTTP `__proto__`\
  \ header (CVE-2026-21710)\n\n* Node.js: Node.js: Information disclosure due to `fs.realpathSync.native()`\
  \ bypassing filesystem read restrictions (CVE-2026-21715)\n\n* nodejs: Node.js: Permission\
  \ bypass allows unauthorized modification of file permissions and ownership via incomplete\
  \ security fix. (CVE-2026-21716)\n\n* Node.js: Node.js: Unauthorized inter-process communication\
  \ due to missing Unix Domain Socket permission checks (CVE-2026-21711)\n\n* Node.js: Node.js:\
  \ Information disclosure via timing oracle in HMAC verification (CVE-2026-21713)\n\n* Node.js:\
  \ Node.js: Memory leak and Denial of Service via crafted HTTP/2 WINDOW_UPDATE frames (CVE-2026-21714)\n\
  \n* nodejs: v8: Node.js: Denial of Service via V8 string hashing mechanism due to predictable\
  \ hash collisions (CVE-2026-21717)\n\nFor more details about the security issue(s), including\
  \ the impact, a CVSS score, acknowledgments, and other related information, refer to the CVE\
  \ page(s) listed in the References section."
