summary: |
  An update for Red Hat Build of Apache Camel 4.14 for Quarkus 3.27 update is now available (RHBQ 3.27.3.SP1).
  The purpose of this text-only errata is to inform you about the enhancements that improve your developer experience and ensure the security and stability of your products.
  Red Hat Product Security has rated this update as having a security impact of Important.

  An update for Red Hat Build of Apache Camel 4.14 for Quarkus 3.27 update is now available (RHBQ 3.27.3.SP1).
          The purpose of this text-only errata is to inform you about the enhancements that improve your developer experience and ensure the security and stability of your products:
          *  bcprov-jdk18on: LDAP injection vulnerability in LDAPStoreHelper.java [rhboac-camel-quarkus-3] (CVE-2026-0636)
          *  bcpg-jdk18on: unbounded PGP AEAD chunk size leads to pre-auth resource exhaustion [rhboac-camel-quarkus-3] (CVE-2026-3505)
          *  bcpkix-jdk18on: PKIX draft CompositeVerifier accepts empty signature sequence as valid [rhboac-camel-quarkus-3] (CVE-2026-5588)
          *  bcprov-jdk18on: GOSTCTR implementation unable to process more than 255 blocks correctly [rhboac-camel-quarkus-3] (CVE-2025-14813)
          *  kafka-clients: Apache Kafka Clients: Information disclosure and data corruption due to race condition in producer buffer management [rhboac-camel-quarkus-3] (CVE-2026-35554)
          *  quarkus-vertx-http: io.quarkus:quarkus-vertx-http: Authorization bypass via semicolons in HTTP requests [rhboac-camel-quarkus-3] (CVE-2026-39852)
