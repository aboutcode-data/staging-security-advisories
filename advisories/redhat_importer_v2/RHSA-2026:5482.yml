  JBoss EAP XP 6.0.3.GA release on the EAP 8.1 base. See references for release notes.

  This is a cumulative patch release zip for the JBoss EAP XP 6.0.3 runtime distribution for use with EAP 8.1.5.

  Security Fix(es):

  * vertx-core: static handler component cache can be manipulated to deny the access to static files [eapxp-6] (CVE-2026-1002)

