summary: |
  An update is now available for Red Hat JBoss Enterprise Application Platform 8.1.

  Red Hat JBoss Enterprise Application Platform 8 is a platform for Java applications based on the WildFly application runtime. This release of Red Hat JBoss Enterprise Application Platform 8.1.5 serves as a replacement for Red Hat JBoss Enterprise Application Platform 8.1.4, and includes bug fixes and enhancements. See the Red Hat JBoss Enterprise Application Platform 8.1.5 Release Notes for information about the most significant bug fixes and enhancements included in this release.
