summary: "An update for the nodejs:20 module is now available for Red Hat Enterprise Linux 9.\n\
  \nRed Hat Product Security has rated this update as having a security impact of Important.\
  \ A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed severity\
  \ rating, is available for each vulnerability from the CVE link(s) in the References section.\n\
  \nNode.js is a software development platform for building fast and scalable network applications\
  \ in the JavaScript programming language. \n\nSecurity Fix(es):\n\n* minimatch: minimatch:\
  \ Denial of Service via specially crafted glob patterns (CVE-2026-26996)\n\n* minimatch: Minimatch:\
  \ Denial of Service via catastrophic backtracking in glob expressions (CVE-2026-27904)\n\n\
  * nghttp2: nghttp2: Denial of Service via malformed HTTP/2 frames after session termination\
  \ (CVE-2026-27135)\n\n* Node.js: Node.js: Denial of Service due to crafted HTTP `__proto__`\
  \ header (CVE-2026-21710)\n\nFor more details about the security issue(s), including the impact,\
  \ a CVSS score, acknowledgments, and other related information, refer to the CVE page(s) listed\
  \ in the References section."
