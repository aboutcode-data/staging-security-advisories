summary: "An update for OpenEXR is now available for Red Hat Enterprise Linux 8.\n\nRed Hat\
  \ Product Security has rated this update as having a security impact of Important. A Common\
  \ Vulnerability Scoring System (CVSS) base score, which gives a detailed severity rating,\
  \ is available for each vulnerability from the CVE link(s) in the References section.\n\n\
  OpenEXR is a high dynamic-range (HDR) image file format developed by Industrial Light & Magic\
  \ for use in computer imaging applications. This package contains libraries and sample applications\
  \ for handling the format. \n\nSecurity Fix(es):\n\n* openexr: OpenEXR: Arbitrary code execution\
  \ via integer overflow in EXR file processing (CVE-2026-27622)\n\nFor more details about the\
  \ security issue(s), including the impact, a CVSS score, acknowledgments, and other related\
  \ information, refer to the CVE page(s) listed in the References section."
