summary: "An update is now available for Red Hat OpenShift GitOps v1.12.6. Red Hat\nProduct\
  \ Security has rated this update as having a security impact of Important.\nA Common Vulnerability\
  \ Scoring System (CVSS) base score, which gives a detailed severity rating, is available for\
  \ each vulnerability from the CVE link(s) in the References section.\n\nErrata Advisory for\
  \ Red Hat OpenShift GitOps v1.12.6.\n\nSecurity Fix(es):\n\n* openshift-gitops-argocd-container:\
  \ openshift-gitops-argocd-container: Denial of Service Vulnerability in body-parser [gitops-1.12](CVE-2024-45590)\
  \ \n* openshift-gitops-console-plugin-container: follow-redirects: Possible credential leak\
  \ [gitops-1.12](CVE-2024-28849)\n* openshift-gitops-dex-container: golang-protobuf: encoding/protojson,\
  \ internal/encoding/json: infinite loop in protojson.Unmarshal when unmarshaling certain forms\
  \ of invalid JSON [gitops-1.12](CVE-2024-24786)\n* openshift-gitops-argocd-container: go-retryablehttp:\
  \ url might write sensitive information to log file [gitops-1.12](CVE-2024-6104)\n* openshift-gitops-argocd-container:\
  \ Improper Sanitization in serve-static [gitops-1.12](CVE-2024-43800)\n* openshift-gitops-argocd-container:\
  \ Improper Input Handling in Express Redirects [gitops-1.12](CVE-2024-43796)\n* openshift-gitops-argocd-container:\
  \ Code Execution Vulnerability in Send Library [gitops-1.12](CVE-2024-43799)\n\nFor more details\
  \ about the security issue(s), including the impact, a CVSS\nscore, acknowledgments, and other\
  \ related information, refer to the CVE page(s) listed in the References section."
