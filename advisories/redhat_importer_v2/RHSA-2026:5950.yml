summary: "Red Hat OpenShift Service Mesh 3.1.6\nThis update has a security impact of Important.\
  \ A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed severity\
  \ rating, is available for each vulnerability from the CVE link(s) in the References section.\n\
  \nRed Hat OpenShift Service Mesh 3.1.6, which is based on the open source Istio project, addresses\
  \ a variety of problems in a microservice architecture by creating a centralized point of\
  \ control in an application.\n    \nFixes/Improvements:\n\n* Multiple InferencePools on same\
  \ Gateway - ext_proc lost for all but first (OSSM-12585)\n\nSecurity Fix(es):\n\n* istio-rhel9-operator:\
  \ Unexpected session resumption in crypto/tls (CVE-2025-68121)\n\n* istio-cni-rhel9: Unexpected\
  \ session resumption in crypto/tls (CVE-2025-68121)\n\n* istio-pilot-rhel9: Unexpected session\
  \ resumption in crypto/tls (CVE-2025-68121)\n\n* istio-proxyv2-rhel9: Unexpected session resumption\
  \ in crypto/tls (CVE-2025-68121)\n\n* istio-rhel9-operator: Potential code smuggling via doc\
  \ comments in cmd/cgo (CVE-2025-61732)\n\n* istio-cni-rhel9: Potential code smuggling via\
  \ doc comments in cmd/cgo (CVE-2025-61732)\n\n* istio-pilot-rhel9: Potential code smuggling\
  \ via doc comments in cmd/cgo (CVE-2025-61732)\n\n* istio-proxyv2-rhel9: Potential code smuggling\
  \ via doc comments in cmd/cgo (CVE-2025-61732)\n\n* istio-rhel9-operator: cmd/go: Arbitrary\
  \ file write via malicious pkg-config directive (CVE-2025-61731)\n\n* istio-cni-rhel9: cmd/go:\
  \ Arbitrary file write via malicious pkg-config directive (CVE-2025-61731)\n\n* istio-pilot-rhel9:\
  \ cmd/go: Arbitrary file write via malicious pkg-config directive (CVE-2025-61731)\n\n* istio-proxyv2-rhel9:\
  \ cmd/go: Arbitrary file write via malicious pkg-config directive (CVE-2025-61731)\n\n* istio-rhel9-operator:\
  \ Excessive CPU consumption when building archive index in archive/zip (CVE-2025-61728)\n\n\
  * istio-cni-rhel9: Excessive CPU consumption when building archive index in archive/zip (CVE-2025-61728)\n\
  \n* istio-pilot-rhel9: Excessive CPU consumption when building archive index in archive/zip\
  \ (CVE-2025-61728)\n\n* istio-proxyv2-rhel9: Excessive CPU consumption when building archive\
  \ index in archive/zip (CVE-2025-61728)\n\n* istio-rhel9-operator: Memory exhaustion in query\
  \ parameter parsing in net/url (CVE-2025-61726)\n\n* istio-cni-rhel9: Memory exhaustion in\
  \ query parameter parsing in net/url (CVE-2025-61726)\n\n* istio-pilot-rhel9: Memory exhaustion\
  \ in query parameter parsing in net/url (CVE-2025-61726)\n\n* istio-proxyv2-rhel9: Memory\
  \ exhaustion in query parameter parsing in net/url (CVE-2025-61726)\n\n* istio-pilot-rhel9:\
  \ JWKS Resolver Failure May Expose Hardcoded Default Keys (CVE-2026-31837)\n\n* istio-proxyv2-rhel9:\
  \ JWKS Resolver Failure May Expose Hardcoded Default Keys (CVE-2026-31837)"
