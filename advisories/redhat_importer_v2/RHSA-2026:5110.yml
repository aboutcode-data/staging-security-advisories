  \ System (CVSS) base score, which gives a detailed severity rating, is available for each\
  \ vulnerability from the CVE links in the References section.\n\nRed Hat multicluster global\
  \ hub is a set of components that enable you to import one or more hub clusters and manage\
  \ them from a single hub cluster."
