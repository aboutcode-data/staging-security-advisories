summary: "Red Hat OpenShift Data Foundation 4.20.10 security, enhancement & bug fix update\n\
  \nRed Hat OpenShift Data Foundation 4.20.10 security, enhancement & bug fix update\n\nFIXED\
  \ BUGS:\n==========\nDFBUGS-6171: RHODF 4.20.10 release\nDFBUGS-6016: Backport to odf-4.20.z\
  \ [GSS] No public access to buckets after ODF upgrade to 4.20\nDFBUGS-5941: Backport to odf-4.20.z\
  \ [External Mode]: noobaa-default-backing-store is in creating state due to \"CheckExternalConnection\
  \ Status=UNKNOWN_FAILURE Error=SELF_SIGNED_CERT_IN_CHAIN\"\nDFBUGS-5818: [Backport to odf-4.20.z]\
  \ [IBM_Support][Fusion HCI]\"storageclient-xxxxx-status-reporter job\" doesn't inherits the\
  \ tolerations defined in \"ocs-client-operator-controller-manager\" deployment\nDFBUGS-5801:\
  \ [Backport to odf-4.20.z] must-gather causes default RGW pools to be created and PGs to be\
  \ stuck at 1 \nDFBUGS-5115: [csi] Handle race conditions during relocate/failover of RBD based\
  \ workloads\nDFBUGS-4747: Unable to select NAD from dropdown list when creating storage cluster\
  \ when using Multus\n\nCVEs:\n==========\nCVE-2026-4800\nCVE-2026-34986\nCVE-2026-33186\n\
  CVE-2026-33036\nCVE-2026-27942"
