summary: "Red Hat JBoss Web Server 6.2.2 is now available for Red Hat Enterprise Linux 8, Red\
  \ Hat Enterprise Linux 9, and Red Hat Enterprise Linux 10.\n\nRed Hat Product Security has\
  \ rated this update as having a security impact of Moderate. A Common Vulnerability Scoring\
  \ System (CVSS) base score, which gives a detailed severity rating, is available for each\
  \ vulnerability from the CVE link(s) in the References section.\n\nRed Hat JBoss Web Server\
  \ is a fully integrated and certified set of components for hosting Java web applications.\
  \ It is comprised of the Apache Tomcat Servlet container, JBoss HTTP Connector (mod_cluster),\
  \ the PicketLink Vault extension for Apache Tomcat, and the Tomcat Native library.\n\nThis\
  \ release of Red Hat JBoss Web Server 6.2.2 serves as a replacement for Red Hat JBoss Web\
  \ Server 6.2.1. This release includes bug fixes, enhancements and component upgrades, which\
  \ are documented in the Release Notes that are linked to in the References section.\n\nSecurity\
  \ Fix(es):\n\n* tomcat: security constraint bypass with HTTP/0.9 (CVE-2026-24733)\n* tomcat:\
  \ Client certificate verification bypass due to virtual host mapping (CVE-2025-66614)\n* tomcat:\
  \ Apache Tomcat: Improper Input Validation vulnerability due to incomplete fix (CVE-2026-32990)\
  \ \n\nFor more details about the security issue(s), including the impact, a CVSS score, acknowledgments,\
  \ and other related information, refer to the CVE page(s) listed in the References section."
