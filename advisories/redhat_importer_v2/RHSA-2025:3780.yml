summary: "Red Hat OpenShift Container Platform release 4.13.57 is now available with updates\
  \ to packages and images that fix several bugs and add enhancements.\n\nThis release includes\
  \ a security update for Red Hat OpenShift Container Platform 4.13.\n\nRed Hat Product Security\
  \ has rated this update as having a security impact of Important. A Common Vulnerability Scoring\
  \ System (CVSS) base score, which gives a detailed severity rating, is available for each\
  \ vulnerability from the CVE link(s) in the References section.\n\nRed Hat OpenShift Container\
  \ Platform is Red Hat's cloud computing Kubernetes application platform solution designed\
  \ for on-premise or private cloud deployments.\n\nThis advisory contains the container images\
  \ for Red Hat OpenShift Container Platform 4.13.57. \n\nSpace precludes documenting all of\
  \ the container images in this advisory. See the following Release Notes documentation, which\
  \ will be updated shortly for this release, for details about these changes:\n\nhttps://docs.redhat.com/en/documentation/openshift_container_platform/4.13/html/release_notes\n\
  \nSecurity Fix(es):\n\n* grub2: net: Out-of-bounds write in grub_net_search_config_file()\
  \ (CVE-2025-0624)\n* libxml2: Stack-based buffer overflow in xmlSnprintfElements of libxml2\
  \ (CVE-2025-24928)\n\nFor more details about the security issue(s), including the impact,\
  \ a CVSS score, acknowledgments, and other related information, refer to the CVE page(s) listed\
  \ in the References section.\n\nAll OpenShift Container Platform 4.13 users are advised to\
  \ upgrade to these updated packages and images when they are available in the appropriate\
  \ release channel. To check for available updates, use the OpenShift CLI (oc) or web console.\
  \ Instructions for upgrading a cluster are available at https://docs.redhat.com/en/documentation/openshift_container_platform/4.13/html-single/updating_clusters/index#updating-cluster-within-minor."
