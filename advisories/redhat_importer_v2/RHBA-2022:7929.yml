summary: |
  An update for the redhat-ds:11 module is now available for Red Hat Directory Server 11.6 for RHEL 8.

  Red Hat Directory Server is an LDAPv3-compliant directory server. The suite of packages includes the Lightweight Directory Access Protocol (LDAP) server, as well as command-line utilities and Web UI packages for server administration.

  This release provides a number of bug fixes and enhancements. For detailed
  information on changes in this release, see the Red Hat Directory Server 11
  Release Notes linked from the References section.

  Users of Red Hat Directory Server 11 are advised to upgrade to these
  updated packages.
