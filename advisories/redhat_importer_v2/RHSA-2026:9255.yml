summary: |
  An update is now available for OpenJDK.

  Red Hat Product Security has rated this update as having a security impact of Important. A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed severity rating, is available for each vulnerability from the CVE link(s) in the References section.

  The OpenJDK 11 ELS packages provide the OpenJDK 11 Java Runtime Environment and the OpenJDK 11 Java Software Development Kit.

  This release of the Red Hat build of OpenJDK 11 (11.0.31) with Extended Lifecycle Support for portable Linux serves as a replacement for the Red Hat build of OpenJDK 11 (11.0.30) and includes security and bug fixes as well as enhancements. For further information, refer to the release notes linked to in the References section.

  Security Fix(es):

  * JDK: LIBPNG: out-of-bounds read in png_image_read_composite (CVE-2025-66293)
  * JDK: LIBPNG: Information disclosure and denial of service via integer
  truncation in simplified write API (CVE-2026-22801)
  * JDK: LIBPNG: has a heap buffer overflow in png_set_quantize (CVE-2026-25646)
  * JDK: GIFLIB: Denial of Service via buffer overflow in EGifGCBToExtension
  (CVE-2026-26740)
  * JDK: LIBPNG: Arbitrary code execution due to use-after-free vulnerability
  (CVE-2026-33416)
  * JDK: LIBPNG: Information disclosure and denial of service via out-of-bounds
  read/write in Neon palette expansion (CVE-2026-33636)
  * JDK: LIBPNG: Denial of service and information disclosure via heap buffer over-read in png_image_finish_read (CVE-2026-22695)

  * JDK: (CVE-2026-22007)
  * JDK: (CVE-2026-22016)
  * JDK: (CVE-2026-22013)
  * JDK: (CVE-2026-22018)
  * JDK: (CVE-2026-22021)
  * JDK: (CVE-2026-34268)
  * JDK: (CVE-2026-34282)
  * JDK: (CVE-2026-23865)

  For more details about the security issue(s), including the impact, a CVSS score, acknowledgments, and other related information, refer to the CVE page(s) listed in the References section.
