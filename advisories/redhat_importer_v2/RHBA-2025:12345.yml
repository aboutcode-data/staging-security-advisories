summary: |
  An update for libxml2 and libxslt is now available for Red Hat Enterprise Linux 10.

  The libxml2 library is a development toolbox providing the implementation of various XML standards.

  Bug Fix(es) and Enhancement(s):

  * libxslt: Type confusion in xmlNode.psvi between stylesheet and source nodes [rhel-10.0.z] (JIRA:RHEL-102746)

  * libxslt: Heap Use-After-Free in libxslt caused by atype corruption in xmlAttrPtr [rhel-10.0.z] (JIRA:RHEL-102794)
