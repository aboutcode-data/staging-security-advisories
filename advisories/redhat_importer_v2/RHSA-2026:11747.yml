summary: |
  Red Hat OpenStack Services on OpenShift (RHOSO) 18.0.18 containers are now available.

  Red Hat Product Security has rated this update as having a security impact of Important. A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed severity rating, is available for each vulnerability from the CVE link(s) in the References section.

  Red Hat OpenStack Services on OpenShift is a hybrid cloud solution
  for deploying and managing virtualized and containerized applications in a
  scalable infrastructure with a Red Hat OpenShift Container Platform (RHOCP)
  control plane.

  Security Fixes:

  * golang: Unexpected session resumption in crypto/tls (CVE-2025-68121)

  * golang: Memory exhaustion in query parameter parsing in net/url (CVE-2025-61726)

  * golang: Incorrect parsing of IPv6 host literals in net/url (CVE-2026-25679)

  For more details about the security issue(s), including the impact, a CVSS score, acknowledgments, and other related information, refer to the CVE page listed in the References section.
