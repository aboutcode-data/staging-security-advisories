summary: "An update for the nginx:1.24 module is now available for Red Hat Enterprise Linux\
  \ 8.\n\nRed Hat Product Security has rated this update as having a security impact of Important.\
  \ A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed severity\
  \ rating, is available for each vulnerability from the CVE link(s) in the References section.\n\
  \nnginx is a web and proxy server supporting HTTP and other protocols, with a focus on high\
  \ concurrency, performance, and low memory usage. \n\nSecurity Fix(es):\n\n* nginx: NGINX:\
  \ Denial of Service or Code Execution via specially crafted MP4 files (CVE-2026-32647)\n\n\
  * NGINX: NGINX: Denial of Service or file modification via buffer overflow in ngx_http_dav_module\
  \ (CVE-2026-27654)\n\n* NGINX: NGINX: Denial of Service due to memory corruption via crafted\
  \ MP4 file (CVE-2026-27784)\n\n* NGINX: NGINX: Denial of Service via undisclosed requests\
  \ when ngx_mail_auth_http_module is enabled (CVE-2026-27651)\n\nFor more details about the\
  \ security issue(s), including the impact, a CVSS score, acknowledgments, and other related\
  \ information, refer to the CVE page(s) listed in the References section."
