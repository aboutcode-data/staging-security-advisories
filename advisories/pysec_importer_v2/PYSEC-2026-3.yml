summary: "Two telnyx versions published containing credential harvesting malware\nAfter an API\
  \ token exposure from an exploited Trivy dependency,\ntwo new releases of `telnyx` were uploaded\
  \ to PyPI containing automatically activated malware,\nharvesting sensitive credentials and\
  \ files, and exfiltrating to a remote API.\n\nCompromised versions execute code during importing\
  \ the `telnyx` module through modifications in `_client.py`.\n\nThe code downloads the next\
  \ stages from endpoints on the host 83.142.209[.]203, encoded in WAV files.\nOn Windows hosts,\
  \ the malicious executable is placed in \n`%APPDATA%\\Microsoft\\Windows\\Start Menu\\Programs\\\
  Startup\\msbuild.exe`\nfor persistence and executed.\nOn other systems, the payload is a Python\
  \ script.\nAfter executing it, generated artifacts are exfiltrated to 83.142.209[.]203.\n\n\
  Version 4.87.1 contains a typo preventing the automated execution of the malicious code.\n\
  \nThe code uses the encryption key observed in previous TeamPCP actions.\nThe full compromise\
  \ of exposed systems and all credentials reachable from them should be assumed. \nThe credentials\
  \ should be revoked/rotated, and the affected systems isolated\nand analyzed against malicious\
  \ actions and modifications.\n\nThe two versions have been removed from PyPI, and the project\
  \ has been reinstated."
