summary: "Next.js: Unbounded postponed resume buffering can lead to DoS\n## Summary\nA request\
  \ containing the `next-resume: 1` header (corresponding with a PPR resume request) would buffer\
  \ request bodies without consistently enforcing `maxPostponedStateSize` in certain setups.\
  \ The previous mitigation protected minimal-mode deployments, but equivalent non-minimal deployments\
  \ remained vulnerable to the same unbounded postponed resume-body buffering behavior.\n\n\
  ## Impact\nIn applications using the App Router with Partial Prerendering capability enabled\
  \ (via `experimental.ppr` or `cacheComponents`), an attacker could send oversized `next-resume`\
  \ POST payloads that were buffered without consistent size enforcement in non-minimal deployments,\
  \ causing excessive memory usage and potential denial of service.\n\n## Patches\nFixed by\
  \ enforcing size limits across all postponed-body buffering paths and erroring when limits\
  \ are exceeded.  \n\n## Workarounds\nIf upgrade is not immediately possible:\n- Block requests\
  \ containing the `next-resume` header, as this is never valid to be sent from an untrusted\
  \ client."
