summary: "Improper S3 ownership verification in Bedrock AgentCore Starter Toolkit\n## Summary\n\
  An issue has been identified in the Bedrock AgentCore Starter Toolkit versions prior to v0.1.13\
  \ that may allow a remote actor to inject code during the build process, leading to code execution\
  \ in the AgentCore Runtime.\n\n\n## Impact\nA remote actor could inject code during the build\
  \ process, leading to code execution in the AgentCore Runtime and a complete loss of confidentiality,\
  \ integrity, and availability of the affected AgentCore resource.\n\nImpacted versions:  All\
  \ versions of Bedrock AgentCore Starter Toolkit versions before v0.1.13. This issue only affects\
  \ users of the Bedrock AgentCore Starter Toolkit before version v0.1.13 who build the Toolkit\
  \ after September 24, 2025. Any users on a version >=v0.1.13, and any users on previous versions\
  \ who built the toolkit before September 24, 2025 date are not affected. \n\n## Patches\n\
  This issue has been addressed in version v0.1.13. AWS recommends upgrading to the latest version\
  \ and ensuring any forked or derivative code is patched to incorporate the new fixes. \n\n\
  ## Workarounds\nN/A\n\n## References\nIf you have any questions or comments about this advisory,\
  \ contact [AWS/Amazon] Security via our [vulnerability reporting page](https://aws.amazon.com/security/vulnerability-reporting)\
  \ or directly via email to [aws-security@amazon.com](mailto:aws-security@amazon.com). Please\
  \ do not create a public GitHub issue."
