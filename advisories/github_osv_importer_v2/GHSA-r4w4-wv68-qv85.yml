  - CVE-2026-44308
summary: "Spring Cloud AWS missing SNS message signature verification allows spoofing of HTTP/HTTPS\
  \ endpoint notifications\n### Impact\n  \n  Applications using Spring Cloud AWS SNS HTTP/HTTPS\
  \ endpoint support (@NotificationMessageMapping, @NotificationSubscriptionMapping, @NotificationUnsubscribeConfirmationMapping)\
  \ did not verify the signature of incoming SNS messages.\n\nAn unauthenticated attacker who\
  \ knows the endpoint URL could send crafted HTTP POST requests mimicking SNS Notification\
  \ or SubscriptionConfirmation messages, causing the application to:\n  \n  - Process arbitrary\
  \ payloads as if they were legitimate SNS notifications.\n  - Auto-confirm subscriptions or\
  \ unsubscribe from attacker-controlled topics.\n  \nAffected versions: 3.0.0 through 3.4.2,\
  \ 4.0.0, and 4.0.1.\n  \nThe 3.x line will not receive a fix; users on 3.x should apply the\
  \ workaround below or upgrade to 4.0.2.\n  \n### Patches\n  \nFixed in Spring Cloud AWS 4.0.2.\
  \ When using Spring Boot auto-configuration, signature verification is enabled by default.\
  \ Users should upgrade to 4.0.2.\n  \n### Workarounds\n  \nManually verify the SNS message\
  \ signature in a servlet filter or Spring HandlerInterceptor before the request reaches the\
  \ controller, using SnsMessageManager from the AWS SDK v2 sns-message-manager module.\n  \n\
  \ ### Resources\n  \n  - AWS SNS: Verifying the signatures of Amazon SNS messages (https://docs.aws.amazon.com/sns/latest/dg/sns-verify-signature-of-message.html)\n\
  \  - AWS SDK for Java v2: SnsMessageManager (https://sdk.amazonaws.com/java/api/latest/software/amazon/awssdk/messagemanager/sns/SnsMessageManager.html)\n\
  \  - Fix PR: #1614"
