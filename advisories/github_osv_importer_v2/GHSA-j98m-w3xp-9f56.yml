  $ ls -la /tmp/cve-hunt/outside_sandbox/
  -rw-rw-r-- 1 hitarth hitarth 4783 Apr 10 17:36 P1_absolute_write.xlsx
  -rw-rw-r-- 1 hitarth hitarth 4783 Apr 10 17:36 P2_traversal_write.xlsx
  ```

  **Attacker-created directory tree:**
