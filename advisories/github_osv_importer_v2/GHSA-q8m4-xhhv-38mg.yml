summary: "etcd: Authorization bypasses in multiple APIs\n### Impact\n_What kind of vulnerability\
  \ is it? Who is impacted?_\n\nMultiple vulnerabilities allow unauthorized users to bypass\
  \ authentication or authorization checks and call certain etcd functions in clusters that\
  \ expose the gRPC API to untrusted or partially trusted clients.\n\nIn unpatched etcd clusters\
  \ with etcd auth enabled, unauthorized users are able to:\n\n  - call MemberList and learn\
  \ cluster topology, including member IDs and advertised endpoints\n  - call Alarm, which can\
  \ be abused for operational disruption or denial of service\n  - use Lease APIs, interfering\
  \ with TTL-based keys and lease ownership\n  - trigger compaction, permanently removing historical\
  \ revisions and disrupting watch, audit, and recovery workflows\n\nKubernetes does not rely\
  \ on etcd’s built-in authentication and authorization. Instead, the API server handles authentication\
  \ and authorization itself, so typical Kubernetes deployments are not affected.\n\n### Patches\n\
  _Has the problem been patched? What versions should users upgrade to?_\n\nThese vulnerabilities\
  \ are patched in the following versions:\n\n* etcd 3.6.9\n* etcd 3.5.28\n* etcd 3.4.42\n\n\
  ### Workarounds\n_Is there a way for users to fix or remediate the vulnerability without upgrading?_\n\
  \nIf upgrading is not immediately possible, reduce exposure by treating the affected \nRPCs\
  \ as unauthenticated in practice.\n\n- restrict network access to etcd server ports so only\
  \ trusted components can connect\n- require strong client identity at the transport layer,\
  \ such as mTLS with tightly scoped client certificate\n    distribution\n\n### Reporters\n\
  _Community efforts help keep etcd secure_\n\nThe etcd community thanks Isaac David, bugbunny.ai,\
  \ Asim Viladi Oglu Manizada, Alex Schapiro & Ahmed Allam from Strix security, Luke Francis,\
  \ and @OLU-DEVX for reporting these vulnerabilities.\n\n### Dependency Between Reported Issues\n\
  \nThese issues all originate from the same underlying flaw in the gRPC API layer.\n\nThey\
  \ affect the same API surface and share a common root cause. In practice, the fix is implemented\
  \ as a single, unified change at the API layer, which resolves all issues together.\n\nGiven\
  \ this, we believe these issues are best treated as a single vulnerability and should be assigned\
  \ a single CVE."
