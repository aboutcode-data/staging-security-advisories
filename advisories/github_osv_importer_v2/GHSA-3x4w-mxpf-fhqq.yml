summary: "Craft CMS Vulnerable to Stored XSS in Revision Context Menu\nThe revision/draft context\
  \ menu in the element editor renders the creator’s `fullName` as raw HTML due to the \nuse\
  \ of `Template::raw()` combined with `Craft::t()` string interpolation. A low-privileged control\
  \ panel user\n(e.g., Author) can set their fullName to an XSS payload via the profile editor,\
  \ then create an entry with two\nsaves.\n\nIf an administrator is logged in and executes a\
  \ specifically crafted payload while an elevated session is active, the attacker’s account\
  \ can be elevated to administrator.\n\nUsers should update to Craft 5.9.11 with the patch\
  \ to mitigate the issue."
