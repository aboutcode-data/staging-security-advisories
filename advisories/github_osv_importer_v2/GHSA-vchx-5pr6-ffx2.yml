summary: "Flannel has cross-node remote code execution via extension backend BackendData injection\n\
  ### Background\nThe Flannel project includes an experimental Extension backend that allows\
  \ users to easily prototype new backend types. This backend uses shell commands stored in\
  \ Kubernetes annotations to configure network connectivity on the node.\n\nNote: consumers\
  \ are only affected by this vulnerability if they use the experimental Extension backend.\
  \ Other backends such as vxlan and wireguard are unaffected.\n\n### Vulnerability\nThis Extension\
  \ backend is vulnerable to a command injection that allows an attacker who can set Kubernetes\
  \ Node annotations to achieve root-level arbitrary command execution on every flannel node\
  \ in the cluster.\n\nThe Extension backend's SubnetAddCommand and SubnetRemoveCommand receive\
  \ attacker-controlled data via stdin (from the `flannel.alpha.coreos.com/backend-data` Node\
  \ annotation). The content of this annotation is unmarshalled and piped directly to a shell\
  \ command without checks.\n\n### Impact\nKubernetes clusters using Flannel with the Extension\
  \ backend are affected by this vulnerability. Other backends such as vxlan and wireguard are\
  \ unaffected.\n\n### Patches\nThis is fixed in version v0.28.2.\n\n### Workaround \nIf consumers\
  \ cannot update to a patched version, then use Flannel with another backend such as vxlan\
  \ or wireguard.\n\n### Credits\nFlannel would like to thank  Shachar Tal from Palo Alto Networks\
  \ for reporting this vulnerability."
