summary: "Neo4j Labs MCP Servers: SSRF and Data Modification via read_only Mode Bypass Through\
  \ CALL Procedures\n### Summary\nThe `read_only` mode in `mcp-neo4j-cypher` versions prior\
  \ to 0.6.0 can be bypassed using `CALL` procedures. \n### Details\n\n#### Impact\nThe enforcing\
  \ of `read_only` mode in vulnerable versions could be bypassed by certain APOC procedures.\n\
  \n#### Patches\nv0.6.0 release hardened the checks around the mode. The only way to guarantee\
  \ the server actions is to limit the permissions of the db credentials available to the server.\n\
  \n### Notes\nImpacts for server-side request forgery vulnerabilities may depend on both the\
  \ configuration of the vulnerable system as well as the presence of other systems in the environment\
  \ that could be accessed as part of exploitation.\n#### Recommended hardening\n\n- Limit the\
  \ apoc procedures to what's required\n- [Manage data loading privileges](https://neo4j.com/docs/operations-manual/current/authentication-authorization/load-privileges/\
  \ )\n- Don't relax the default settings without compensating controls\n    - `apoc.import.file.enabled`\
  \ is `false` by default\n    - `apoc.import.file.use_neo4j_config` is `true` by default to\
  \ restrict file imports to the import folder\n\n### Credits\nWe want to publicly recognise\
  \ the contribution of [Yotam Perkal](https://github.com/yotampe-pluto) from [Pluto Security](https://pluto.security/)."
