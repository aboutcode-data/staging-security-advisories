summary: "LobeHub: Unauthenticated authentication bypass on `webapi` routes via forgeable `X-lobe-chat-auth`\
  \ header\n# Summary\n\nThe `webapi` authentication layer trusts a client-controlled `X-lobe-chat-auth`\
  \ header that is only XOR-obfuscated, not signed or otherwise authenticated. Because the XOR\
  \ key is hardcoded in the repository, an attacker can forge arbitrary auth payloads and bypass\
  \ authentication on protected `webapi` routes.\n\nAffected routes include:\n- `POST /webapi/chat/[provider]`\n\
  - `GET /webapi/models/[provider]`\n- `POST /webapi/models/[provider]/pull`\n- `POST /webapi/create-image/comfyui`\n\
  \n## Details\n\nThe frontend creates `X-lobe-chat-auth` by XOR-obfuscating JSON with the static\
  \ key `LobeHub · LobeHub`, and the backend reverses that operation and treats the decoded\
  \ JSON as trusted authentication data.\n\nThe backend then accepts any truthy `apiKey` field\
  \ in that decoded payload as sufficient authentication. No real API key validation is performed\
  \ in this path.\n\nAs a result, an unauthenticated attacker can forge payloads such as:\n\n\
  ```json\n{\"apiKey\":\"x\"} \n```\n\nor \n\n``` {\"userId\":\"victim-user-123\",\"apiKey\"\
  :\"x\"} ```\n\nand access webapi routes as an authenticated user.\n\nConfirmed PoC\nThe following\
  \ forged header was generated directly from the published XOR key using payload {\"apiKey\"\
  :\"x\"}:\n\n\n``` X-lobe-chat-auth: N00DFSE+B1ngjQI0TR8= ```\n\nThat header decodes server-side\
  \ to:\n\n``` {\"apiKey\":\"x\"}```\n\nA simple request is:\n\n``` curl 'https://TARGET/webapi/models/openai'\
  \ \\\n  -H 'X-lobe-chat-auth: N00DFSE+B1ngjQI0TR8=' ``` \n\nIf the deployment has OPENAI_API_KEY\
  \ configured, the request should succeed without a real login and return the provider model\
  \ list.\n\nA forged impersonation payload also works conceptually:\n\n``` {\"userId\":\"victim-user-123\"\
  ,\"apiKey\":\"x\"} ``` \n\n### Impact\nThis is an unauthenticated authentication bypass.\n\
  \nAn attacker can:\n\n1. access protected webapi routes without a valid session\n2. spend\
  \ the deployment's server-side model provider credentials when env keys like OPENAI_API_KEY\
  \ are configured\n3. impersonate another user's userId for routes that load per-user provider\
  \ configuration\n4. invoke privileged backend model operations such as chat, model listing,\
  \ model pulls, and ComfyUI image generation\n\n### Root Cause\nThe core issue is trusting\
  \ unsigned client-supplied auth data:\n\n1. the auth header is only obfuscated, not authenticated\n\
  2. the obfuscation key is hardcoded and recoverable from the repository\n3. the decoded apiKey\
  \ field is treated as sufficient authentication even though it is never validated in this\
  \ code path\n4. Suggested Remediation\n5. Stop treating X-lobe-chat-auth as an authentication\
  \ token.\n6. Remove the apiKey truthiness check as an auth decision.\n7. Require a real server-validated\
  \ session, OIDC token, or validated API key for all protected webapi routes.\n8. If a client\
  \ payload is still needed, sign it server-side with an HMAC or replace it with a normal session-bound\
  \ backend lookup.\n9. Affected Products\n\nEcosystem: npm\n\nPackage name: @lobehub/lobehub\n\
  Affected versions: <= 2.1.47\nPatched versions: 2.1.48\n\nSeverity\nModerate\nVector String\n\
  CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:L/I:L/A:L\n\nWeaknesses\nCWE-287: Improper Authentication\n\
  CWE-345: Insufficient Verification of Data Authenticity\nCWE-290: Authentication Bypass by\
  \ Spoofing"
