summary: "awslabs/tough Delegated Roles have a Signature Threshold Bypass\n### Summary\nImproper\
  \ verification of cryptographic signature uniqueness in delegated role validation in awslabs/tough\
  \ before tough-v0.22.0 allows remote authenticated users to bypass the TUF signature threshold\
  \ requirement by duplicating a valid signature, causing the client to accept forged delegated\
  \ role metadata.\n\n### Impact\nThe tough library, prior to 0.22.0, does not properly verify\
  \ the uniqueness of keys in the signatures provided to meet the threshold of cryptographic\
  \ signatures in delegated targets. It allows actors with access to a valid signing key to\
  \ create multiple valid signatures in order to circumvent TUF requiring a minimum threshold\
  \ of unique keys before the metadata is considered valid.\n\n### Patches\nThis issue has been\
  \ addressed in tough version 0.22.0 and tuftool version 0.15.0. We recommend upgrading to\
  \ the latest version and ensuring any forked or derivative code is patched to incorporate\
  \ the new fixes. \n\n### Workarounds\nNo workarounds to this issue are known.\n\n### References\n\
  * CVE-2026-6966\n\nIf there are any questions or comments about this advisory, please contact\
  \ [AWS/Amazon] Security via the [vulnerability reporting page](https://aws.amazon.com/security/vulnerability-reporting)\
  \ or directly via email to [aws-security@amazon.com](mailto:aws-security@amazon.com). Please\
  \ do not create a public GitHub issue.\n\n### Acknowledgement\n\nAmazon Web Services Labs\
  \ would like to thank Emily Albini of Oxide Computer and Oleh Konko of 1seal for collaborating\
  \ on this issue through the coordinated vulnerability disclosure process"
