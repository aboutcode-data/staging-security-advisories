summary: "DevSpace UI Server WebSocket CheckOrigin does not validate source\n### Description\n\
  \nDevSpace's UI server WebSocket accepts connections from all origins by default, and therefore\
  \ several endpoints are exposed via this WebSocket. When a developer runs the DevSpace UI\
  \ and at the same time uses a browser to access the internet, a malicious website they visit\
  \ can use their browser to establish a cross-origin WebSocket connection to `ws://127.0.0.1:8090`.\
  \ This allows an attacker to access: \n* `/api/logs` to stream real-time pod logs\n* `/api/enter`\
  \ to open an interactive shell inside the running pod\n* `/api/command` to execute pre-defined\
  \ pipeline commands\n\n### Patches\n\nVersions 6.3.21 and above are patched.\n\n### Resources\n\
  \n[gorilla/websocket CheckOrigin documentation](https://pkg.go.dev/github.com/gorilla/websocket#hdr-Origin_Considerations)\n\
  \n### Installation Options\n\nDevspace is no longer publishing to NPM or Yarn, please continue\
  \ to use our [other installation methods](https://www.devspace.sh/docs/getting-started/installation)\
  \ to get updates in the future, including this patch.\n\n### Credit\n\nDevSpace thanks @b0b0haha\
  \ for finding and reporting this vulnerability."
