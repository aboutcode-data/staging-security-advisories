summary: "Electerm Local code through electerm's single-instance socket\n### Impact\n_Local\
  \ code execution without UI interaction: any same-user process can send a JSON payload to\
  \ electerm's single-instance socket/pipe, causing the app to create tabs and potentially spawn\
  \ attacker-controlled local processes. Affects electerm single-instance installs on the machine._\n\
  \n### Patches\n\n- https://github.com/electerm/electerm/commit/0599e67069b00e376a2e962649aaad6096e63507\n\
  \n### Workarounds\n\n- Do not run unsafe command \n\n### References\n- Report / credit: https://github.com/Curly-Haired-Baboon\n\
  - Electerm releases: https://github.com/electerm/electerm/releases"
