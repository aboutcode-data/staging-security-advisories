summary: "Ella Core Panics during NAS Authentication Response/Failure with missing IEs\n## Summary\n\
  \nElla Core panics when processing Authentication Response and Authentication Failure NAS\
  \ message missing IEs. \n\n## Impact\n\nAn attacker able to send crafted NAS messages to Ella\
  \ Core can crash the process, causing service disruption for all connected subscribers. No\
  \ authentication is required.\n\n## Fix\n\nAdded IE presence verification to NAS message handling."
