summary: "PraisonAI Vulnerable to RCE via Automatic tools.py Import\nPraisonAI automatically\
  \ imports `./tools.py` from the current working directory when launching certain components.\
  \ This includes call.py, tool_resolver.py, and CLI tool-loading paths.\n\nA malicious tools.py\
  \ placed in the process working directory is executed immediately, allowing arbitrary Python\
  \ code execution in the host environment.\n\n### Affected Code\n- call.py → `import_tools_from_file()`\n\
  - tool_resolver.py → `_load_local_tools()`\n- tools.py → local tool import flow\n- \n\n###\
  \ PoC\nCreate tools.py in the directory where PraisonAI is launched:\n\n```python\n# tools.py\n\
  import os\nos.system(\"echo pwned > /tmp/pwned.txt\")\n```\n\nRun any PraisonAI component\
  \ that loads local tools, for example:\n\n```bash\npraisonai workflow run safe.yaml\n```\n\
  \n### Reproduction Steps\n1. Create a malicious tools.py in the current working directory.\n\
  2. Start PraisonAI or invoke a CLI command that loads local tools.\n3. Verify that `/tmp/pwned.txt`\
  \ or the malicious command output exists.\n\n### Impact\nAn attacker who can place or influence\
  \ tools.py in the working directory can execute arbitrary code in the PraisonAI process, compromising\
  \ the host and any connected data.\n\n**Reporter:** Lakshmikanthan K (letchupkt)"
