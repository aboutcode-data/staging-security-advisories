summary: "Open WebUI has Broken Access Control for Completions API\n### Summary\nAny user `X`\
  \ can continue the conversation of any other user `Y`, as long as the Chat ID of `Y` is known.\
  \ User `X` does not even need to be an admin to do so. \n\n### Details\nA user just needs\
  \ to use the API endpoint: `/api/chat/completions` with their own API key (generated in OWUI)\
  \ and the Chat ID of another user. **OWUI does not check to match the Chat ID with the user\
  \ that created that Chat ID**. Note that both users will need access to the same model. This\
  \ is especially relevant if there is a shared pipeline model between users. \n\n### PoC\n\
  1. Using OWUI v0.6.18\n2. Sign in with any user `X`\n3. Generate an API Key for user `X` using\
  \ the settings\n4. Create another user `Y`, and have a conversation in OWUI. Copy the Chat\
  \ ID from the URL.\n5. User `X` can now use the API `/api/chat/completions` and the Chat ID\
  \ from step 4 to continue the conversation of user `Y`\n\n### Impact\nLarge impact to any\
  \ user in OWUI. People can read your conversations, and access private information if they\
  \ know your Chat ID (which is in the URL of the chat). \n\n## Resolution\n\nFixed in commit\
  \ [cf4218e68](https://github.com/open-webui/open-webui/commit/cf4218e688def6f11d195aeda6665ae5b5376b67),\
  \ first released in **v0.9.0** (Apr 2026). The `chat_completion` handler at `backend/open_webui/main.py:1868`\
  \ now explicitly verifies chat ownership via `Chats.is_chat_owner(chat_id, user.id)` for any\
  \ request that targets an existing chat, and raises 404 for non-owners (admin bypass preserved\
  \ per the documented threat model). New chats (no `chat_id` supplied, or freshly inserted\
  \ via the `is_new_chat` branch) are unaffected. Users on `>= 0.9.0` are not affected."
