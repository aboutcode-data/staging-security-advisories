summary: "Hugo's Node tool execution allows file system access outside the project directory\n\
  ## Impact \nWhen building a Hugo site that uses Node-based asset pipelines (PostCSS, Babel,\
  \ TailwindCSS), Hugo invoked the configured Node tools without restrictions on file system\
  \ access. As a result, executing hugo against an untrusted site could allow code running through\
  \ these tools to read or write files outside the project's working directory.\n\nUsers who\
  \ do not use PostCSS, Babel, or TailwindCSS, or who only build trusted sites, are not affected.\n\
  \n## Patches\nFrom `v0.161.0`, Hugo runs Node tools under Node's permission model with strict\
  \ defaults: No write access and only read access to the site source directories and files.\n\
  \n## Workarounds\nBlock these tools in [security.exec.allow](https://gohugo.io/configuration/security/)."
