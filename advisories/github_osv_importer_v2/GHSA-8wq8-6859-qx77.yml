summary: "@backstage/plugin-scaffolder-backend: Possible exposure of defaultEnvironment secrets\
  \ using dry-run endpoint\n### Impact                                                     \
  \                                                                                        \
  \                            \n                                         \n  Authenticated\
  \ users with permission to execute scaffolder dry-runs can gain access to server-configured\
  \ environment secrets through the dry-run API response. Secrets are properly \n  redacted\
  \ in log output but not in all parts of the response payload.\n                          \
  \                                                                                        \
  \                                                                   \n  Deployments that have\
  \ configured `scaffolder.defaultEnvironment.secrets` are affected.\n                     \
  \     \n  ### Patches                            \n\n  This is patched in `@backstage/plugin-scaffolder-backend`\
  \ version 3.1.5\n  ### Workarounds\n\n  Remove or empty the `scaffolder.defaultEnvironment.secrets`\
  \ configuration from `app-config.yaml`. Alternatively, restrict access to the scaffolder dry-run\
  \ functionality via the\n  permissions framework.\n\n  ### References\n\n  - [Backstage Scaffolder\
  \ Backend documentation](https://backstage.io/docs/features/software-templates/)"
