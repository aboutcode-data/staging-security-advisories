summary: "Trino: Iceberg REST catalog static and vended credentials are accessible via query\
  \ JSON\n### Summary\n\nIceberg connector REST catalog static credentials (access key) or vended\
  \ credentials (temporary access key) are accessible to users that have write privilege on\
  \ SQL level.\n\n### Details\n\nIceberg REST catalog typically needs access to object storage.\
  \ This access can be configured in multiple different ways. When storage access is achieved\
  \ by static credentials (e.g. AWS S3 access key) or vended credentials (temporary access key).\n\
  \nQuery JSON is a query visualization and performance troubleshooting facility. It includes\
  \ serialized query plan and handles for table writes or  execution of table procedures. A\
  \ user that submitted a query has access to query JSON for their query. Query JSON is available\
  \ from Trino UI or via `/ui/api/query/«query_id»` and `/v1/query/«query_id»` endpoints.\n\n\
  The storage credentials are stored in those handles when performing write operations, or table\
  \ maintenance operations. They are serialized in query JSON. A user with write access to data\
  \ in Iceberg connector configured to use REST Catalog with static or vended credentials can\
  \ retrieve those credentials.\n\n### Impact\n\nAnyone using Iceberg REST catalog with static\
  \ or vended credentials is impacted.\nThe credentials should be considered compromised. \n\
  Vended credentials are temporary in nature so they do not need to be rotated. However, underlying\
  \ data could have been exposed."
