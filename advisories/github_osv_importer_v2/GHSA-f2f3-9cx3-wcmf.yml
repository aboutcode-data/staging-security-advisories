summary: "Ella Core panics when processing a crafted NGAP LocationReport message\n## Summary\n\
  \nElla Core panics when processing a specially crafted NGAP LocationReport message.\n\n##\
  \ Impact\n\nAn attacker able to send crafted NGAP messages to Ella Core can crash the process,\
  \ causing service disruption for all connected subscribers.\n\n## Fix \n\nAdd guards in NGAP\
  \ Location Report handler."
