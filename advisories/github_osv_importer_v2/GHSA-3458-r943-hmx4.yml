summary: "Fleet: Password reset tokens remain valid after password change for 24 hours\n###\
  \ Summary\n\nA vulnerability in Fleet’s password management logic could allow previously issued\
  \ password reset tokens to remain valid after a user changes their password. As a result,\
  \ a stale password reset token could be reused to reset the account password even after a\
  \ defensive password change.\n\n### Impact\n\nIf an attacker had prior access to a valid password\
  \ reset token, they could reuse that token within its validity window to reset the user’s\
  \ password after the user has already changed it. This could result in temporary account takeover.\n\
  \nExploitation requires prior compromise of a password reset token and is further constrained\
  \ by the token’s 24-hour expiration period. The issue does not allow discovery of reset tokens,\
  \ does not bypass authentication on its own, and does not affect accounts without an existing\
  \ valid reset token.\n\n### Workarounds\n\nUntil patched, users who believe a password reset\
  \ token may have been exposed should wait for the token to expire before reusing the account,\
  \ or contact a Fleet administrator to invalidate active sessions.\n\n### For more information\n\
  \nIf there are any questions or comments about this advisory:\n\nEmail Fleet at [security@fleetdm.com](mailto:security@fleetdm.com)\
  \  \nJoin #fleet in [osquery Slack](https://join.slack.com/t/osquery/shared_invite/zt-h29zm0gk-s2DBtGUTW4CFel0f0IjTEw)\n\
  \n### Credits\n\nFleet thanks @fuzzztf for responsibly reporting this issue."
