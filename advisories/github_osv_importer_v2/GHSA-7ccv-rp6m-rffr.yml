  - CVE-2026-39388
summary: "OpenBao's Certificate Authentication Allows Token Renewal With Different Certificate\n\
  ### Background\n\nOpenBao's Certificate authentication method, when a token renewal is requested\
  \ and `disable_binding=true` is set, attempts to verify the current request's presented mTLS\
  \ certificate matches the original. Token renewals for other authentication methods do not\
  \ require any supplied login information.\n\n### Impact\n\nDue to incorrect matching, the\
  \ certificate authentication method would allow renewal of tokens for which the attacker had\
  \ a sibling certificate+key signed by the same CA, but which did not necessarily match the\
  \ original role or the originally supplied certificate. This implies an attacker could still\
  \ authenticate to OpenBao in a similar scope, however, token renewal implies that an attacker\
  \ may be able to extend the lifetime of dynamic leases held by the original token. This attack\
  \ requires knowledge of either the original token or its accessor. \n\nThis vulnerability\
  \ is originally from HashiCorp Vault.\n\n### Patches\n\nThis has been addressed in v2.5.3.\n\
  \n### Workarounds\n\nEnsure privileged roles are tightly scoped to single certificates."
