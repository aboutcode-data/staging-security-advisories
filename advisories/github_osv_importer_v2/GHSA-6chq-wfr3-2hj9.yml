summary: "Axios: Header Injection via Prototype Pollution\n### Summary\n\nA prototype pollution\
  \ gadget exists in the Axios HTTP adapter (lib/adapters/http.js) that allows an attacker to\
  \ inject arbitrary HTTP headers into outgoing requests. The vulnerability exploits duck-type\
  \ checking of the data payload, where if Object.prototype is polluted with getHeaders, append,\
  \ pipe, on, once, and Symbol.toStringTag, Axios misidentifies any plain object payload as\
  \ a FormData instance and calls the attacker-controlled getHeaders() function, merging the\
  \ returned headers into the outgoing request.\n\nThe vulnerable code resides exclusively in\
  \ lib/adapters/http.js. The prototype pollution source does not need to originate from Axios\
  \ itself — any prototype pollution primitive in any dependency in the application's dependency\
  \ tree is sufficient to trigger this gadget.\n\nPrerequisites:\n\nA prototype pollution primitive\
  \ must exist somewhere in the application's dependency chain (e.g., via lodash.merge, qs,\
  \ JSON5, or any deep-merge utility processing attacker-controlled input). The pollution source\
  \ is not required to be in Axios.\nThe application must use Axios to make HTTP requests with\
  \ a data payload (POST, PUT, PATCH).\n\n### Details\n\nThe vulnerability is in `lib/adapters/http.js`,\
  \ in the data serialization pipeline:\n\n```javascript\n// lib/adapters/http.js \n} else if\
  \ (utils.isFormData(data) && utils.isFunction(data.getHeaders)) {\n    headers.set(data.getHeaders());\n\
  \    // ...\n}\n```\n\nAxios uses two sequential duck-type checks, both of which can be satisfied\
  \ via prototype pollution:\n\n**1. `utils.isFormData(data)` — `lib/utils.js`**\n```javascript\n\
  const isFormData = (thing) => {\n  let kind;\n  return thing && (\n    (typeof FormData ===\
  \ 'function' && thing instanceof FormData) || (\n      isFunction(thing.append) && ( \n  \
  \      (kind = kindOf(thing)) === 'formdata' ||  \n        (kind === 'object' && isFunction(thing.toString)\
  \ && thing.toString() === '[object FormData]')\n      )\n    )\n  )\n}\n```\n\n**2. `utils.isFunction(data.getHeaders)`\
  \ — Duck-type for `form-data` npm package**\n```javascript\n// Returns true if Object.prototype.getHeaders\
  \ is a function\nutils.isFunction(data.getHeaders) \n```\n\n### PoC\n\n```javascript\n// Simulate\
  \ Prototype Pollution\nObject.prototype[Symbol.toStringTag] = 'FormData';\nObject.prototype.append\
  \ = () => {};\nObject.prototype.getHeaders = () => {\n    const headers = Object.create(null);\n\
  \    (.... Introduce here all the headers you want ....)\n    return headers;\n};\nObject.prototype.pipe\
  \ = function(d) { if(d&&d.end)d.end(); return d; };\nObject.prototype.on = function() { return\
  \ this; };\nObject.prototype.once = function() { return this; };\n\n// Legitimate application\
  \ code\nconst response = await axios.post('https://internal-api.company.com/admin/delete',\
  \ \n    { userId: 42 },\n    { headers: { 'Authorization': 'Bearer VALID_USER_TOKEN' } }\n\
  );\n```\n\n### Impact\n\n- Authentication Bypass (CVSS: C:H)\n- Session Fixation (CVSS: I:H)\n\
  - Privilege Escalation (CVSS: C:H, I:H)\n- IP Spoofing / WAF Bypass (CVSS: I:H)\n\n**Note\
  \ on Scope**: There is an argument to promote this from **S:U to S:C** (Scope: Changed), which\
  \ would raise the score to **10.0**. In some architectures, Axios is commonly used for service\
  \ to service communication where downstream services trust identity headers (`Authorization`,\
  \ `X-Role`, `X-User-ID`, `X-Tenant-ID`) forwarded from upstream API gateways. In this scenario,\
  \ the vulnerable component (Axios in Service A) and the impacted component (Service B, which\
  \ acts on the injected identity) are under different security authorities. The injected headers\
  \ cross a trust boundary, meaning the impact extends beyond the security scope of the vulnerable\
  \ component, the CVSS v3.1 definition of a Scope Change. We conservatively score S:U here,\
  \ but maintainers should evaluate which one applies better here.\n\n### Recommended Fix\n\n\
  Add an explicit own-property check in `lib/adapters/http.js`:\n\n```diff\n- } else if (utils.isFormData(data)\
  \ && utils.isFunction(data.getHeaders)) {\n-     headers.set(data.getHeaders());\n+ } else\
  \ if (utils.isFormData(data) && utils.isFunction(data.getHeaders) &&\n+            Object.prototype.hasOwnProperty.call(data,\
  \ 'getHeaders')) {\n+     headers.set(data.getHeaders());\n```"
