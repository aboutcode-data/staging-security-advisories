summary: "Kedro has Arbitrary Code Execution via Malicious Logging Configuration\n### Impact\n\
  \nThis is a **critical Remote Code Execution (RCE)** vulnerability caused by unsafe use of\
  \ `logging.config.dictConfig()` with user-controlled input.\n\nKedro allows the logging configuration\
  \ file path to be set via the `KEDRO_LOGGING_CONFIG` environment variable and loads it without\
  \ validation. The logging configuration schema supports the special `()` key, which enables\
  \ arbitrary callable instantiation. An attacker can exploit this to execute arbitrary system\
  \ commands during application startup.\n\n---\n\n### Patches\n\nThe vulnerability is fixed\
  \ by introducing validation that rejects the unsafe `()` factory key in logging configurations\
  \ before passing them to `dictConfig()`.\n\n#### Fixed in\n- Kedro 1.3.0\n\nUsers should upgrade\
  \ to this version as soon as possible.\n\n---\n\n### Workarounds\n\nIf upgrading is not immediately\
  \ possible:\n\n- Do not allow untrusted input to control the `KEDRO_LOGGING_CONFIG` environment\
  \ variable  \n- Restrict write access to logging configuration files  \n- Avoid using externally\
  \ supplied or dynamically generated logging configs  \n- Manually validate logging YAML to\
  \ ensure it does not contain the `()` key  \n\nThese mitigations reduce risk but do not fully\
  \ eliminate it."
