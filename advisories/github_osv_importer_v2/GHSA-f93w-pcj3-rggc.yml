summary: "Pingora vulnerable to cache poisoning via insecure-by-default cache key\n### Impact\n\
  Pingora versions prior to 0.8.0 generated cache keys using only the URI path, excluding critical\
  \ factors such as the host header. This allows an attacker to poison the cache and serve cross-origin\
  \ responses to users.\n\nThis vulnerability affects users of Pingora's alpha proxy caching\
  \ feature who relied on the default CacheKey implementation. An attacker could exploit this\
  \ for cross-tenant data leakage in multi-tenant deployments, or serve malicious content to\
  \ legitimate users by poisoning shared cache entries.\n\nNote: Cloudflare customers and Cloudflare's\
  \ CDN infrastructure were not affected by this vulnerability, as Cloudflare's default cache\
  \ key implementation uses multiple factors to prevent cache key poisoning and never made use\
  \ of the previously provided default.\n\n### Patches\nWe strongly suggest users should upgrade\
  \ to Pingora v.0.8.0 or higher, which removes the default CacheKey implementation.\n\n###\
  \ Workarounds\nDo not rely on the provided CacheKey default, and at minimum use the host /\
  \ :authority and the upstream peer TLS scheme as part of building the CacheKey, as well as\
  \ other factors that may apply to the deployment e.g. HTTP method. \n\n### Resources\nSee\
  \ https://cve.org/CVERecord?id=CVE-2026-2836. An upcoming Cloudflare blog post will also contain\
  \ more details.\n\n### Credits\nDisclosed responsibly by Rajat Raghav (@xclow3n) through the\
  \ Cloudflare [Bug Bounty Program](https://www.cloudflare.com/disclosure/)."
