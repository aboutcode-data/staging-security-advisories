summary: "Snipe-IT has an open redirect vulnerability\nOpen redirect vulnerability in Snipe-IT\
  \ allows attackers to redirect users to malicious sites via unvalidated HTTP Referer header\
  \ stored in session variable.\n\n### Impact\n\n-   **Phishing**: Redirect users to fake login\
  \ pages to steal credentials\n-   **Session Hijacking**: Redirect to attacker site that captures\
  \ session cookies via JavaScript\n-   **Malware Distribution**: Redirect to sites hosting\
  \ malware or drive-by downloads\n-   **Reputation Damage**: Users lose trust when redirected\
  \ to malicious sites from legitimate application\n-   **Social Engineering**: Use trusted\
  \ Snipe-IT domain to increase phishing success rate\n\nWhen the user clicks \"Save\", the\
  \ application: \n1. Processes the form \n2. Checks `redirect_option` (if set to 'back') \n\
  3. Calls `Helper::getRedirectOption()` \n4. Retrieves `back_url` from session: `https://evil.com/phishing?target=snipeit`\
  \ \n5. Executes `redirect()->to($backUrl)` \n6. User is redirected to attacker's site\n\n\
  This would still require session poisoning, so the actual practical threat here is minimal.\
  \ \n\n### Patches\nPatched in https://github.com/grokability/snipe-it/commit/e37649212861a337e68a624e589c3540b7a82373,\
  \ released in 8.4.1.\n\n### Workarounds\n None.\n\n### Resources\n-   CWE-601: URL Redirection\
  \ to Untrusted Site ('Open Redirect')\n-   OWASP: Unvalidated Redirects and Forwards\n-  \
  \ Laravel Security: Safe Redirects\n\n[snipeit_open_redirect_submission.md](https://github.com/user-attachments/files/27414869/snipeit_open_redirect_submission.md)"
