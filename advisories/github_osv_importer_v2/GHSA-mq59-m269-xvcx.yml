  - CVE-2026-27978
summary: "Next.js: null origin can bypass Server Actions CSRF checks\n## Summary\n`origin: null`\
  \ was treated as a \"missing\" origin during Server Action CSRF validation. As a result, requests\
  \ from opaque contexts (such as sandboxed iframes) could bypass origin verification instead\
  \ of being validated as cross-origin requests.\n\n## Impact\nAn attacker could induce a victim\
  \ browser to submit Server Actions from a sandboxed context, potentially executing state-changing\
  \ actions with victim credentials (CSRF).\n\n## Patches\nFixed by treating `'null'` as an\
  \ explicit origin value and enforcing host/origin checks unless `'null'` is explicitly allowlisted\
  \ in `experimental.serverActions.allowedOrigins`.  \n\n## Workarounds\nIf upgrade is not immediately\
  \ possible:\n- Add CSRF tokens for sensitive Server Actions.\n- Prefer `SameSite=Strict` on\
  \ sensitive auth cookies.\n- Do not allow `'null'` in `serverActions.allowedOrigins` unless\
  \ intentionally required and additionally protected."
