summary: "free5GC AUSF UE Authentication Panic on Nil SuciSupiMap Interface Conversion\n**Impact**\
  \  \nThis is an Improper Null Check vulnerability leading to Denial of Service.  \n- **Security\
  \ Impact**: A remote attacker can cause the AUSF service to panic and crash by sending a crafted\
  \ UE authentication request that triggers a nil interface conversion in the `GetSupiFromSuciSupiMap`\
  \ function. This results in complete denial of service for the AUSF authentication service.\
  \  \n- **Functional Impact**: The `GetSupiFromSuciSupiMap` function attempts to perform an\
  \ interface conversion from `interface{}` to `*context.SuciSupiMap` without checking if the\
  \ underlying value is nil. When `SuciSupiMap` is nil, the code panics with \"interface conversion:\
  \ interface {} is nil, not *context.SuciSupiMap\".  \n- **Affected Parties**: All deployments\
  \ of free5GC v4.0.1 using the AUSF UE authentication service (`/nausf-auth/v1/ue-authentications`\
  \ endpoint).\n\n**Patches**  \nYes, the issue has been patched.  \nThe fix is implemented\
  \ in PR free5gc/ausf#52 (commit: [add specific commit hash if available]).  \nUsers should\
  \ upgrade to the next release of free5GC that includes this commit.\n\n**Workarounds**  \n\
  There is no direct workaround at the application level. The recommendation is to apply the\
  \ provided patch or restrict access to the AUSF API to trusted sources only."
