summary: "Rancher Extensions have arbitrary file access via path traversal\n### Impact\n\nA\
  \ vulnerability has been identified in [Rancher's Extensions](https://ranchermanager.docs.rancher.com/integrations-in-rancher/rancher-extensions)\
  \ where malicious code can be injected in Rancher through a path traversal in the `compressedEndpoint`\
  \ field inside a `UIPlugin` deployment. A malicious UI extension could abuse that to:\n\n\
  - Overwrite Rancher binaries or configuration to inject code.\n- Write to `/var/lib/rancher/`\
  \ to tamper with cluster state.\n- If `hostPath` volumes are mounted, write to the host node\
  \ filesystem.\n- Use this issue to chain with other attack vectors.\n\nBy default only the\
  \ administrator can deploy UI extensions, unless permissions are granted to other users. It's\
  \ always recommended to only install extensions that come from sources trusted by the user.\n\
  \nPlease consult the associated  [MITRE CAPEC-126 - Technique - Path Traversal](https://capec.mitre.org/data/definitions/126.html)\
  \ for further information about this category of attack.\n\n### Patches\n\nThis vulnerability\
  \ is addressed by ensuring that:\n\n- The file defined by the UI Plugin CR's `compressedEndpoint`\
  \ has to be created inside the cache directory and cannot contain `../`. If that is not possible,\
  \ the installation will fail and the file won't be created. \n- The icons referenced by Cluster\
  \ Repos' `index.yaml` file always resolves to a file inside the repository directory.\n\n\
  Patched versions of Rancher include releases v2.14.1, v2.13.5, v2.12.9, v2.11.13.\n\n### Workarounds\n\
  \nThere is no workaround. The user must be careful about which UI Plugins they install.\n\n\
  ### Resources\n\nIf there are any questions or comments about this advisory:\n\n- Reach out\
  \ to the [SUSE Rancher Security team](https://github.com/rancher/rancher/security/policy)\
  \ for security related inquiries.\n- Open an issue in the [Rancher](https://github.com/rancher/rancher/issues/new/choose)\
  \ repository.\n- Verify with the [support matrix](https://www.suse.com/suse-rancher/support-matrix/all-supported-versions/)\
  \ and [product support lifecycle](https://www.suse.com/lifecycle/)."
