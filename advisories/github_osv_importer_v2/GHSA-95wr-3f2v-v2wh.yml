summary: "Craft CMS has a host header injection leading to SSRF via resource-js endpoint\n###\
  \ Summary\n\nThe `resource-js` endpoint in Craft CMS allows unauthenticated requests to proxy\
  \ remote JavaScript resources. \nWhen `trustedHosts` is not explicitly restricted (default\
  \ configuration), the application trusts the client-supplied Host header. \n\nThis allows\
  \ an attacker to control the derived `baseUrl`, which is used in prefix validation inside\
  \ `actionResourceJs()`. \nBy supplying a malicious Host header, the attacker can make the\
  \ server issue arbitrary HTTP requests, leading to Server-Side Request Forgery (SSRF).\n\n\
  ### Details\n\nThe vulnerability exists in `AppController::actionResourceJs()`.\n\nThe function\
  \ validates that the `url` parameter starts with `assetManager->baseUrl`. However, `baseUrl`\
  \ is derived from the current request host. If `trustedHosts` is not configured, the Host\
  \ header is fully attacker-controlled.\n\nAttack chain:\n\n1. Attacker sends request with\
  \ controlled `Host` header.\n2. Application derives `baseUrl` from the malicious Host.\n3.\
  \ `url` parameter is required to start with this `baseUrl`.\n4. Validation passes.\n5. Guzzle\
  \ performs a server-side HTTP request to the attacker-controlled host.\n6. SSRF occurs.\n\n\
  This does not rely on string parsing bypass. It relies on Host header trust.\n\n### PoC (safe\
  \ reproduction steps)\n\nEnvironment:\n- Craft CMS 5.9.12\n- Default configuration (no trustedHosts\
  \ restriction)\n- Docker deployment\n\n1. Start a listener inside the container:\n   python3\
  \ -m http.server 9999\n\n2. Send a request to resource-js with a controlled Host header.\n\
  \n3. Observe that the internal listener receives a request (OOB confirmation)."
