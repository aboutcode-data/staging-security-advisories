summary: "Next.js: HTTP request smuggling in rewrites\n## Summary\nWhen Next.js rewrites proxy\
  \ traffic to an external backend, a crafted `DELETE`/`OPTIONS` request using `Transfer-Encoding:\
  \ chunked` could trigger request boundary disagreement between the proxy and backend. This\
  \ could allow request smuggling through rewritten routes.\n\n## Impact\nAn attacker could\
  \ smuggle a second request to unintended backend routes (for example, internal/admin endpoints),\
  \ bypassing assumptions that only the configured rewrite destination/path is reachable. This\
  \ does not impact applications hosted on providers that handle rewrites at the CDN level,\
  \ such as Vercel. \n\n## Patches\nThe vulnerability originated in an upstream library vendored\
  \ by Next.js. It is fixed by updating that dependency’s behavior so `content-length: 0` is\
  \ added only when both `content-length` and `transfer-encoding` are absent, and `transfer-encoding`\
  \ is no longer removed in that code path.\n\n## Workarounds\nIf upgrade is not immediately\
  \ possible:\n- Block chunked `DELETE`/`OPTIONS` requests on rewritten routes at your edge/proxy.\n\
  - Enforce authentication/authorization on backend routes per our [security guidance](https://nextjs.org/docs/app/guides/data-security)."
