summary: "Payload has a CSRF Protection Bypass in Authentication Flow\n### Impact\n\nA Cross-Site\
  \ Request Forgery (CSRF) vulnerability existed in the authentication flow. Under certain conditions,\
  \ the configured CSRF protection could be bypassed, allowing cross-site requests to be made.\n\
  \nConsumers are affected if ALL of these are true:\n\n- Payload version **< v3.79.1**\n- `serverURL`\
  \ is configured\n\n### Patches\n\nThis vulnerability has been patched in **v3.79.1**. Additional\
  \ validation has been added to the authentication flow.\n\nConsumers should upgrade to **v3.79.1**\
  \ or later.\n\n### Workarounds\n\nThere is no complete workaround without upgrading. \n\n\
  If consumers cannot upgrade immediately, setting `cookies.sameSite` to `'Strict'` will prevent\
  \ the session cookie from being sent cross-site. However, this will also require users to\
  \ re-authenticate when navigating to the application from external links (e.g. email, other\
  \ sites)."
