summary: "Gokapi has Data Leak in Upload Status Stream\n## Description\n\nThe upload status\
  \ SSE implementation on `/uploadStatus` publishes global upload state to any authenticated\
  \ listener and includes `file_id` values that are not scoped to the requesting user. \n\n\
  ## Impact\n\nAny authenticated user can observe other users' file identifiers and retrieve\
  \ unauthorized content, causing cross-tenant data exposure and loss of confidentiality for\
  \ uploaded documents.\n\n*Issue found by [aisafe.io](https://aisafe.io)*"
