summary: "Ghost Vulnerable to Remote Code Execution via Malicious Themes\n### Impact\n\nSpecifically\
  \ crafted malicious themes can execute arbitrary code on the server running Ghost. \n\n###\
  \ Vulnerable Versions\n\nThis vulnerability is present in Ghost v0.7.2 to v6.19.0.\n\n###\
  \ Patches\n\nv6.19.1 contains a fix for this issue.\n\n### Workarounds\n\nGhost generally\
  \ recommends users refrain from installing untrusted themes. If a malicious theme has already\
  \ been installed, it is recommended to uninstall the theme and then inspect it to understand\
  \ its impact, which will be attack-specific. \n\n### References\nGhost thanks Cristian-Alexandru\
  \ Staicu at Endor Labs for disclosing this vulnerability responsibly. \n\n### For more information\n\
  \nIf there are any questions or comments about this advisory, email Ghost at [security@ghost.org](mailto:security@ghost.org)."
