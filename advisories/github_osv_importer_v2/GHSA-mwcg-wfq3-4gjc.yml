summary: "OpenClaw's system.run approval TOCTOU via mutable symlink cwd target on node host\n\
  ### Summary\nIn `openclaw@2026.2.24`, approval-bound `system.run` on node hosts could be influenced\
  \ by mutable symlink `cwd` targets between approval and execution.\n\n### Details\nApproval\
  \ matching on the gateway validated command/argv and binding fields, including `cwd`, as provided\
  \ text. Node execution later used runtime `cwd` resolution. A symlinked `cwd` could therefore\
  \ be retargeted after approval and before spawn.\n\nOpenClaw's trust model does not treat\
  \ one shared gateway as a multi-tenant adversarial boundary, but approval integrity is still\
  \ a security boundary for operator-reviewed command execution.\n\n### Affected Packages /\
  \ Versions\n- Package: `openclaw` (npm)\n- Affected: `<= 2026.2.24`\n- Patched: `>= 2026.2.25`\
  \ \n\n### Fix Commit(s)\n- `f789f880c934caa8be25b38832f27f90f37903db`\n\n### Remediation\n\
  The fix adds defense-in-depth hardening for approval-bound node execution:\n- reject symlink\
  \ `cwd` paths for approval-bound `system.run`\n- canonicalize path-like executable argv before\
  \ spawn\n- bind CLI approval requests to exact `commandArgv`\n\n### Release Process Note\n\
  Patched version is pre-set to the release (`2026.2.25`). Advisory published with npm release\
  \ `2026.2.25`.\n\nOpenClaw thanks @tdjackey for reporting."
