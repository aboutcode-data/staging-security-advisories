summary: "Dapr: Service Invocation path traversal ACL bypass\n### Summary\n\nA vulnerability\
  \ has been found in Dapr that allows bypassing access control policies for service invocation\
  \ using reserved URL characters and path traversal sequences in method paths. The ACL normalized\
  \ the method path independently from the dispatch layer, so the ACL evaluated one path while\
  \ the target application received a different one.\n\nUsers who have configured access control\
  \ policies for service invocation are strongly encouraged to upgrade Dapr to the respective\
  \ patch version `1.17.5`, `1.16.14`, and `1.15.14`.\n\n### Impact\n\nThis vulnerability impacts\
  \ Dapr users who have configured access control policies for service invocation. An attacker\
  \ who can reach the Dapr HTTP or gRPC API could:\n\n- Use encoded path traversal (ex: `admin%2F..%2Fpublic`)\
  \ to reach an allowed path while the method started from a denied prefix.\n- Use encoded fragment\
  \ (`%23`) or query (`%3F`) characters to cause the ACL to evaluate a different path than what\
  \ was delivered to the target application.\n\n### Patches\n\nUsers should upgrade immediately\
  \ to their respective Dapr version `1.17.5`, `1.16.14`, and `1.15.14`.\n\n### Details\n\n\
  Dapr supports access control policies for service invocation, which allow operators to restrict\
  \ which methods an application is permitted to call on a target app. When a request arrives,\
  \ Dapr evaluates the method path against the configured policy before dispatching to the target.\n\
  \nPrior to this fix, the ACL and the dispatch layer normalized the method path independently.\
  \ The ACL used `purell.NormalizeURLString`, which decoded `%XX` sequences, resolved `../`,\
  \ and stripped `#` and `?` as URL delimiters. The dispatch layer used the raw method string.\
  \ This mismatch meant the ACL authorized one path while the target application received a\
  \ different one.\n\nFor example, a method of `admin%2F..%2Fpublic` was normalized by the ACL\
  \ to public (allowed), but the target application received `admin/../public`. \n\nThe gRPC\
  \ API was the more dangerous vector because gRPC passes method strings raw — `#`, `?`, `../`,\
  \ and control characters were all delivered literally with no client-side sanitization.\n\n\
  ### References\n\n[This PR](https://github.com/dapr/dapr/pull/9589) signaled to us about the\
  \ CVE, special thanks to @dbconfession78 for the efforts here and the original PR."
