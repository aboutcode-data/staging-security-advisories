summary: "Data Sharing Framework has an Inverted Time Comparison in OIDC JWKS and Token Cache\n\
  ### Affected Components\n- DSF FHIR Server with enabled [bearer-token authentication](https://dsf.dev/operations/v2.1.0/fhir/oidc.html)\
  \ or [back-channel logout](https://dsf.dev/operations/v2.1.0/fhir/oidc.html).\n- DSF BPE Server\
  \ with enabled [bearer-token authentication](https://dsf.dev/operations/v2.1.0/bpe/oidc.html)\
  \ or [back-channel logout](https://dsf.dev/operations/v2.1.0/bpe/oidc.html).\n- DSF BPE Server\
  \ API v2 process plugins using [FHIR client connections](https://dsf.dev/operations/v2.1.0/bpe/fhir-client-connections.html)\
  \ with configured OIDC authentication.\n\n### Summary\n- The OIDC JWKS and Metadata Document\
  \ caches used an inverted time comparison (`isBefore` instead of `isAfter`), causing the cache\
  \ to **never return cached values**. Every incoming request triggered a fresh HTTP fetch of\
  \ the OIDC Metadata Document and JWKS keys from the OIDC provider.\n- The OIDC token cache\
  \ for the [FHIR client connections](https://dsf.dev/operations/v2.1.0/bpe/fhir-client-connections.html)\
  \ used an inverted time comparison (`isBefore` instead of `isAfter`), causing the cache to\
  \ **never invalidate**. Every incoming request returned the same OIDC token even if expired.\n\
  \n### Impact\n- **Performance:** Every OIDC-authenticated request added network round-trips\
  \ to the OIDC provider, increasing latency\n- **Reliability:** Cached OIDC tokens become unusable\
  \ after expiration and can only be invalidated by restart of the BPE. \n If the OIDC provider\
  \ is temporarily unreachable, all requests fail immediately instead of using cached keys\n\
  - **Load:** Unnecessary load on the OIDC provider, potentially causing rate limiting\n\n###\
  \ Fix (commits 31c2e974d, d3ca59b4d)\n- Fixed cache timeout comparison from `isBefore` to\
  \ `isAfter` in `BaseOidcClientWithCache` (configuration and JWKS caches) and `OidcClientWithCache`\
  \ (configuration, JWKS, and access token caches)\n- Added configurable cache timeouts via\
  \ `dev.dsf.server.auth.oidc.provider.client.cache.timeout.configuration.resource` and `dev.dsf.server.auth.oidc.provider.client.cache.timeout.jwks.resource`\
  \ (default: `PT1H`)"
