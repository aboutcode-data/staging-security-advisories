summary: "Scriban Affected by Memory Exhaustion (OOM) via Unbounded String Generation (Denial\
  \ of Service)\n`TemplateContext.LimitToString` defaults to `0` (unlimited). While Scriban\
  \ implements a default `LoopLimit` of 1000, an attacker can still cause massive memory allocation\
  \ via exponential string growth. Doubling a string for just 30 iterations generates over 1GB\
  \ of text, instantly exhausting heap memory and crashing the host process. Because no output\
  \ size limit is enforced, repeated string concatenation results in exponential memory growth.\n\
  \n**Proof of Concept (PoC):**\nThe following payload executes in under 30 iterations but results\
  \ in ~1GB string allocation, crashing the process.\n\n```csharp\nusing Scriban;\n\nstring\
  \ maliciousTemplate =\n    @\"\n        {{\n            a = \"\"A\"\"\n            for i in\
  \ 1..30\n                a = a + a\n            end\n            a\n        }}\";\n\nvar template\
  \ = Template.Parse(maliciousTemplate);\n\nvar context = new TemplateContext();\n\ntry\n{\n\
  \    template.Render(context);\n}\ncatch (Exception ex)\n{\n    Console.WriteLine(\"\\nException:\
  \ \" + ex.Message);\n}\n```\n\n**Impact:**\nAn attacker can supply a small template that triggers\
  \ exponential string growth, forcing the application to allocate excessive memory. This leads\
  \ to severe memory pressure, garbage collection thrashing, and eventual process termination\
  \ (DoS).\n\n**Suggested Fix:**\nEnforce a sensible default limit for string output. Set default\
  \ `LimitToString` to 1MB (1,048,576 characters). \n\n```csharp\npublic int LimitToString {\
  \ get; set; } = 1048576; \n```"
