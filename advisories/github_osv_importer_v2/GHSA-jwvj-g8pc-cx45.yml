summary: "OpenFGA's BatchCheck within-request deduplication produces incorrect authorization\
  \ decisions via list-value cache-key collision\n### Description\n\nIn OpenFGA, under specific\
  \ conditions, BatchCheck calls with multiple checks sent for the same object, relation, and\
  \ user combination can result in improper policy enforcement.\n\n### Am I affected?\n\nYou\
  \ are affected if you meet the following preconditions:\n1. You execute **BatchCheck** operations\
  \ which rely on context. \n2. Multiple checks are sent within a single BatchCheck operation\
  \ for the same user/object/relation combination, each containing context.\n3. The contexts\
  \ between those checks differ in a specific way\n\n### Fix\nUpgrade to OpenFGA v1.14.0\n\n\
  ### Acknowledgement\nOpenFGA would like to thank @bugbunny-research for the discovery and\
  \ detailed report."
