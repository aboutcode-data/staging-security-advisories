summary: "OpenClaw: OpenShell FS bridge writes stay pinned to the sandbox mount root\n## Summary\n\
  OpenShell FS bridge writes stay pinned to the sandbox mount root \n\n## Affected Packages\
  \ / Versions\n- Package: openclaw (npm)\n- Affected versions: <= 2026.4.21\n- Fixed version:\
  \ 2026.4.22\n\n## Impact\nA time-of-check/time-of-use race around OpenShell sandbox filesystem\
  \ writes could let a symlink swap redirect a write outside the intended local mount root.\n\
  \n## Fix\nOpenShell write paths now validate the canonical target against the mount root,\
  \ reject unsafe symlink parents and symlink leaves for writes, and use root-scoped write helpers\
  \ before syncing to the remote sandbox.\n\n## Fix Commit(s)\n- 7be82d4fd1193bcb7e44ee38838f00bf924ffa76\n\
  \n## Verification\n- The fix commit is contained in the public v2026.4.22 tag.\n- openclaw@2026.4.22\
  \ is published on npm and the compiled package contains the fix.\n- Focused regression coverage\
  \ for this path passed before publication.\n\nThanks @VladimirEliTokarev for reporting."
