summary: "Flowise has IDOR leading to Account Takeover and Enterprise Feature Bypass via SSO\
  \ Configuration\n### Summary\nThe Flowise platform has a critical Insecure Direct Object Reference\
  \ (IDOR) vulnerability combined with a Business Logic Flaw in the PUT /api/v1/loginmethod\
  \ endpoint.\n\nWhile the endpoint requires authentication, it fails to validate if the authenticated\
  \ user has ownership or administrative rights over the target organizationId. This allows\
  \ any low-privileged user (including \"Free\" plan users) to:\n\n1. Overwrite the SSO configuration\
  \ of any other organization.\n2. Enable \"Enterprise-only\" features (SSO/SAML) without a\
  \ license.\n3. Perform Account Takeover  by redirecting the authentication flow.\n\n### Details\n\
  The backend accepts the organizationId parameter from the JSON body and updates the database\
  \ record corresponding to that ID. There is no middleware or logic check to ensure request.user.organizationId\
  \ === body.organizationId.\n\n### PoC\nPrerequisites:\n1. The attacker creates a standard\
  \ \"Free\" account and obtains a valid JWT token (Cookie/Header).\n2. The attacker identifies\
  \ the target organizationId (e.g., bd2b74e0-e0cd-4bb5-ba98-3cc2ae683d5d).\n\n**Step-by-Step\
  \ Exploitation**: The attacker sends the following PUT request to overwrite the victim's Google\
  \ SSO configuration.\n\n**Request**:\n\n```http\nPUT /api/v1/loginmethod HTTP/2\nHost: cloud.flowiseai.com\n\
  Cookie: token=<ATTACKER_JWT_TOKEN>\nContent-Type: application/json\nAccept: application/json\n\
  \n{\n  \"organizationId\": \"bd2b74e0-e0cd-4bb5-ba98-3cc2ae683d5d\",\n  \"userId\": \"6ab311fa-0d0a-4bd6-996e-4ae721377fb2\"\
  , \n  \"providers\": [\n    {\n      \"providerLabel\": \"Google\",\n      \"providerName\"\
  : \"google\",\n      \"config\": {\n        \"clientID\": \"ATTACKER_MALICIOUS_CLIENT_ID\"\
  ,\n        \"clientSecret\": \"ATTACKER_MALICIOUS_SECRET\"\n      },\n      \"status\": \"\
  enable\"\n    }\n  ]\n}\n```\n\n**Response**: The server responds with 200 OK, confirming\
  \ the modification has been applied to the victim's organization context.\n\n```json\n{\n\
  \  \"status\": \"OK\",\n  \"organizationId\": \"bd2b74e0-e0cd-4bb5-ba98-3cc2ae683d5d\"\n}\n\
  ```\n\n### Impact\n\n- **Account Takeover**: An attacker can replace a victim organization's\
  \ legitimate OAuth credentials (e.g., Google Client ID) with their own malicious application\
  \ credentials. When victim employees try to log in via SSO, they are authenticated against\
  \ the attacker's application, potentially allowing the attacker to hijack sessions or steal\
  \ credentials.\n- **License Control Bypass**: Users on the \"Free\" tier can illicitly enable\
  \ and configure SSO providers (Azure, Okta, etc.), which are features strictly restricted\
  \ to the \"Enterprise\" plan."
