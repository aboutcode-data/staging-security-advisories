  - CVE-2026-27980
summary: "Next.js: Unbounded next/image disk cache growth can exhaust storage\n## Summary\n\
  The default Next.js image optimization disk cache (`/_next/image`) did not have a configurable\
  \ upper bound, allowing unbounded cache growth.\n\n## Impact\nAn attacker could generate many\
  \ unique image-optimization variants and exhaust disk space, causing denial of service. Note\
  \ that this does not impact platforms that have their own image optimization capabilities,\
  \ such as Vercel.\n\n## Patches\nFixed by adding an LRU-backed disk cache with `images.maximumDiskCacheSize`,\
  \ including eviction of least-recently-used entries when the limit is exceeded. Setting `maximumDiskCacheSize:\
  \ 0` disables disk caching. \n\n## Workarounds\nIf upgrade is not immediately possible:\n\
  - Periodically clean `.next/cache/images`.\n- Reduce variant cardinality (e.g., tighten values\
  \ for `images.localPatterns`, `images.remotePatterns`, and `images.qualities`)"
