summary: "Backstage vulnerable to potential reading of SCM URLs using built in token\n### Impact\n\
  \nA vulnerability in the SCM URL parsing used by Backstage integrations allowed path traversal\
  \ sequences in encoded form to be included in file paths. When these URLs were processed by\
  \ integration functions that construct API URLs, the traversal segments could redirect requests\
  \ to unintended SCM provider API endpoints using the configured server-side integration credentials.\n\
  \nThis affects instances that use any of the SCM integrations (GitHub, Bitbucket Server, Bitbucket\
  \ Cloud) with the scaffolder or other features that accept user-provided SCM URLs.\n\n###\
  \  Patches\n\nThis is patched in `@backstage/integration` version 1.20.1.\n\n### Workarounds\n\
  \nThere is no workaround for this vulnerability. Users should upgrade to the patched version.\n\
  \n###  References \n\n  - Backstage SCM integration documentation: https://backstage.io/docs/integrations/"
