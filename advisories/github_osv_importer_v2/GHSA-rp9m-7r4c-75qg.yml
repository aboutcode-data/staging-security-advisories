summary: "fast-jwt: Cache Confusion via cacheKeyBuilder Collisions Can Return Claims From a\
  \ Different Token (Identity/Authorization Mixup)\n## Impact\n\nSetting up a custom cacheKeyBuilder\
  \ method which does not properly create unique keys for different tokens can lead to cache\
  \ collisions. This could cause tokens to be mis-identified during the verification process\
  \ leading to:\n\n- Valid tokens returning claims from different valid tokens\n- Users being\
  \ mis-identified as other users based on the wrong token\n\nThis could result in:\n- User\
  \ impersonation - UserB receives UserA's identity and permissions\n- Privilege escalation\
  \ - Low-privilege users inherit admin-level access\n- Cross-tenant data access - Users gain\
  \ access to other tenants' resources\n- Authorization bypass - Security decisions made on\
  \ wrong user identity\n\n## Affected Configurations\n\nThis vulnerability ONLY affects applications\
  \ that BOTH:\n\n1. Enable caching using the cache option\n2. Use custom cacheKeyBuilder functions\
  \ that can produce collisions\n\nVULNERABLE examples:\n```\n// Collision-prone: same audience\
  \ = same cache key\ncacheKeyBuilder: (token) => {\n  const { aud } = parseToken(token)\n \
  \ return `aud=${aud}`\n}\n\n// Collision-prone: grouping by user type\ncacheKeyBuilder: (token)\
  \ => {\n  const { aud } = parseToken(token)\n  return aud.includes('admin') ? 'admin-users'\
  \ : 'regular-users'\n}\n\n// Collision-prone: tenant + service grouping\ncacheKeyBuilder:\
  \ (token) => {\n  const { iss, aud } = parseToken(token)\n  return `${iss}-${aud}`\n}\n```\n\
  \nSAFE examples:\n```\n// Default hash-based (recommended)\ncreateVerifier({ cache: true })\
  \  // Uses secure default\n\n// Include unique user identifier\ncacheKeyBuilder: (token) =>\
  \ {\n  const { sub, aud, iat } = parseToken(token)\n  return `${sub}-${aud}-${iat}`\n}\n\n\
  // No caching (always safe)\ncreateVerifier({ cache: false })\n```\n### Not Affected\n\n-\
  \ Applications using **default caching**\n- Applications with **caching disabled**\n \n##\
  \ Assessment Guide\n\nTo determine if a consumer application is affected:\n\n1. Check if caching\
  \ is enabled: Look for cache: true or cache: <number> in verifier configuration\n2. Check\
  \ for custom cache key builders: Look for cacheKeyBuilder function in configuration\n3. Analyze\
  \ collision potential: Review if the application's cacheKeyBuilder can produce identical keys\
  \ for different users/tokens\n4. If no custom cacheKeyBuilder: The project is NOT affected\
  \ (default is safe)\n\n## Mitigations\n\nWhile fast-jwt will look to include a fix for this\
  \ in the next version, immediate mitigations include:\n\n- Ensure uniqueness of keys produced\
  \ in cacheKeyBuilder\n- Remove custom cacheKeyBuilder method\n- Disable caching"
