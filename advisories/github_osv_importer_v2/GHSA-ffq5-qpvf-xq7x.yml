summary: "OpenC3 COSMOS is Vulnerable to Self-XSS Through the Command Sender\n### Summary\n\
  The Command Sender UI uses an unsafe `eval()` function on array-like command parameters, which\
  \ allows a user-supplied payload to execute in the browser when sending a command. This creates\
  \ a self-XSS risk because an attacker can trigger their own script execution in the victim’s\
  \ session, if allowed to influence the array parameter input, for example via phishing. If\
  \ successful, an attacker may read or modify data in the authenticated browser context, including\
  \ session tokens in local storage.\n\n### Details\nThe unsafe `eval()`  usage on user-supplied\
  \ ARRAY parameters happens in `convertToValue` method in [CommandSender.vue](https://github.com/OpenC3/cosmos/blob/main/openc3-cosmos-init/plugins/packages/openc3-cosmos-tool-cmdsender/src/tools/CommandSender/CommandSender.vue)\n\
  \n### PoC\n1.\tUsing a drop-down form, choose any command that supports ARRAY parameters,\n\
  2.\tInside square brackets “[…]” place a JavaScript code to be executed\n3.\tSend command\
  \ to CmdTlmServer using dedicated “Send” button \n4.\tObserve JavaScript code being executed\
  \ in the current browser session context\n\nBelow example uses `INST ARYCMD` to execute simple\
  \ JavaScript code snippet `alert(“XSS”)`.\n<img width=\"947\" height=\"356\" alt=\"image\"\
  \ src=\"https://github.com/user-attachments/assets/6fbdb6c9-616a-4268-bbb8-a8a1044437ad\"\
  \ />\n\n<img width=\"942\" height=\"545\" alt=\"image\" src=\"https://github.com/user-attachments/assets/4df24353-aea0-4aa0-adcf-b7c7e387dc83\"\
  \ />\n\n### Impact\nLocal JavaScript execution in the user's browser"
