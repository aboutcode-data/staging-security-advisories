summary: "Grav: Stored XSS via page title (data[header][title]) in admin panel\n### Summary\n\
  _A Stored Cross-Site Scripting (XSS) vulnerability was identified in the /admin/pages/[page]\
  \ endpoint of the Grav application. This vulnerability allows attackers to inject malicious\
  \ scripts into the data[header][title] parameter._\n\n--- \n\n### Details\nVulnerable Endpoint:\
  \ GET /admin/pages/[page]\nParameter: data[header][title]\n\nThe application fails to properly\
  \ validate and sanitize user input in the data[header][title] parameter. As a result, attackers\
  \ can craft a malicious URL with an XSS payload. When this URL is accessed, the injected script\
  \ is reflected back in the HTTP response and executed within the context of the victim's browser\
  \ session.\n\n--- \n\n### PoC\n**Payload:** `<img src=1 onerror=alert(1)>`\n\n1. Log in to\
  \ the Grav Admin Panel and navigate to Pages.\n \n2. Create a new page or edit an existing\
  \ one.\n\n3. Edit title of the page to  `<img src=1 onerror=alert(1)>`\n\n<img width=\"1897\"\
  \ height=\"700\" alt=\"image\" src=\"https://github.com/user-attachments/assets/77a129ca-5c2b-4743-8c56-c17fa456eefa\"\
  \ />\n\n4. Save page\n \n5. Open the move function and click on the folder having the payload\n\
  \n<img width=\"1904\" height=\"984\" alt=\"image\" src=\"https://github.com/user-attachments/assets/44f8f88f-76c4-449f-8c4e-11e8e2c51d8f\"\
  \ />\n\n<img width=\"1902\" height=\"995\" alt=\"image\" src=\"https://github.com/user-attachments/assets/1dc2ef15-e534-4e87-93ea-92bc573af7f1\"\
  \ />\n\n--- \n\n### Impact\n\nStored cross-site scripting (XSS) attacks can have serious consequences,\
  \ including:\n\n- User actions: Attackers can perform actions on behalf of the user\n\n- Data\
  \ theft: Sensitive information such as session cookies can be stolen\n\n- Account compromise:\
  \ Attackers may impersonate legitimate users\n\n- Malicious code execution: Arbitrary JavaScript\
  \ code can run in the user’s browser\n\n- Website defacement or misinformation: Malicious\
  \ output may be injected visually\n\n- User redirection: Victims may be redirected to phishing\
  \ or malicious websites\n\nBy [Vu Duc Hieu](https://github.com/vdh1612) \nContributor [Simon\
  \ Tran](https://github.com/simontranduy)"
