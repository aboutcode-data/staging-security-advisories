summary: "Angular Expressions - Remote Code Execution using filters\n## Impact\n\nAn attacker\
  \ can write a malicious expression that escapes the sandbox to execute arbitrary code on the\
  \ system.\n\nExample of vulnerable code:\n\n```\nconst expressions = require(\"angular-expressions\"\
  );\nconst result = expressions.compile(\"a | __proto__\")({}, {});\n```\n\nThis should throw\
  \ the error : Filter '__proto__' is not defined, however, this shows : \n\nUncaught SyntaxError:\
  \ Unexpected identifier 'Object'\n\nWith a more complex (undisclosed) payload, one can get\
  \ full access to Arbitrary code execution on the system.\n\n## Vulnerable versions : \n\n\
  angular-expressions <= 1.5.1\n\n## Patches\n\nThe problem has been patched in version 1.5.2\
  \ of angular-expressions.\n\n## Credits\n\nCredits go to San Gil from [www.securityoffice.io](https://securityoffice.io/)\
  \ who has found the issue and reported it to us."
