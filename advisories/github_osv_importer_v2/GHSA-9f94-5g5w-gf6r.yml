summary: "CRL Distribution Point Scope Check Logic Error in AWS-LC\n### Summary\n\nAWS-LC is\
  \ an open-source, general-purpose cryptographic library.\n\n### Impact \n\nA logic error in\
  \ CRL distribution point matching in AWS-LC allows a revoked certificate to bypass revocation\
  \ checks during certificate validation, when the application enables CRL checking and uses\
  \ partitioned CRLs with Issuing Distribution Point (IDP) extensions.\n\nCustomers of AWS services\
  \ do not need to take action. aws-lc-sys and aws-lc-fips-sys contain code from AWS-LC. Applications\
  \ using aws-lc-sys or aws-lc-fips-sys should upgrade to the most recent releases of aws-lc-sys\
  \ or aws-lc-fips-sys.\n\n### Impacted versions:\n* aws-lc-sys >= v0.15.0, < v0.39.0\n* aws-lc-fips-sys\
  \ >= v0.13.0, < v0.13.13\n\n### Patches \n\nThe patch is included in aws-lc-sys v0.39.0 and\
  \ aws-lc-fips-sys v0.13.13.\n\n### Workarounds\n\nApplications can workaround this issue if\
  \ they do not enable CRL checking (X509_V_FLAG_CRL_CHECK). Applications using complete (non-partitioned)\
  \ CRLs without IDP extensions are also not affected.\n\nOtherwise, there is no workaround\
  \ and applications using aws-lc-sys or aws-lc-fips-sys should upgrade to the most recent releases\
  \ of aws-lc-sys or aws-lc-fips-sys.\n\n### References\n\nIf you have any questions or comments\
  \ about this advisory, we ask that you contact AWS Security via our [vulnerability reporting\
  \ page](https://aws.amazon.com/security/vulnerability-reporting/) or directly via email to\
  \ [aws-security@amazon.com](mailto:aws-security@amazon.com). Please do not create a public\
  \ GitHub issue."
