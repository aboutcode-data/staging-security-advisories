summary: "skilleton has improper input handling in repository/path processing\n## Summary\n\n\
  `skilleton` versions prior to `0.3.1` include security-related weaknesses in repository normalization\
  \ and path handling logic.  \nVersion `0.3.1` contains fixes and additional test coverage\
  \ for these issues.\n\n## Affected Versions\n\n`<0.3.1`\n\n## Patched Versions\n\n`>=0.3.1`\n\
  \n## Impact\n\nIn affected versions, crafted input could trigger unsafe or inefficient behavior\
  \ in repository/path processing code paths.  \n`0.3.1` mitigates this by:\n- replacing vulnerable\
  \ parsing behavior with deterministic logic,\n- validating subpaths earlier before allocating\
  \ git worktree resources,\n- adding stricter and broader regression tests around these flows.\n\
  \n## Severity\n\nLow to Moderate (project-maintainer assessed)\n\n## Mitigation\n\nUpgrade\
  \ to `0.3.1` or later.\n\n## Workarounds\n\nNo complete workaround is recommended other than\
  \ upgrading.\n\n## References\n\n- Branch: [`fix/security-code-scanning-alerts`](https://github.com/Fcmam5/skilleton/pull/9)\n\
  - Commits:\n  - [fix(security): harden git arg handling and path validation](https://github.com/Fcmam5/skilleton/pull/9/changes/42bc280ad675bfaa7b1bbc192330fb582bb28172)\n\
  \  - [fix(security): use while loop in normalizeRepoUrl instead of regex](https://github.com/Fcmam5/skilleton/pull/9/changes/6613160803ec8655efee9a270eeaa767ad22da8b)\n\
  - Security Policy: [SECURITY.md](https://github.com/Fcmam5/skilleton/blob/master/SECURITY.md)\n\
  \n## Credits\n\nDetected through automated code scanning and remediated by project maintainers."
