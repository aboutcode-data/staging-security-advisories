summary: "OpenBao's Namespace Deletion May Not Delete Data Properly\n### Impact\n\nWhen OpenBao's\
  \ initial namespace deletion fails, subsequent retries fail to properly remove all data before\
  \ marking the namespace as deleted. This can affect any outstanding leases as well as potentially\
  \ leaving unrelated storage entries around. \n\n### Patches\n\nThis will be patched in OpenBao\
  \ v2.5.3.\n\n### Workarounds\n\nUsers may manually remove mounts prior to deleting the namespace.\
  \ \n\nAudit logs may be used to identify repeated deletion attempts against the same namespace;\
  \ `sys/raw` can be used to see what leases were not correctly deleted."
