summary: "Zarf has a Path Traversal via Malicious Package Metadata.Name — Arbitrary File Write\n\
  ### Impact\nThis vulnerability impacts users of `zarf package inspect sbom` or `zarf package\
  \ inspect documentation` on untrusted packages.\n\n### Patches\n#4793, now fixed in version\
  \ v0.74.2\n\n### Workarounds\nAvoid inspecting unsigned packages\n\n## Description\n\nThe\
  \ `package inspect sbom` and `package inspect documentation` subcommands construct output\
  \ file paths by joining a user-controlled output directory with the package's `Metadata.Name`\
  \ field, which is attacker-controlled data read from the package archive. The `Metadata.Name`\
  \ field is validated against a regex on create, `^[a-z0-9][a-z0-9\\-]*$`, however a malicious\
  \ user could unarchive a package to change the `.Metadata.Name` field and the files inside\
  \ the SBOMS.tar.  This would lead to arbitrary file write in a location of the attackers choosing.\
  \ \n\nNeither location sanitizes or validates the package name before using it in the file\
  \ path.\n\n**SBOM inspection:**\n```go\noutputPath := filepath.Join(o.outputDir, pkgLayout.Pkg.Metadata.Name)\n\
  err = pkgLayout.GetSBOM(ctx, outputPath)\n```\n\n**Documentation inspection (line 1219):**\n\
  ```go\noutputPath := filepath.Join(o.outputDir, fmt.Sprintf(\"%s-documentation\", pkgLayout.Pkg.Metadata.Name))\n\
  return pkgLayout.GetDocumentation(ctx, outputPath, o.keys)\n```\n\n`pkgLayout.Pkg.Metadata.Name`\
  \ is read directly from the untrusted package's `zarf.yaml` manifest. An attacker can craft\
  \ a malicious Zarf package where `Metadata.Name` contains path traversal sequences or root\
  \ paths such as `../../etc/cron.d/malicious` or `/home/user/.ssh/authorized_keys`.\n\n###\
  \ CVSS Explainations\n#### Attack Vector\nVerdict: Network\nA malicious package could be published\
  \ to OCI and inspected directly with `zarf package inspect sbom oci://<bad-package>`\n\n####\
  \ Attack Complexity \nVerdict: Low\nIt is not complicated to make and publish a malicious\
  \ package. The Attacker only needs to edit the zarf.yaml and sboms.tar then edit the checksums.\n\
  \n#### Privileges Required\nVerdict: None\nThe attacker is relying on the runner of `zarf\
  \ package inspect sbom|documentation` and needs no other privileges.\n\n#### User Interaction\n\
  Verdict: Required\nThe user must run the inspect command\n\n#### Scope\nVerdict: Unchanged\n\
  The vulnerability operates entirely within the permissions of the user running zarf package\
  \ inspect. The file write can't escape the privilege boundary of that user \n\n#### Confidentiality\n\
  Verdict: None\nThis is an arbitrary file write vulnerability. The attacker can place or overwrite\
  \ files on the filesystem but the vulnerability does not provide any mechanism to read or\
  \ exfiltrate data from the target system.\n\n#### Integrity\nVerdict: High\nThe attacker controls\
  \ both the file path (via Metadata.Name) and the file content (via the SBOM or documentation\
  \ files inside the archive). This allows writing attacker-controlled content to arbitrary\
  \ locations on the filesystem, limited only by the permissions of the user running the inspect\
  \ command. Realistic exploitation includes writing SSH authorized_keys, cron jobs, or shell\
  \ profiles.\n\n### Availability\nVerdict: Low\nThe vulnerability does not directly target\
  \ service availability. However, an attacker could overwrite files that cause system disruption."
