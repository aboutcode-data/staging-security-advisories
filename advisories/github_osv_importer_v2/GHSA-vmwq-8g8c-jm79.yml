summary: "OpenChatBI has a Path Traversal Vulnerability in save_report Tool\n### Impact\nThe\
  \ `save_report` tool in `openchatbi/tool/save_report.py` suffers from a critical path traversal\
  \ vulnerability due to insufficient input sanitization of the `file_format` parameter. \n\n\
  The function only removes leading dots of `file_format` using `file_format.lstrip(\".\")`\
  \ but allows path traversal sequences like `/../../` to pass through unchanged. When the filename\
  \ is constructed via string concatenation in \n\n    f\"{timestamp}_{clean_title}.{file_format}\"\
  \n\nmalicious path sequences are preserved, enabling attackers to write files outside the\
  \ designated report directory. \n\nAn attacker can manipulate the LLM to call the tool with\
  \ a specific `file_format` to overwrite critical system files like `__init__.py`, potentially\
  \ leading to remote code execution.\n\n\n### Patches\n- Affected versions:\n<=0.2.1\n- Patched\
  \ versions:\n0.2.2 (includes fix from PR #12: https://github.com/zhongyu09/openchatbi/pull/12)\n\
  \n### Workarounds\nNo\n\n### References\n- Issue #10: https://github.com/zhongyu09/openchatbi/issues/10\n\
  - PR #12: https://github.com/zhongyu09/openchatbi/pull/12"
