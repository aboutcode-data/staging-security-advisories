summary: "Eclipse Jetty: Early return from the JASPIAuthenticator code can potentially no clear\
  \ ThreadLocal variables\n### Description (as reported)\n\nA security vulnerability has been\
  \ identified in Jetty's  `JaspiAuthenticator.java`. \n\nThe root cause is a failure to consistently\
  \ clear authentication metadata stored in  `ThreadLocal`  during certain error or incomplete\
  \ authentication flows. \nSpecifically, after a `GroupPrincipalCallback`  is persisted into\
  \ the  `ThreadLocal`, the authentication process may exit prematurely — before the  `ThreadLocal`\
  \  storage is cleared — if a mandatory `CallerPrincipalCallback`  is missing or an exception\
  \ occurs. \nThis allows a subsequent, unprivileged user processed by the same worker thread\
  \ to inherit these residual security roles, leading to Broken Access Control and Privilege\
  \ Escalation.\n\nSee also attached PDF.\n\n### Impact\nAn unauthenticated user may gain ungrated\
  \ privileges from a previous request (privilege escalation).\n\n### Patches\nNo patches yet.\n\
  \n### Workarounds\nDo not use Jetty's JASPI."
