summary: "Payload has an SQL Injection via Query Handling\n### Impact\n\nCertain request inputs\
  \ were not properly validated. An attacker could craft requests that influence SQL query execution,\
  \ potentially exposing or modifying data in collections.\n\n### Patches\n\nThis issue has\
  \ been fixed in **v3.79.1** and later. Query input validation has been hardened.\n\nUpgrade\
  \ to **v3.79.1 or later**.\n\n### Workarounds\n\nUntil developers can upgrade:\n\n- Limit\
  \ access to endpoints that accept dynamic query inputs to trusted users only.  \n- Validate\
  \ or sanitize input from untrusted clients before sending it to query endpoints."
