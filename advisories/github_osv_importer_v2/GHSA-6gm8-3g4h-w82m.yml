summary: "Ella Core Panics Upon NGAP handover failure\n## Summary\n\nElla Core panics when processing\
  \ a NGAP handover failure message.\n\n## Impact\n\nIf an attacker can force a gNodeB to send\
  \ NGAP handover failure messages to Ella Core, the process will crash, thereby disrupting\
  \ service for all connected subscribers.\n\n## Fix \n\nImprove guards in NGAP handover handlers."
