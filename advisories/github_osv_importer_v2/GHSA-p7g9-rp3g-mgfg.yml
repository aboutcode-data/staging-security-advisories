summary: "Backstage: Catalog unprocessed read endpoints allow authenticated cross-owner data\
  \ access without permission checks\n### Impact   \n\n  The unprocessed entities read endpoints\
  \ in `@backstage/plugin-catalog-backend-module-unprocessed` do not enforce permission authorization\
  \ checks. Any authenticated user can access unprocessed entity records regardless of ownership.\
  \ This is \n  an information disclosure vulnerability affecting Backstage installations using\
  \ this module.                                                                     \n    \
  \                                                                    \n  ### Patches     \
  \        \n                                         \n  This is patched in `@backstage/plugin-catalog-backend-module-unprocessed`\
  \ version 0.6.11, `@backstage/plugin-catalog-unprocessed-entities-common` version 0.0.15 and\
  \ `@backstage/plugin-catalog-unprocessed-entities` version 0.2.30. Users should upgrade all\
  \ packages.                                    \n   \n  ### Workarounds                  \
  \                                                                                        \
  \                                                                                        \
  \                                \n                                                      \
  \                  \n  If users cannot upgrade, they can remove the `@backstage/plugin-catalog-backend-module-unprocessed`\
  \ module from their backend until the patch is applied. There is no configuration-based workaround\
  \ to add permission checks to these endpoints    \n  without upgrading."
impacted_packages:
  - purl: pkg:npm/%40backstage/plugin-catalog-unprocessed-entities-common
    affected_versions: vers:npm/<0.0.15
    fixed_versions: vers:npm/0.0.15
