summary: "Egress Policy Bypass via DNS over TCP in Harden-Runner (Community Tier)\n## Summary\n\
  \nA vulnerability exists in the Community Tier of Harden-Runner that allows bypassing the\
  \ `egress-policy: block` network restriction using DNS queries over TCP.\n\nHarden-Runner\
  \ enforces egress policies on GitHub runners by filtering outbound connections at the network\
  \ layer. When `egress-policy: block` is enabled with a restrictive allowed-endpoints list\
  \ (e.g., only `github.com:443`), all non-compliant traffic should be denied. However, DNS\
  \ queries over TCP, commonly used for large responses or fallback from UDP, are not adequately\
  \ restricted. Tools like `dig` can explicitly initiate TCP-based DNS queries (`+tcp` flag)\
  \ without being blocked. \n\nThis vulnerability requires the attacker to already have code\
  \ execution capabilities within the GitHub Actions workflow.\n\nThe Enterprise Tier of Harden-Runner\
  \ is **not affected** by this vulnerability.\n\n## Impact\n\nWhen Harden-Runner is configured\
  \ with `egress-policy: block` and a restrictive `allowed-endpoints` list, an attacker with\
  \ existing code execution capabilities within a GitHub Actions workflow can bypass the egress\
  \ block policy by initiating DNS queries over TCP to external resolvers. This allows outbound\
  \ network communication that evades the configured network restrictions.\n\nThis vulnerability\
  \ affects only the Community Tier. It requires the attacker to already have code execution\
  \ capabilities within the GitHub Actions workflow.\n\n## Remediation\n\n### For Community\
  \ Tier Users\n\nUpgrade to Harden-Runner v2.16.0 or later. \n\n### For Enterprise Tier Users\n\
  \nNo action required. Enterprise tier customers are not affected by this vulnerability.\n\n\
  ## Credit \n\nWe would like to thank [Devansh Batham](https://github.com/devanshbatham) for\
  \ responsibly disclosing this vulnerability through our security reporting process."
