summary: "Authenticated Apache ActiveMQ Broker and Apache ActiveMQ users could perform RCE via\
  \ Jolokia MBeans\nImproper Input Validation, Improper Control of Generation of Code ('Code\
  \ Injection') vulnerability in Apache ActiveMQ Broker, Apache ActiveMQ.\n\nApache ActiveMQ\
  \ Classic exposes the Jolokia JMX-HTTP bridge at /api/jolokia/ on the web console. The default\
  \ Jolokia access policy permits exec operations on all ActiveMQ MBeans (org.apache.activemq:*),\
  \ including\nBrokerService.addNetworkConnector(String) and BrokerService.addConnector(String).\
  \ \n\nAn authenticated attacker can invoke these operations with a crafted discovery URI that\
  \ triggers the VM transport's brokerConfig parameter to load a remote Spring XML application context\
  \ using ResourceXmlApplicationContext. \nBecause Spring's ResourceXmlApplicationContext instantiates\
  \ all singleton beans before the BrokerService validates the configuration, arbitrary code\
  \ execution occurs on the broker's JVM through bean factory methods such as Runtime.exec().\n\
  This issue affects Apache ActiveMQ Broker: before 5.19.4, from 6.0.0 before 6.2.3; Apache\
  \ ActiveMQ: .\n\nUsers are recommended to upgrade to version 5.19.5 or 6.2.3, which fixes\
  \ the issue."
