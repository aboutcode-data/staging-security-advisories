summary: "Open WebUI: Unauthenticated endpoint can trigger embedding generation (cost/DoS)\n\
  ### Summary\nGET `/api/v1/memories/ef` is accessible without authentication and executes `request.app.state.EMBEDDING_FUNCTION(...)`.\
  \ This allows any unauthenticated caller to trigger embedding generation which can lead to\
  \ direct cost exposure if a paid provider is used.\nCode reference: `backend/open_webui/routers/memories.py`\
  \ (@router.get(\"/ef\") -> calls `request.app.state.EMBEDDING_FUNCTION(\"hello world\"))`.\n\
  \n\n### Details\nGET `/api/v1/memories/ef` is reachable without authentication and triggers\
  \ request.app.state.EMBEDDING_FUNCTION(\"hello world\"). This crosses an intended security\
  \ boundary by allowing unauthenticated users to invoke potentially expensive embedding computation\
  \ and/or paid upstream embedding APIs.\n\n### PoC\n1. Start Open WebUI in default configuration\
  \ (no special env hardening; default ENABLE_MEMORIES is true).\n2. From an unauthenticated\
  \ client (no cookies/Authorization header), call:\n      curl -i http://\\<host\\>:\\<port\\\
  >/api/v1/memories/ef\n   3. Observe the server performs embedding generation and returns a\
  \ response like:\n   - HTTP 200 with JSON containing the result.\n\nHow it can be abused /\
  \ attacker actions:\n\n- Send repeated requests to `/api/v1/memories/ef` to:\n  - consume\
  \ CPU/GPU resources (DoS)\n  - generate sustained outbound usage to embedding providers if\
  \ configured (cost + rate-limit exhaustion)\n  - degrade latency/availability for legitimate\
  \ users\n \n### Impact\nIf embeddings are configured to use paid/remote providers (OpenAI/Azure/etc),\
  \ an attacker can generate unlimited requests and incur charges.\n\n## Resolution\n\nFixed\
  \ in commit [e5035ea31](https://github.com/open-webui/open-webui/commit/e5035ea31e179977e805a7032c979ff59a71860a),\
  \ first released in **v0.8.0** (Feb 2026). The `/api/v1/memories/ef` route was removed entirely.\
  \ It was a diagnostic/debug-style endpoint that hard-coded `\"hello world\"` through the embedding\
  \ function without any authentication dependency; there was no legitimate caller that depended\
  \ on it, so deletion was the cleaner fix than retrofitting auth. Users on `>= 0.8.0` are not\
  \ affected."
