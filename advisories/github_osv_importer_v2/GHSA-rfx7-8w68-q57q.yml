summary: "etcd: Nested etcd transactions bypass RBAC authorization checks\n### Impact\n_What\
  \ kind of vulnerability is it? Who is impacted?_\n\nAn authenticated user with RBAC restricted\
  \ permissions on key ranges can use nested transactions to bypass all key-level authorization.\
  \ This allows any authenticated user with direct access to etcd to effectively ignore all\
  \ key range restrictions, accessing the entire etcd data store.  \n \nKubernetes does not\
  \ rely on etcd’s built-in authentication and authorization. Instead, the API server handles\
  \ authentication and authorization itself, so typical Kubernetes deployments are not affected.\n\
  \n### Patches\n_Has the problem been patched? What versions should users upgrade to?_\n\n\
  This vulnerability is patched in the following versions:\n\n* etcd 3.6.9\n* etcd 3.5.28\n\
  * etcd 3.4.42\n\n### Workarounds\n_Is there a way for users to fix or remediate the vulnerability\
  \ without upgrading?_\n\nIf upgrading is not immediately possible, reduce exposure by treating\
  \ the affected\nRPCs as unauthenticated in practice.\n\n* restrict network access to etcd\
  \ server ports so only trusted components can connect\n* require strong client identity at\
  \ the transport layer, such as mTLS with tightly scoped client certificate\ndistribution\n\
  \n### Reporters\n_Our community helps keep etcd secure_\n\nSIG-Etcd thanks community members\
  \ Luke Francis and Battulga Byambaa for reporting this vulnerability."
