summary: "OpenHands is Vulnerable to Command Injection through its Git Diff Handler\n## Summary\n\
  \nA Command Injection vulnerability exists in the `get_git_diff()` method at `openhands/runtime/utils/git_handler.py:134`.\
  \ The `path` parameter from the `/api/conversations/{conversation_id}/git/diff` API endpoint\
  \ is passed unsanitized to a shell command, allowing authenticated attackers to execute arbitrary\
  \ commands in the agent sandbox. The user is already allowed to instruct the agent to execute\
  \ commands, but this bypasses the normal channels.\n\n---\n\n## Details\n\n### Vulnerable\
  \ Code Path\n\nThe vulnerability flows through these files:\n\n1. **API Endpoint** (`openhands/server/routes/files.py:267-277`)\n\
  ```python\n@app.get('/git/diff')\nasync def git_diff(\n    path: str,  # <-- User input from\
  \ HTTP request\n    ...\n):\n    ...\n    diff = await call_sync_from_async(runtime.get_git_diff,\
  \ path, cwd)  # No sanitization\n```\n\n2. **Runtime** (`openhands/runtime/base.py:1231-1233`)\n\
  ```python\ndef get_git_diff(self, file_path: str, cwd: str) -> dict[str, str]:\n    self.git_handler.set_cwd(cwd)\n\
  \    return self.git_handler.get_git_diff(file_path)  # Passed directly\n```\n\n3. **Vulnerable\
  \ Method** (`openhands/runtime/utils/git_handler.py:10-12, 134`)\n```python\n# Command template\
  \ with placeholder\nGIT_DIFF_CMD = 'python3 /openhands/code/openhands/runtime/utils/git_diff.py\
  \ \"{file_path}\"'\n\n# Line 134 - VULNERABLE: User input directly interpolated\nresult =\
  \ self.execute(self.git_diff_cmd.format(file_path=file_path), self.cwd)\n```\n\n4. **Shell\
  \ Execution** (`openhands/runtime/utils/git_diff.py:25-27`)\n```python\ndef run(cmd: str,\
  \ cwd: str) -> str:\n    result = subprocess.run(\n        args=cmd,\n        shell=True,\
  \  # <-- Enables shell metacharacter interpretation\n        stdout=subprocess.PIPE,\n   \
  \     stderr=subprocess.PIPE,\n        cwd=cwd\n    )\n```\n\n### Root Cause\n\nThe `file_path`\
  \ parameter is directly interpolated into a shell command string using Python's `.format()`\
  \ method without any sanitization. When this command is executed with `shell=True`, shell\
  \ metacharacters like `\"`, `;`, and `#` are interpreted, allowing command injection.\n\n\
  **Example:**\n- Input: `test\"; id #`\n- Constructed command: `python3 /script.py \"test\"\
  ; id #\"`\n- Shell interprets as two commands: `python3 /script.py \"test\"` AND `id`\n\n\
  ---\n\n## Impact\n\n### Who is Affected\n- All OpenHands deployments exposing the `/api/conversations/{id}/git/diff`\
  \ endpoint\n- Any authenticated user can exploit this vulnerability, \n\n### Attack Capabilities\n\
  An attacker can:\n1. **Execute arbitrary commands** on the runtime container as root\n2. **Read\
  \ sensitive files** including `.env`, API keys, source code\n3. **Write arbitrary files**\
  \ to inject malicious code\n4. **Establish reverse shells** for persistent access\n5. **Potentially\
  \ escape the container** if Docker is misconfigured\n\n## Mitigation \n\nUsers should update\
  \ to the latest version of OpenHands that includes the changes from PR #13051. The fix replaces\
  \ direct shell string formatting with proper argument array handling or rigorous path sanitization\
  \ to prevent command chaining."
