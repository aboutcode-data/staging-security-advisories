summary: "Ghost has incomplete CSRF protections around OTC use\n### Impact\n\nIncomplete CSRF\
  \ protections around `/session/verify` made it possible to use OTCs in login sessions different\
  \ from the requesting session. In some scenarios this might have made it easier for phishers\
  \ to take over a Ghost site. \n\n### Vulnerable versions\n\nThis vulnerability is present\
  \ in Ghost from v5.101.6 up to v6.19.2.\n\n### Patches\n\nv6.19.3 contains a fix for this\
  \ issue.\n\n### How to update\n\nFor self-hosters using Docker, find [Docker's official Ghost\
  \ image here](https://hub.docker.com/_/ghost). Updating a Docker-based Ghost instance [is\
  \ documented here](https://docs.ghost.org/install/docker#updating-ghost). \n\nIf a project's\
  \ Ghost is a Ghost-CLI install see the documentation on [updating it to the latest version\
  \ here](https://docs.ghost.org/update). \n\n### For more information\n\nIf there are any questions\
  \ or comments about this advisory, send an email to [security@ghost.org](mailto:security@ghost.org)."
