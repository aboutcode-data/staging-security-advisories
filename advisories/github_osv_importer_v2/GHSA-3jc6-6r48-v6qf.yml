  - CVE-2026-6594
summary: |
  Deep Merge is Vulnerable to Prototype Pollution Through Lack of Sanitization
  A Prototype Pollution vulnerability was determined in brikcss merge up to 1.3.0. Executing a manipulation of the argument __proto__/constructor.prototype/prototype can lead to improperly controlled modification of object prototype attributes. The attack may be performed from remote. The vendor was contacted early about this disclosure but did not respond in any way.
