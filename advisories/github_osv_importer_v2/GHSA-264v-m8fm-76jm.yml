summary: "nimiq-transaction: Panic via `HistoryTreeProof` length mismatch\n### Impact\n`HistoryTreeProof::verify`\
  \ panics on a malformed proof where `history.len() != positions.len()` due to `assert_eq!(history.len(),\
  \ positions.len())`. \n\nThe proof object is derived from untrusted p2p responses (`ResponseTransactionsProof.proof`)\
  \ and is therefore attacker-controlled at the network boundary until validated. A malicious\
  \ peer could trigger a crash by returning a crafted inclusion proof with a length mismatch.\n\
  \n### Patches\n[The patch for this vulnerability](https://github.com/nimiq/core-rs-albatross/commit/6ff0800e8e031363e787c827d8d033e5694e4e6a)\
  \ is included as part of [v1.3.0](https://github.com/nimiq/core-rs-albatross/releases/tag/v1.3.0).\n\
  \n### Workarounds\nNo known workarounds know."
