summary: "Zitadel is missing enforcement of organization scopes\n### Summary\n\nA vulnerability\
  \ in Zitadel's OAuth2/OIDC interface, which allowed users to bypass organization enforcement\
  \ during authentication.\n\n### Impact\n\nZitadel allows applications to enforce an organzation\
  \ context during authentication using [scopes](https://zitadel.com/docs/apis/openidoauth/scopes#reserved-scopes)\
  \ (`urn:zitadel:iam:org:id:{id}` and `urn:zitadel:iam:org:domain:primary:{domainname}`). If\
  \ enforced, a user needs to be part of the required organization to sign in.\n\nWhile this\
  \ was properly enforced for OAuth2/OIDC authorization requests in login V1, corresponding\
  \ controls were missing for device authorization requests and all login V2 and OIDC API V2\
  \ endpoints.\nThis allowed users to bypass the restriction and sign in with users from other\
  \ organizations.\n\nNote that this enforcement allows for an additional check during authentication\
  \ and applications relying on authorizations / roles assignments are not affected by this\
  \ bypass.\n\n### Affected Versions\n\nSystems running one of the following versions are affected:\n\
  - **4.x**: `4.0.0` through `4.12.2` (including RC versions)\n- **3.x**: `3.0.0` through `3.4.8`\
  \ (including RC versions)\n\n### Patches\n\nThe vulnerability has been addressed in the latest\
  \ releases. The patch resolves the issue by validating the provided scopes and enforcing the\
  \ organization existence when processing the authorization request. Additionally it will prevent\
  \ the use of a session of a user which does not belong to the required organization on the\
  \ OIDC service endpoints ([CreateCallback](https://zitadel.com/docs/reference/api/oidc/zitadel.oidc.v2.OIDCService.CreateCallback)\
  \ and [Authorize or Deny Device Authorization](https://zitadel.com/docs/reference/api/oidc/zitadel.oidc.v2.OIDCService.AuthorizeOrDenyDeviceAuthorization)\
  \ endpoints).\n\n4.x: Upgrade to >=[4.12.3](https://github.com/zitadel/zitadel/releases/tag/v4.12.3)\n\
  3.x: Update to >=[3.4.9](https://github.com/zitadel/zitadel/releases/tag/v3.4.9)\n\n### Workarounds\n\
  \nThe recommended solution is to upgrade to a patched version. \n\n### Questions\n\nIf you\
  \ have any questions or comments about this advisory, please email us at [security@zitadel.com](mailto:security@zitadel.com)\n\
  \n### Credits\n\nThanks to @motoki317 for reporting this vulnerability."
