summary: "Ruby JSON has a format string injection vulnerability\n### Impact\n\nA format string\
  \ injection vulnerability than that lead to denial of service attacks or information disclosure,\
  \ when the `allow_duplicate_key: false` parsing option is used to parse user supplied documents.\
  \ \n\nThis option isn't the default, if you didn't opt-in to use it, you are not impacted.\n\
  \n### Patches\n\nPatched in `2.19.2`.\n\n### Workarounds\n\nThe issue can be avoided by not\
  \ using the `allow_duplicate_key: false` parsing option."
