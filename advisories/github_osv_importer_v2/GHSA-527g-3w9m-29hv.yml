summary: "mitmproxy has an LDAP Injection\n### Impact\nIn mitmproxy 12.2.1 and below, the builtin\
  \ LDAP proxy authentication does not correctly sanitize the username when querying the LDAP\
  \ server. This allows a malicious client to bypass authentication.\n\nOnly mitmproxy instances\
  \ using the `proxyauth` option with LDAP are affected. This option is not enabled by default.\n\
  \n### Patches\n\nThe vulnerability has been fixed in mitmproxy 12.2.2 and above.\n\n### Acknowledgements\n\
  \nWe thank Yue (Knox) Liu (@yueyueL) for responsibly disclosing this vulnerability to the\
  \ mitmproxy team.\n\n### Timeline\n\n- **2025-12-08**: Received initial report. \n- **2025-12-09**:\
  \ Verified report and confirmed receipt.\n- **2026-01-02**: Informed researcher that patch\
  \ will be part of the next regular patch release.\n- **2026-04-12**: Published patch release\
  \ and advisory."
