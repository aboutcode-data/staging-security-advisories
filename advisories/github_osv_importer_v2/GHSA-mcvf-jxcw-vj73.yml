  - CVE-2026-41255
summary: "CKAN has CSRF exemption primed by anonymous requests\nViews can be marked as exempt\
  \ from CSRF protection \n\nAccess to the views via tokens or unauthenticated requests marked\
  \ the endpoint as not requiring CSRF protection. \n\nThe marking was a member variable in\
  \ flask-wtf.csrf.CSRFProtect(), which was stored as a module level variable in the flask_app\
  \ middleware. Thsi API was never intended for request level changes, it is primarily a decorator\
  \ for static configuration. \n\nAn unauthenticated request could hit a protected endpoint,\
  \ exempting it from CSRF protection for the life of the particular server process. (e.g. one\
  \ worker of uwsgi).\n\nThis could be leveraged with XSS to perform actions using other user's\
  \ credentials.\n\n### References\n\n* [Vulnerability report](https://github.com/Shirshaw64p/security-advisories/tree/main/CVE-2026-41255)\
  \ by @Shirshaw64p (original reporter)"
