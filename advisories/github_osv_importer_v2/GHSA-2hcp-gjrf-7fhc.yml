aliases:
  - CVE-2026-33012
summary: "Micronaut Framework vulnerable to a Denial of Service in HTML error response caching\n\
  `DefaultHtmlErrorResponseBodyProvider` in `io.micronaut:micronaut-http-server` since `4.7.0`\
  \ and until `4.10.7` used an unbounded `ConcurrentHashMap` cache with no eviction policy.\
  \ If the application throws an exception whose message may be influenced by an attacker, for\
  \ example, including request query value parameters,  this could be used by remote attackers\n\
  to cause a denial of service (unbounded heap growth and OutOfMemoryError). \n\nFixed via:\
  \ https://github.com/micronaut-projects/micronaut-core/commit/1e2ba2c14386af3d47751732d02053a72b0b49b3"
impacted_packages:
  - purl: pkg:maven/io.micronaut/micronaut-http-server
