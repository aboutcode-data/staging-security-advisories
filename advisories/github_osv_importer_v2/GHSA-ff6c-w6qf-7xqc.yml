summary: "CSS Parser: Improper Certificate Validation allows MITM injection of remote CSS content\n\
  ### Summary\n\nThe CSS Parser gem does not validate HTTPS connections, allowing a Man-in-the-Middle\
  \ (MITM) attacker to inject or modify CSS content when stylesheets are loaded via HTTPS. The\
  \ connection is established with `OpenSSL::SSL::VERIFY_NONE`, meaning any HTTPS certificate—even\
  \ entirely untrusted—will be accepted without validation.\n\n### Details\n\nIn `lib/css_parser/parser.rb`,\
  \ the HTTP client sets:\nhttps://github.com/premailer/css_parser/blob/3f91e8db7547fac50ab50cb7f9920f785f722740/lib/css_parser/parser.rb#L646\n\
  \n```ruby\nhttp.verify_mode = OpenSSL::SSL::VERIFY_NONE\n```\n\nAs a result, the library does\
  \ not validate the authenticity of HTTPS connections and does not protect against man-in-the-middle\
  \ attacks. Any attacker in a position to intercept network traffic can inject or modify CSS\
  \ loaded via HTTPS URLs without detection or warning.\n\n### PoC\n\n1. Set up a test Ruby\
  \ project that uses the CSS Parser gem and loads an external stylesheet over HTTPS.\n2. Use\
  \ a local proxy (such as mitmproxy or Burp Suite) to intercept outgoing HTTPS requests.\n\
  3. Present a fake self-signed certificate to the client.\n4. Inject custom CSS into the intercepted\
  \ HTTPS response.\n   \nThe request will succeed and the injected CSS will be delivered to\
  \ the application, as the connection is not validated.\n\n### References\n \nhttps://github.com/premailer/css_parser/issues/185\n\
  \n### Impact\n\nApplications using CSS Parser to load remote stylesheets over HTTPS are vulnerable\
  \ to CSS injection and content manipulation, regardless of the trust status of the remote\
  \ server. All users who use CSS Parser to fetch external CSS over HTTPS may be impacted.\n\
  \n### Credit\n\nThis vulnerability was uncovered by @JLLeitschuh of the @braze-inc security\
  \ team."
