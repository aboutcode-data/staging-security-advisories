summary: "parse-server's file creation and deletion bypasses `readOnlyMasterKey` write restriction\n\
  ### Impact\n\nThe `readOnlyMasterKey` can be used to create and delete files via the Files\
  \ API (`POST /files/:filename`, `DELETE /files/:filename`). This bypasses the read-only restriction\
  \ which violates the access scope of the `readOnlyMasterKey`.\n\nAny Parse Server deployment\
  \ that uses `readOnlyMasterKey` and exposes the Files API is affected. An attacker with access\
  \ to the `readOnlyMasterKey` can upload arbitrary files or delete existing files.\n\n### Patches\n\
  \nThe fix adds permission checks to both the file upload and file delete handlers.\n\n###\
  \ Workarounds\n\nThere is no workaround other than not using `readOnlyMasterKey`, or restricting\
  \ network access to the Files API endpoints.\n\n### References\n \n- GitHub security advisory:\
  \ https://github.com/parse-community/parse-server/security/advisories/GHSA-xfh7-phr7-gr2x\n\
  - Fix for Parse Server 9: https://github.com/parse-community/parse-server/releases/tag/9.5.0-alpha.3\n\
  - Fix for Parse Server 8: https://github.com/parse-community/parse-server/releases/tag/8.6.5"
