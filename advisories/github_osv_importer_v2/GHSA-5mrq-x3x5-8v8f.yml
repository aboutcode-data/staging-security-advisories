summary: "Jupyter Server's Authentication Cookies Remain Valid After Password Reset and Server\
  \ Restart\n## Summary\n\nA persistent cookie secret vulnerability allows authenticated users\
  \ to maintain indefinite access even after password changes. \n\nThe cookie secret used to\
  \ sign authentication cookies is stored in a permanent file (`~/.local/share/jupyter/runtime/jupyter_cookie_secret`)\
  \ that is never automatically rotated or cleared, allowing stolen or compromised cookies to\
  \ remain valid indefinitely regardless of password resets.\n\n## PoC\n\n- Start a Jupyter\
  \ server with password authentication: `jupyter server password`, `jupyter server`\n- Log\
  \ in with the password and capture the authentication cookie (e.g., just login with a browser).\n\
  - Change the password to revoke access: `jupyter server password`\n- Restart the server\n\
  - Use the old stolen cookie => remains valid and provides full authenticated access.\n\n##\
  \ Impact\n\n- All jupyter-server deployments using password authentication where security\
  \ incidents may occur\n- Multi-user systems where one user's compromised session should be\
  \ revocable by administrators\n- Shared or public-facing Jupyter servers where credential\
  \ rotation is a security requirement\n- Any deployment where password changes are expected\
  \ to revoke existing sessions\n\n## Patches\n\nJupyter Server 2.18+\n\n## Workaround\n\n```bash\n\
  rm ~/.local/share/jupyter/runtime/jupyter_cookie_secret\n# Then restart the server\n```"
