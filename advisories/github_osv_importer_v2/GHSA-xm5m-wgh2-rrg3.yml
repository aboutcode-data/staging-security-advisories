summary: "Sigstore Timestamp Authority has Improper Certificate Validation in verifier\n###\
  \ Authorization bypass via certificate bag manipulation in sigstore/timestamp-authority verifier\n\
  \nAn authorization bypass vulnerability exists in sigstore/timestamp-authority verifier (timestamp-authority/v2/pkg/verification):\
  \ `VerifyTimestampResponse` function correctly verifies the certificate chain but when the\
  \ TSA specific constraints are verified in `VerifyLeafCert`, the first non-CA certificate\
  \ from the PKCS#7 certificate bag is used instead of the leaf certificate from the certificate\
  \ chain. An attacker can exploit this by prepending a forged certificate to the certificate\
  \ bag while the message is signed with an authorized key. The library validates the signature\
  \ using the one certificate but performs authorization checks on the another, allowing an\
  \ attacker to bypass some authorization controls. \n\nThis vulnerability does **not** apply\
  \ to timestamp-authority service, only to users of `timestamp-authority/v2/pkg/verification`\
  \ package.\n\nThis vulnerability does **not** apply to sigstore-go even though it is a user\
  \ of `timestamp-authority/v2/pkg/verification`: Providing `TSACertificate` option to  `VerifyTimestampResponse`\
  \ fully mitigates the issue.\n\n\n### Patches\n\nThe issue will be fixed in timestamp-authority\
  \ 2.0.6\n\n### Workarounds\n\nUsers of `VerifyTimestampResponse` can use the `TSACertificate`\
  \ option to specify the exact certificate they expect to be used: this fully mitigates the\
  \ issue.\n\n### References\n\nThis issue was found after reading CVE-2026-33753 / GHSA-3xxc-pwj6-jgrj\
  \ (originally reported by @Jaynornj and @Pr00fOf3xpl0it)"
