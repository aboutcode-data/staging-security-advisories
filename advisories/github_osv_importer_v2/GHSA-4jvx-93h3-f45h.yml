summary: "OpenC3 COSMOS allows arbitrary writes to plugins directory via path-traversed config\
  \ filenames\n### Summary\nOpenC3 COSMOS contains a design flaw in the `save_tool_config()`\
  \ function that allows saving tool configuration files at arbitrary locations inside the shared\
  \ `/plugins` directory tree by supplying crafted configuration filenames. Although the implementation\
  \ sufficiently mitigates standard path traversal attacks, by canonicalizing filename to an\
  \ absolute path, all plugins share this same root directory. That enables users to create\
  \ arbitrary file structures and overwrite existing configuration files within the shared `/plugins`\
  \ directory.\n\n### Details\nIn function `save_tool_config()` ([local_mode.rb](https://github.com/OpenC3/cosmos/blob/397abec0d57972881a2e8dc10902d0dce9c27f42/openc3/lib/openc3/utilities/local_mode.rb#L452))\
  \  responsible for saving user-supplied tool configuration, the desired saving directory is\
  \ not sufficiently enforced, instead allowing writes inside entire `OPENC3_LOCAL_MODE_PATH`.\n\
  \n### PoC\n1.\tNavigate to any tool that enables “Save Configuration” option in left-hand\
  \ drop-down menu (here Limits Monitor as an example)\n2.\tSave a new config with path traversal\
  \ name using “../” sequences to escape desired directory (up to 3 levels high)\n3.\tObserve\
  \ new files created in /plugins directory by inspecting docker container directly (`openc3-COSMOS-cmd-tlm-api`)\
  \ or using Bucket Explorer (`plugin_default`)\n\n<img width=\"811\" height=\"584\" alt=\"\
  image\" src=\"https://github.com/user-attachments/assets/015a59b4-8b18-4801-aef0-df4831d5c1c3\"\
  \ />\n<img width=\"720\" height=\"664\" alt=\"image\" src=\"https://github.com/user-attachments/assets/8ca4a5b7-ee45-4c3b-99f6-f41f974a74a7\"\
  \ />\n\n### Impact\nModifying the data of other plugins"
