  - CVE-2026-33180
summary: "HAPI FHIR HTTP authentication leak in redirects\n### Impact\nWhen setting headers\
  \ in HTTP requests, the internal HTTP client sends headers first to the host in the initial\
  \ URL but also, if asked to follow redirects and a 30X HTTP response code is returned, to\
  \ the host mentioned in URL in the Location: response header value.\n\nSending the same set\
  \ of headers to subsequent hosts is a problem as this header often contains privacy sensitive\
  \ information or data that could allow others to impersonate the  client's request.\n\n###\
  \ Patches\nThis issue has been patched in release 6.8.3 \n\n### Workarounds\nNone."
