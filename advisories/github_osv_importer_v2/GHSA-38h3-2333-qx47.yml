summary: "OpenTelemetry .NET has potential memory exhaustion via unbounded pooled-list sizing\
  \ in Jaeger exporter conversion path\n### Summary\n\n> [!IMPORTANT]  \n> There is no plan\
  \ to fix this issue as `OpenTelemetry.Exporter.Jaeger` was deprecated in 2023. It is for informational\
  \ purposes only.\n\n`OpenTelemetry.Exporter.Jaeger` may allow sustained memory pressure when\
  \ the internal pooled-list sizing grows based on a large observed span/tag set and that enlarged\
  \ size is reused for subsequent allocations. Under high-cardinality or attacker-influenced\
  \ telemetry input, this can increase memory consumption and potentially cause denial of service.\n\
  \n### Details\n\nThe Jaeger exporter conversion path can append tag/event data into pooled\
  \ list structures. In affected versions, pooled allocation sizing may be influenced by large\
  \ observed payloads and reused globally across later allocations, resulting in persistent\
  \ oversized rentals and elevated memory pressure. In environments where telemetry attributes/events\
  \ can be influenced by untrusted input and limits are increased from defaults, this may lead\
  \ to process instability or denial of service.\n\n### Impact\n\nAvailability impact only.\
  \ Confidentiality and integrity impacts are not expected.\n\n### Workarounds / Mitigations\n\
  \n* Prefer maintained exporters (for example OpenTelemetry Protocol format (OTLP)) instead\
  \ of the Jaeger exporter."
