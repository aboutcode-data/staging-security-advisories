summary: "Arcane has Unauthenticated SSRF with Conditional Response Reflection in Template Fetch\
  \ Endpoint\n### Summary\nThe /api/templates/fetch endpoint accepts a caller-supplied url parameter\
  \ and performs a server-side HTTP GET request to that URL without authentication and without\
  \ URL scheme or host validation. The server's response is returned directly to the caller.\
  \ type. This constitutes an unauthenticated SSRF vulnerability affecting any publicly reachable\
  \ Arcane instance.\n\n### Details\n- No allowlist or denylist of destination hosts/CIDRs\n\
  - No requirement for the caller to be authenticated\n\nResponse handling produces four distinct\
  \ outcomes observable by the caller: \n- Valid JSON targets return a fully reflected response\
  \ body if the returned fields fit the expected internal struct\n- Non-JSON HTTP 200 responses\
  \ produce an error leaking the first byte of the response (`\"Invalid JSON response: invalid\
  \ character '<'...\"`)\n- Non-200 responses leak the HTTP status code\n- TCP-level failures\
  \ distinguish between closed ports (`\"connection refused\"`) and filtered ones (`\"i/o timeout\"\
  `)\n\n### PoC\nSend an unauthenticated GET request to `/api/templates/fetch`, passing the\
  \ target URL as the `url` query parameter.\n\n<img width=\"1041\" height=\"375\" alt=\"image\"\
  \ src=\"https://github.com/user-attachments/assets/f9fd475e-90b0-4dec-95e1-0af6263f5bb5\"\
  \ />\n\n### Impact\n- Unauthenticated port scanning of internal networks\n- Access to internal\
  \ HTTP services not exposed to the public internet (service discovery endpoints, internal\
  \ dashboards, Kubernetes API)"
