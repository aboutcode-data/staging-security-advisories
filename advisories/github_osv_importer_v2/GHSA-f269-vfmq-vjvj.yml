summary: "Undici: Malicious WebSocket 64-bit length overflows parser and crashes the client\n\
  ### Impact\nA server can reply with a WebSocket frame using the 64-bit length form and an\
  \ extremely large length. undici's ByteParser overflows internal math, ends up in an invalid\
  \ state, and throws a fatal TypeError that terminates the process. \n\n### Patches\n\n\n Patched\
  \ in the undici version v7.24.0 and v6.24.0. Users should upgrade to this version or later.\n\
  \n### Workarounds\n\nThere are no workarounds."
