summary: "ZITADEL: Stored XSS via Default URI Redirect Leads to Account Takeover\n### Summary\n\
  \nA vulnerability in Zitadel's login V2 interface was discovered, allowing for possible account\
  \ takeover.\n\n### Impact\n\nZitadel allows organization administrators to change the default\
  \ redirect URI for their organization. This setting enables them to redirect users to an arbitrary\
  \ location after they log in.\n\nDue to missing restrictions and improper handling, malicious\
  \ javascrtipt code could be executed in Zitadel login UI (v2) using the users’ browser. \n\
  \nAn unauthenticated remote attacker can exploit this Stored XSS vulnerability, reset the\
  \ password of their victims, and take over their accounts.\n\nIt's important to note that\
  \ this specific attack vector is mitigated for accounts that have Multi-Factor Authentication\
  \ (MFA) or Passwordless authentication enabled.Stored XSS vulnerability. \n\n### Affected\
  \ Versions\n\nSystems running one of the following versions are affected:\n- **4.x**: `4.0.0`\
  \ through `4.11.1` (including RC versions)\n\n### Patches\n\nThe vulnerability has been addressed\
  \ in the latest releases. The login UI prevents execution of such code. Additionally, the\
  \ page to change the password, now always requires the user's current password regardless\
  \ of the state of the authenticated session.\n\n4.x: Upgrade to >= [4.12.0](https://github.com/zitadel/zitadel/releases/tag/v4.12.0)\n\
  \n### Workarounds\n\nThe recommended solution is to upgrade to a patched version.\n\n### Questions\n\
  \nIf there are any questions or comments about this advisory, please send an email to [security@zitadel.com](mailto:security@zitadel.com)\n\
  \n### Credits\n\nZITADEL extends thanks once again to Amit Laish from GE Vernova for finding\
  \ and reporting the vulnerability."
