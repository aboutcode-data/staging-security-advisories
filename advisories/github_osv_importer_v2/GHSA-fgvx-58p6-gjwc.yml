summary: "OpenClaw gateway agents.files symlink escape allowed out-of-workspace file read/write\n\
  ## Impact\n\nThe gateway `agents.files.get` and `agents.files.set` methods allowed symlink\
  \ traversal for allowlisted workspace files. A symlinked allowlisted file (for example `AGENTS.md`)\
  \ could resolve outside the agent workspace and be read/written by the gateway process.\n\n\
  This could enable arbitrary host file read/write within the gateway process permissions, and\
  \ chained impact up to code execution depending on which files are overwritten.\n\n## Affected\
  \ Packages / Versions\n\n- Package: `openclaw` (npm)\n- Affected versions: `<= 2026.2.24`\n\
  - Latest published vulnerable version at patch time: `2026.2.24`\n- Patched versions: `>=\
  \ 2026.2.25` \n\n## Remediation\n\n`agents.files` now resolves real workspace paths, enforces\
  \ containment for resolved targets, rejects out-of-workspace symlink targets, and keeps in-workspace\
  \ symlink targets supported. The patch also adds gateway regression tests for blocked escapes\
  \ and valid in-workspace symlink behavior.\n\n## Fix Commit(s)\n\n- `125f4071bcbc0de32e769940d07967db47f09d3d`\n\
  \n## Release Process Note\n\n`patched_versions` is intentionally pre-set to the release (`2026.2.25`).\
  \ Advisory published with npm release `2026.2.25`.\n\nOpenClaw thanks @tdjackey for reporting."
