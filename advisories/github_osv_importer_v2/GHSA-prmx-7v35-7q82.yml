summary: "a11y-mcp: Server-Side Request Forgery (SSRF) vulnerability in A11yServer function\n\
  A vulnerability was found in priyankark a11y-mcp up to 1.0.5. This vulnerability affects the\
  \ function A11yServer of the file src/index.js. The manipulation results in server-side request\
  \ forgery. The attack must be initiated from a local position. The exploit has been made public\
  \ and could be used. This product operates on a rolling release basis, ensuring continuous\
  \ delivery. Consequently, there are no version details for either affected or updated releases.\
  \ \n\nUpgrading to version 1.0.6 is able to resolve this issue. The patch is identified as\
  \ e3e11c9e8482bd06b82fd9fced67be4856f0dffc. It is recommended to upgrade the affected component.\
  \ The vendor acknowledged the issue but provides additional context for the CVSS rating: \"\
  a11y-mcp is a local stdio MCP server - it has no HTTP endpoint and is not network-accessible.\
  \ The caller is always the local user or an LLM acting on their behalf with user approval.\""
