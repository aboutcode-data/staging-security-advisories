summary: "Hono: Path traversal in toSSG() allows writing files outside the output directory\n\
  ## Summary\n\nA path traversal issue in `toSSG()` allows files to be written outside the configured\
  \ output directory during static site generation. When using dynamic route parameters via\
  \ `ssgParams`, specially crafted values can cause generated file paths to escape the intended\
  \ output directory.\n\n## Details\n\nThe static site generation process creates output files\
  \ based on route paths derived from application routes and parameters. When `ssgParams` is\
  \ used to provide values for dynamic routes, those values are used to construct output file\
  \ paths. If these values contain traversal sequences (e.g. `..`), the resulting output path\
  \ may resolve outside the configured output directory. As a result, files may be written to\
  \ unintended locations instead of being confined within the specified output directory.\n\n\
  For example:\n \n```ts\nimport { Hono } from 'hono'\nimport { toSSG, ssgParams } from 'hono/ssg'\n\
  \nconst app = new Hono()\n\napp.get('/:id', ssgParams([{ id: '../pwned' }]), (c) => {\n  return\
  \ c.text('pwned')\n})\n\ntoSSG(app, fs, { dir: './static' })\n```\n\nIn this case, the generated\
  \ output path may resolve outside `./static`, resulting in a file being written outside the\
  \ intended output directory.\n\n## Impact\n\nAn attacker who can influence values passed to\
  \ `ssgParams` during the build process may be able to write files outside the intended output\
  \ directory.\n\nDepending on the build and deployment environment, this may:\n\n* overwrite\
  \ unintended files\n* affect generated artifacts\n* impact deployment outputs or downstream\
  \ tooling\n\nThis issue is limited to build-time static site generation and does not affect\
  \ request-time routing."
