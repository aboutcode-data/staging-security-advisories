summary: "XSS in @leanprover/unicode-input-component\n### Impact\nProjects that use [@leanprover/unicode-input-component](https://www.npmjs.com/package/@leanprover/unicode-input-component)\
  \ are vulnerable to an XSS exploit in 0.1.9 of the package and lower. \nThe component re-inserted\
  \ text in the input element back into the input element as unescaped HTML.\n\n### Patches\n\
  The issue has been resolved in 0.2.0.\n\n### Workarounds\nReplace the unicode input component\
  \ with a basic HTML text field."
