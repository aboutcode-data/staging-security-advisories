summary: "Craft CMS has a potential information disclosure vulnerability in preview tokens\n\
  # Summary\n\nCraft CMS has a CSRF issue in the preview token endpoint at `/actions/preview/create-token`.\
  \  The endpoint accepts an attacker-supplied `previewToken`.\n\nBecause the action does not\
  \ require POST and does not enforce a CSRF token, an attacker can force a logged-in victim\
  \ editor to mint a preview token chosen by the attacker.  \n\nThat token can then be used\
  \ by the attacker (without authentication) to access previewed/unpublished content tied to\
  \ the victim’s authorized preview scope.\n\n---\n\n## Preconditions\n- Victim is logged in\
  \ to Craft control panel.\n- Victim has active preview authorization in session for target\
  \ content (e.g., opened/edited an entry).\n- The attacker must know the target’s `canonicalId`\
  \ and public URL path of that entry.\n\n## 1) Attacker prepares a fixed token\nUse any 32-character\
  \ value, for example:\n```text\naaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa\n```\n\n## 2) CSRF victim\
  \ into minting that token\nSend the victim a link (or top-level redirect) such as:\n```text\n\
  https://TARGET/actions/preview/create-token?elementType=craft%5Celements%5CEntry&canonicalId=123&siteId=1&previewToken=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa&redirect=https%3A%2F%2FTARGET%2F\n\
  ```\n\nIf the victim is logged in and authorized for `previewElement:123`, Craft creates that\
  \ exact token.\n\n## 3) Attacker accesses preview content unauthenticated\n```bash\ncurl -i\
  \ 'https://TARGET/news/known-entry-slug?token=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'\n```\n\nExpected\
  \ vulnerable behavior:\n\n- Response renders preview/unpublished state (draft/provisional\
  \ context), not just normal public content.\n\n---\n\n# Impact\n- CSRF-based minting of attacker-known\
  \ preview tokens.\n- Unauthorized access to draft/provisional/revision content via token replay.\n\
  - Stealthy one-click exploitation against logged-in editors/admins.\n- No dependency on forwarded-host\
  \ poisoning.\n\n---"
