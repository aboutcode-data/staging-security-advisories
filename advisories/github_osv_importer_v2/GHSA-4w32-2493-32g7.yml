summary: "Yamux vulnerable to remote Panic via malformed WindowUpdate credit\n### Sumary\nThe\
  \ Rust implementation of Yamux accepts `WindowUpdate` credit values from the remote peer and\
  \ applies them to per-stream send-window state.  \nA specially crafted `WindowUpdate` can\
  \ cause arithmetic overflow in send-window accounting, which triggers a panic in the connection\
  \ state machine. This is remotely reachable over a normal network connection and does not\
  \ require authentication.\n#### Attack Scenario  \nAn attacker that can establish a Yamux\
  \ session with a target node can crash the target by sending two validly encoded Yamux frames:\n\
  1. Open a stream (e.g. DATA + SYN) so the stream exists with initial send-window state (`DEFAULT_CREDIT`).\n\
  2. Send a WindowUpdate on that stream with a very large credit value (e.g. 0xFFFF_0000) such\
  \ that adding credit to the current send-window overflows u32.\n### Impact\nRemote unauthenticated\
  \ denial of service.  \nAn attacker can repeatedly trigger panics by reconnecting and replaying\
  \ the crafted frame sequence.\n### Patches\nUsers should upgrade to `yamux` `v0.13.9`\n\n\
  This vulnerability was originally submitted by @revofusion to the Ethereum Foundation bug\
  \ bounty program"
