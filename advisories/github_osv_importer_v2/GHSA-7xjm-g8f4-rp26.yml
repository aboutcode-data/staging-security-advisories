summary: "Giskard has Unsandboxed Jinja2 Template Rendering in ConformityCheck\n## Summary\n\
  \ \nThe `ConformityCheck` class in `giskard-checks` rendered the `rule` parameter through\
  \ Jinja2's default `Template()` constructor. Because the `rule` string is silently interpreted\
  \ as a Jinja2 template, a developer may not realize that template expressions embedded in\
  \ rule definitions are evaluated at runtime. In a scenario where check definitions are loaded\
  \ from an untrusted source (e.g. a shared project file or externally contributed configuration),\
  \ this could lead to arbitrary code execution.\n\n`giskard-checks` is a local developer testing\
  \ library with no network-facing service. Check definitions, including the `rule` parameter,\
  \ are provided in application code or project configuration files and executed locally. Exploitation\
  \ requires write access to a check definition and subsequent execution of the test suite by\
  \ a developer.\n\nHowever, the implicit template evaluation of the `rule` parameter is not\
  \ obvious from the API surface. This hidden behavior increases the likelihood of a developer\
  \ inadvertently passing untrusted input to it when integrating the library into a larger system.\
  \ \n\n## Affected Component\n \n`conformity.py`, line 59:\n```python\nfrom jinja2 import Template\n\
  ...\nformatted_rule = Template(self.rule).render(trace=trace)\n```\n \n## Affected Versions\n\
  \ \n`giskard-checks` < 1.0.2b1\n \n## Patched Version\n \n`giskard-checks` >= **1.0.2b1**\
  \ (template parsing removed from rule evaluation entirely)\n \n## Remediation\n \nUpgrade\
  \ to `giskard-checks` >= 1.0.2b1. The template rendering has been removed from rule evaluation.\n\
  \ \n## Credit\n \nGiskard-AI thanks @dhabaleshwar for identifying the unsandboxed template\
  \ usage."
