summary: "EC-CUBE has a Vulnerability that Allows MFA Bypass in the Administrative Interface\n\
  # Vulnerability Allowing MFA Bypass\n\n## Affected EC-CUBE Versions\nVersions: 4.1.0 – 4.3.1\n\
  \n## Vulnerability Overview\nIf an administrator’s ID and password are compromised, an issue\
  \ exists that allows an attacker to bypass the normally required two-factor authentication\
  \ (2FA) and log in to the administrative interface.\n\n## Severity and Impact\n\n**CVSS v3.1\
  \ score**  \nBase score: 6.2 / Temporal score: 5.7 / Environmental score (after mitigation\
  \ and countermeasures): 0.0\n\nAn attacker can forcibly overwrite the 2FA configuration of\
  \ an account with administrative privileges. As a result, the legitimate administrator can\
  \ be locked out, while the attacker can log in to the administrative interface and perform\
  \ unauthorized actions such as viewing sensitive information or tampering with the website.\n\
  \n## Root Cause Details\n\nThere are flaws in the access control implementation for the 2FA\
  \ settings page (`/admin/two_factor_auth/set`).\n\n1. **TwoFactorAuthListener.php**  \n  \
  \ The route for the 2FA settings page (`admin_two_factor_auth_set`) is included in the list\
  \ of routes excluded from the 2FA authentication check.\n\n2. **TwoFactorAuthController.php**\
  \  \n   Even for users who already have 2FA configured, the implementation allows reconfiguration\
  \ (overwriting) of the 2FA secret key without passing 2FA authentication.\n\n## Attack Preconditions\
  \ and Steps\n\n**Preconditions:**\n- The attacker knows the administrative user’s ID and password.\n\
  - 2FA is enabled for that user.\n\n**Attack Steps:**\n1. Attempt to log in using the ID and\
  \ password.\n2. When the 2FA code entry screen is displayed, do not enter a code; instead,\
  \ directly modify the URL to access `/admin/two_factor_auth/set`.\n3. Because access is not\
  \ denied, the attacker can generate and save (overwrite) a new 2FA secret key.\n\n\n# MFAバイパスが可能な脆弱性\n\
  \n## EC-CUBEバージョン\nバージョン:  4.1.0 ~ 4.3.1\n\n## 脆弱性の概要\n管理者のIDとパスワードが漏洩している場合、本来必要な2段階認証を回避して管理画面にログインできてしまう問題です。\n\
  \n## 深刻度と影響\n\nCVSS3.1スコア：基本評価:6.2  / 現状評価:5.7  / 環境評価(緩和・対策後):0.0 \n\n攻撃者は管理者権限を持つアカウントの2FA設定を強制的に上書きできます。これにより、正規の管理者を締め出しつつ、攻撃者自身が管理画面へログインし、機密情報の閲覧やWebサイトの改ざんなどの不正操作を行うことが可能になります。\n\
  \n## 脆弱性の詳細な原因\n\nシステムの実装において、2FA設定画面(/admin/two_factor_auth/set)へのアクセス制御に不備があり。\n\n1. TwoFactorAuthListener.php\n\
  2FA認証チェックを除外するルート設定に、設定画面(admin_two_factor_auth_set)が含まれている。\n2. TwoFactorAuthController.php\n\
  既に2FA設定済みのユーザーであっても、2FA認証を通過せずに新しい鍵の再設定(上書き)を受け入れてしまう仕様になっている。\n\n## 攻撃の成立条件と手順\n\n前提条件:\n\
  管理ユーザーのIDとパスワードを知っていること。\nそのユーザーで2FAが有効化されていること。\n\n攻撃手順:\n\n1. IDとパスワードでログインを試行する。\n2. 2FAコード入力画面が表示されるが、入力を行わずに直接URLを書き換えて\
  \ /admin/two_factor_auth/set へアクセスする。\n3. アクセスが拒否されないため、攻撃者は新しい2FA秘密鍵を発行し、保存(上書き)する。\n4. 以降、攻撃者が作成した新しい2FAコードを使ってログインが可能になる。"
