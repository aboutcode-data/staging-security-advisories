summary: "# idunno.Bluesky, idunno.AtProto and idunno.AtProto.OAuthCallback Denial of Service\
  \ Vulnerability\n\n## Impact\n\nThe `Microsoft.Bcl.Memory` package, a transitive dependency\
  \ of `idunno.AtProto` and `idunno.AtProto.OAuthCallback` had a Denial of Service security\
  \ vulnerability, [CVE-2026-26127](https://github.com/dotnet/announcements/issues/384)\n\n\
  ## Patches\n\nv1.7.0 updates the dependencies on `Duende.IdentityModel.OidcClient` and `Duende.IdentityModel.OidcClient.Extensions`\
  \ which, in turn, updates their dependency on `Microsoft.Bcl.Memory` to 10.0.4, resolving\
  \ the vulnerability.\n\n## Workarounds\n\nNo workarounds exist for this vulnerability.\n\n\
  ## How to fix the issue\n\nTo update your dependencies on `idunno.Bluesky`, `idunno.AtProto`\
  \ and `idunno.AtProto.OAuthCallback`, \n\n### Using the .NET CLI (Command Line Interface):\n\
  \n* Open a terminal or command prompt in your project's directory.\n* To update a specific\
  \ package to its latest version, use the following add package command:\n   \n  * If you are\
  \ using `idunno.Bluesky`\n    `dotnet package update idunno.Bluesky`\n\n  * If you are using\
  \ `idunno.AtProto` as a direct dependency\n    `dotnet package update idunno.AtProto`\n\n\
  \  * If you are using `idunno.AtProto.OAuthCallback` as a direct dependency\n    `dotnet package\
  \ update idunno.AtProto.OAuthCallback`\n\n### Using the NuGet Package Manager Console in Visual\
  \ Studio:\n\n* Open your project in Visual Studio.\n* Navigate to \"Tools > NuGet Package\
  \ Manager > Package Manager Console\".\n* To update a specific package to its latest version,\
  \ use the following Update-Package command:\n\n  * If you are using `idunno.Bluesky`\n   \
  \ `Update-Package -Id idunno.Bluesky`\n\n  * If you are using `idunno.AtProto` as a direct\
  \ dependency\n    `Update-Package -Id idunno.AtProto`\n\n  * If you are using `idunno.AtProto.OAuthCallback`\
  \ as a direct dependency\n    `Update-Package -Id idunno.AtProto.OAuthCallback`\n\n### NuGet\
  \ Package Manager UI in Visual Studio:\n\n* Open your project in Visual Studio.\n* Right-click\
  \ on your project in Solution Explorer and select \"Manage NuGet Packages...\" or navigate\
  \ to \"Project > Manage NuGet Packages\".\n* In the NuGet Package Manager window, select the\
  \ \"Updates\" tab. This tab lists packages with available updates from your configured package\
  \ sources.\n* Select the package(s) you wish to update. You can choose a specific version\
  \ from the dropdown or update to the latest available version.\n* Click the \"Update\" button.\n\
  \n## References\n\n*  [Microsoft Security Advisory CVE-2026-26127 – .NET Denial of Service\
  \ Vulnerability](https://github.com/dotnet/announcements/issues/384)\n*  [CVE-2026-26127](https://www.cve.org/CVERecord?id=CVE-2026-26127)"
