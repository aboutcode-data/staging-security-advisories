summary: "Flowise: Sensitive Data Leak in public-chatbotConfig\n### Summary\n\n`/api/v1/public-chatbotConfig/:id\
  \ `ep exposes sensitive data including API keys, HTTP authorization headers and internal configuration\
  \ without any authentication. An attacker with knowledge just of a chatflow UUID can retrieve\
  \ credentials stored in password type fields and HTTP headers, leading to credential theft\
  \ and more.\n\n### Details\n\nKnowledge of chatflow UUID can be obtained from embedded chat\
  \ widgets, referrer headers or logs and it's the only prerequest. \n\n`getSinglePublicChatbotConfig`\
  \ function in `packages/server/src/services/chatflows/index.ts` returns the full **flowData**\
  \ object without authorization check or data sanitization.\n\nThere is a comment as **\"Safe\
  \ as public endpoint as chatbotConfig doesn't contain sensitive credential\"** but **flowData**\
  \ does contain sensitive data such as:\n\n`type: 'password'` fields are stored in plaintext\
  \ (unstructuredAPIKey in S3File node).\nHTTP Authorization headers in POST / GET Requests\
  \ nodes.\nInternal API endpoints and webhook URLs.\n\n### PoC\n\n- Add an S3 File node, set\
  \ \"File Processing Method\" to \"Unstructured\".\n- Enter an API key in \"Unstructured API\
  \ KEY\" field or add a Requests Post node with Authorization header.\n- Save the chatflow.\n\
  \n`curl -s \"https://localhost/api/v1/public-chatbotConfig/{CHATFLOW_UUID}\"`\n\nResponse:\n\
  \n```\n{\n  \"flowData\": \"{...\\\"unstructuredAPIKey\\\":\\\"victim_key\\\"...\\\"requestsPostHeaders\\\
  \":\\\"Bearer victim_token\\\"...}\"\n}\n```\n\n### Impact\n\nImpacts all Flowise Cloud users\
  \ with chatflows containing password type fields or any HTTP headers. And self hosted Flowise\
  \ instances exposed to the internet."
