summary: "YesWiki has Persistant Blind XSS at \"/?BazaR&vue=consulter\"\n### Summary\nA stored\
  \ and blind XSS vulnerability exists in the form title field. A malicious attacker can inject\
  \ JavaScript without any authentication via a form title that is saved in the backend database.\
  \ When any user visits that injected page, the JavaScript payload gets executed.\n\nType:\
  \ Stored and Blind Cross-Site Scripting (XSS)\nAffected Component: form title input field\n\
  Authentication Required: No (Unauthenticated attack possible)\nImpact: Arbitrary JavaScript\
  \ execution in victim’s browser\n\n\n### Details\nA Stored XSS vulnerability occurs when an\
  \ application stores malicious user input (in this case, a script injected via the form title\
  \ field) in its backend database and renders it later on a page viewed by other users without\
  \ proper sanitization or encoding.\n\nIn this case, the attacker can inject JavaScript payloads\
  \ in the title field of a form, which the application stores in the database. When any user,\
  \ such as an admin or another visitor, views the page that displays this title, the malicious\
  \ script executes in their browser context.\n\n### PoC\n- Visit `https://yeswiki.net/?BazaR&vue=formulaire`\
  \ or `localhost/?BazaR&vue=formulaire` or \n `https://ferme.yeswiki.net/[username]/?BazaR&vue=formulaire`\n\
  - Click on the `+` icon to add a record via the `Diary` form.\n- Inject the payload like:\
  \ `<script>alert(document.cookie)</script>` or `<script>alert(1)</script>` into `Name of the\
  \ event` and `Description`\n- Then save the record by clicking `To validate`\n- The payload\
  \ will be executed when anyone visits `/?BazaR&vue=consulter` also in the diary record \n\
  `/?wiki=BazaR&vue=consulter&action=recherche&q=&id=2&facette=`\n\nThe payload is persistant."
