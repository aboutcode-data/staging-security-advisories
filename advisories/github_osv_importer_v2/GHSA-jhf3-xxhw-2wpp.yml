summary: "go-git: Maliciously crafted idx file can cause asymmetric memory consumption\n###\
  \ Impact\n\nA vulnerability has been identified in which a maliciously crafted `.idx` file\
  \ can cause asymmetric memory consumption, potentially exhausting available memory and resulting\
  \ in a Denial of Service (DoS) condition.\n\nExploitation requires write access to the local\
  \ repository's `.git` directory, it order to create or alter existing `.idx` files. \n\n###\
  \ Patches\n\nUsers should upgrade to `v5.17.1`, or the latest `v6` [pseudo-version](https://go.dev/ref/mod#pseudo-versions),\
  \ in order to mitigate this vulnerability.\n\n### Credit\n\nThe go-git maintainers thank @kq5y\
  \ for finding and reporting this issue privately to the `go-git` project."
