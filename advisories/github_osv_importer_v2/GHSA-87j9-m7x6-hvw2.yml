summary: "Ella Core has Privilege Escalation via Database Restore by NetworkManager role\n##\
  \ Summary\n\nThe NetworkManager role was granted backup and restore permission. The restore\
  \ endpoint accepted any valid SQLite file without verifying its contents.\n\n## Impact\n\n\
  A NetworkManager could replace the production database with a tampered copy to escalate to\
  \ Admin, gaining access to user management, audit logs, debug endpoints, and operator identity\
  \ configuration that the role was explicitly denied.\n\n## Fix \n\nBackup and restore permissions\
  \ have been removed from the NetworkManager role."
