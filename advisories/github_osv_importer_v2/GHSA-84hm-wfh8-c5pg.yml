summary: "sse-channel: SSE Injection via unsanitized event fields\n### Impact\n\nImplementations\
  \ that allows user-provided values to be passed to `event`, `retry` or `id` fields would be\
  \ susceptible to event spoofing, where an attacker could inject arbitrary messages into the\
  \ stream.\n\n- **Event Spoofing:** Attacker can inject arbitrary SSE events into the stream\n\
  - **Client-side Manipulation:** Injected events can trigger unintended behavior in frontend\
  \ JavaScript EventSource listeners\n- **Data Integrity:** Consumers of the SSE stream cannot\
  \ distinguish injected events from legitimate ones\n\n### Patches\nPatch available in v4.0.1.\n\
  \n### Workarounds\nDo not allow user data to control `event`, `retry` or `id` fields, and\
  \ if you must - sanitize the input before passing it to `sse-channel`, stripping any newlines.\
  \ \n\n### Resources\n\nhttps://github.com/rexxars/sse-channel/issues/42"
