summary: "AVideo vulnerable to IP Address Spoofing via Untrusted HTTP Headers in getRealIpAddr()\n\
  ## Summary\n\nThe `getRealIpAddr()` function in `objects/functions.php` trusts user-controlled\
  \ HTTP headers to determine the client's IP address. \nAn attacker can spoof their IP address\
  \ by sending forged headers, bypassing any IP-based access controls or audit logging.\n\n\
  ## Vulnerable Code\n\nFile: `objects/functions.php`\n```php\n$headers = [\n    'HTTP_X_REAL_IP',\
  \      \n    'HTTP_CLIENT_IP',    \n    'HTTP_X_FORWARDED_FOR',\n    'REMOTE_ADDR'\n];\n\n\
  foreach ($headers as $header) {\n    if (!empty($_SERVER[$header])) {\n        $ips = explode(',',\
  \ $_SERVER[$header]);\n        foreach ($ips as $ipCandidate) {\n            $ipCandidate\
  \ = trim($ipCandidate);\n            if (filter_var($ipCandidate, FILTER_VALIDATE_IP, \n \
  \                          FILTER_FLAG_IPV4)) {\n                return $ipCandidate; \n \
  \           }\n        }\n    }\n}\n```\n\n## Attack Scenario\n\n1. Attacker sends request\
  \ with forged header:\n```\nX-Client-IP: 127.0.0.1\n```\nor\n```\nX-Real-IP: 192.168.1.1\n\
  ```\n\n2. `getRealIpAddr()` returns the forged IP\n3. Any IP-based rate limiting, access control,\
  \ or audit \n   log that relies on this function is bypassed\n\n## Proof of Concept\n```bash\n\
  curl -H \"X-Client-IP: 127.0.0.1\" \\\n     https://target.com/any_endpoint.php\n```\n\nThe\
  \ server now believes the request came from localhost.\n\n## Impact\n- Bypass IP-based rate\
  \ limiting\n- Bypass IP-based access controls\n- Forge audit log entries\n- Potential privilege\
  \ escalation if localhost is trusted"
