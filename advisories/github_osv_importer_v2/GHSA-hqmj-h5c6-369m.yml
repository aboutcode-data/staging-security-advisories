summary: "ONNX Untrusted Model Repository Warnings Suppressed by silent=True in onnx.hub.load()\
  \ — Silent Supply-Chain Attack\n## What's the issue\nPassing `silent=True` to `onnx.hub.load()`\
  \ kills all trust warnings and user prompts. This means a model can be downloaded from any\
  \ unverified GitHub repo with zero user awareness.\n \n```python\nif not _verify_repo_ref(repo)\
  \ and not silent:\n    # completely skipped when silent=True\n    print(\"The model repo...\
  \ is not trusted\")\n    if input().lower() != \"y\":\n        return None\n```\n \nOn top\
  \ of that, the SHA256 integrity check is useless here — it validates against a manifest that\
  \ lives in the same repo the attacker controls, so the hash will always match.\n\n \n## Impact\n\
  Any pipeline using `hub.load()` with `silent=True` and an external repo string is silently\
  \ loading whatever the repo owner ships. If that model executes arbitrary code on load, the\
  \ attacker has access to the machine.\n \n## Resolved by removing the feature"
