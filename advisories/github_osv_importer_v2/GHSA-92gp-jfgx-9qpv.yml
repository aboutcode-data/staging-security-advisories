  - CVE-2026-31841
summary: "Hyperterse: Raw exposure of database statements in MCP search tool\nHyperterse allows\
  \ users to specify database queries for tools to execute under the hood. As of [v2.0.0](https://github.com/hyperterse/hyperterse/releases/tag/v2.0.0),\
  \ there are only two tools exposed - `search` and `execute`. \n\nThe `search` tool allows\
  \ LLMs to search for tools using natural language. While returning results, Hyperterse also\
  \ returned the raw SQL queries, exposing statements which were supposed to be executed under\
  \ the hood, and protected from being displayed publicly.\n\nThis issue has been fixed as of\
  \ [v2.2.0](https://github.com/hyperterse/hyperterse/releases/tag/v2.2.0) and relevant tests\
  \ to catch these have been added."
