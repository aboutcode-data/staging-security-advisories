summary: "Inspektor Gadget: Command Injection via malicious buildOptions manipulation\n### Impacted\
  \ Resources\n\n`inspektor-gadget/cmd/common/image/build.go`\n`inspektor-gadget/cmd/common/image/helpers/Makefile.build`\n\
  \n### Description\n\nThe `ig` binary provides a subcommand for image building, used to generate\
  \ custom gadget OCI images.\n\nA part of this functionality is implemented in the file `inspektor-gadget/cmd/common/image/build.go`.\n\
  \nThe following is the code responsible to construct the build command:\n```go\nfunc buildCmd(options\
  \ buildOptions) []string {\n\tcmd := []string{\n\t\t\"make\", \"-f\", filepath.Join(options.outputDir,\
  \ \"Makefile.build\"),\n\t\t\"-j\", fmt.Sprintf(\"%d\", runtime.NumCPU()),\n\t\t\"OUTPUTDIR=\"\
  \ + options.outputDir,\n\t\t\"CFLAGS=\" + options.cFlags,\n\t\t\"FORCE_COLORS=\" + options.forceColorsFlag,\n\
  \t}\n\n\tif options.ebpfSourcePath != \"\" {\n\t\tcmd = append(cmd, \"EBPFSOURCE=\"+options.ebpfSourcePath,\
  \ \"ebpf\")\n\t}\n\tif options.wasmSourcePath != \"\" {\n\t\tcmd = append(cmd, \"WASM=\"+options.wasmSourcePath,\
  \ \"wasm\")\n\t}\n\tif options.btfgen {\n\t\tcmd = append(cmd, \"BTFHUB_ARCHIVE=\"+options.btfHubArchivePath,\
  \ \"btfgen\")\n\t}\n\n\treturn cmd\n}\n```\n\nThe `Makefile.build` file is the Makefile template\
  \ employed during the building process.\n\nThis file includes user-controlled data in an unsafe\
  \ fashion, specifically some parameters are embedded without an adequate escaping in the commands\
  \ inside the Makefile.\n\nThis implementation is vulnerable to command injection: an attacker\
  \ able to control values in the `buildOptions` structure would be able to execute arbitrary\
  \ commands during the building process.\n\n\n### Impact\n\nAn attacker able to exploit this\
  \ vulnerability would be able to execute arbitray command: \n- on the Linux host where the\
  \ `ig` command is launched, if images are built with the `--local` flag\n- on the build container\
  \ invoked by `ig`, if the `--local` flag is not provided\n\n### Attack Complexity\n\nThe `buildOptions`\
  \ structure is extracted from the YAML [gadget manifest](https://inspektor-gadget.io/docs/latest/gadget-devel/building#customizing-your-build)\
  \ passed to the `ig image build` command. Therefore, the attacker would need a way to control\
  \ either the full `build.yml` file passed to the `ig image build` command, or one of its options.\n\
  \nTypically, this could happen in a CI/CD scenario that builds untrusted gadgets to verify\
  \ correctness.\n\n### PoC\n\n1. Create the file `build.yaml` with the following content:\n\
  ```\nebpfsource: \"program.bpf.c\"  \nmetadata: \"gadget.yaml\"  \ncflags: \" ; touch poc.txt\
  \ ; \"\n```\n2. Create the file `gadget.yaml` with the following content:\n```\nname: test\
  \  \ndescription: test gadget  \n```\n3. Create the file `program.bpf.c` with the following\
  \ content:\n```\n#include <gadget/gadget.h>  \nchar LICENSE[] SEC(\"license\") = \"GPL\";\n\
  ```\n4. In the same directory where the files are run the command:\n```\nig image build .\
  \ -t test:latest\n```\n5. Notice that the file `poc.txt` gets created inside the directory.\n\
  \n### Suggested Remediation\n\nSanitize build options by providing a robust whitelist to filter\
  \ on. Alternatively, revisit the design of image building to prevent shell substitution.\n\
  \n### Resources\n\n- https://cwe.mitre.org/data/definitions/77.html\n- https://cwe.mitre.org/data/definitions/78.html"
