summary: |
  getaddrinfo: DoS due to memory leak
  The fix for CVE-2023-4806 introduced a memory leak when an application
  calls getaddrinfo for AF_INET6 with AI_CANONNAME, AI_ALL and AI_V4MAPPED
  flags set.
