summary: "ISO-2022-CN-EXT: fix out-of-bound writes when writing escape sequence\nThe iconv()\
  \ function in the GNU C Library versions 2.39 and older may \noverflow the output buffer passed\
  \ to it by up to 4 bytes when converting \nstrings to the ISO-2022-CN-EXT character set, which\
  \ may be used to \ncrash an application or overwrite a neighbouring variable."
