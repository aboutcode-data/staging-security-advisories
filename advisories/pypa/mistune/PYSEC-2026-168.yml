summary: Mistune is a Python Markdown parser with renderers and plugins. In 3.2.0 and realier,
  in src/mistune/directives/image.py, the render_figure() function concatenates figclass and
  figwidth options directly into HTML attributes without escaping. This allows attribute injection
  and XSS even when HTMLRenderer(escape=True) is used, because these values bypass the inline
  renderer.
