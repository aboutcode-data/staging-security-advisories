summary: A stored cross-site scripting (XSS) vulnerability exists in the gaizhenbiao/chuanhuchatgpt
  repository, affecting version git 20b2e02. The vulnerability arises from improper sanitization
  of HTML tags in chat history uploads. Specifically, the sanitization logic fails to handle
  HTML tags within code blocks correctly, allowing an attacker to inject malicious scripts.
  This can lead to the execution of arbitrary JavaScript code in the context of the user's browser,
  potentially leading to identity theft or other malicious actions.
