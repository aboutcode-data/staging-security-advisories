summary: Gradio is an open-source Python package designed to enable quick builds of a demo or
  web application. If File or UploadButton components are used as a part of Gradio application
  to preview file content, an attacker with access to the application might abuse these components
  to read arbitrary files from the application server. This issue has been addressed in release
  version 5.5.0 and all users are advised to upgrade. There are no known workarounds for this
  vulnerability.
