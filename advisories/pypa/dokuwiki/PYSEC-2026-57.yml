summary: DokuWiki 2018-04-22b contains a username enumeration vulnerability in its password
  reset functionality that allows attackers to identify valid user accounts. Attackers can submit
  different usernames to the password reset endpoint and distinguish between existing and non-existing
  accounts by analyzing the server's error response messages.
