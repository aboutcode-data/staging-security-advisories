summary: An arbitrary file download vulnerability exists in the rpc_agent_client component of
  modelscope/agentscope version v0.0.4. This vulnerability allows any user to download any file
  from the rpc_agent's host by exploiting the download_file method. This can lead to unauthorized
  access to sensitive information, including configuration files, credentials, and potentially
  system files, which may facilitate further exploitation such as privilege escalation or lateral
  movement within the network.
