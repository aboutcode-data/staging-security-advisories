summary: A vulnerability was determined in Open Asset Import Library Assimp 6.0.2. Affected
  is the function Q3DImporter::InternReadFile of the file assimp/code/AssetLib/Q3D/Q3DLoader.cpp.
  This manipulation causes allocation of resources. The attack is restricted to local execution.
  The exploit has been publicly disclosed and may be utilized.
