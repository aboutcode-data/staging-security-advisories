summary: A vulnerability was found in PyTorch 2.6.0+cu124. It has been rated as problematic.
  Affected by this issue is the function nnq_Sigmoid of the component Quantized Sigmoid Module.
  The manipulation of the argument scale/zero_point leads to improper initialization. The attack
  needs to be approached locally. The complexity of an attack is rather high. The exploitation
  is known to be difficult. The exploit has been disclosed to the public and may be used.
