summary: A vulnerability was identified in PyTorch 2.10.0. The affected element is an unknown
  function of the component pt2 Loading Handler. The manipulation leads to deserialization.
  The attack can only be performed from a local environment. The exploit is publicly available
  and might be used. The project was informed of the problem early through a pull request but
  has not reacted yet.
