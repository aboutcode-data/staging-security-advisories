summary: MONAI (Medical Open Network for AI) is an AI toolkit for health care imaging. The extractall
  function `zip_file.extractall(output_dir)` is used directly to process compressed files. It
  is used in many places in the project. In versions up to and including 1.5.0, when the Zip
  file containing malicious content is decompressed, it overwrites the system files. In addition,
  the project allows the download of the zip content through the link, which increases the scope
  of exploitation of this vulnerability. As of time of publication, no known fixed versions
  are available.
