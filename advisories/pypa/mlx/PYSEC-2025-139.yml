summary: MLX is an array framework for machine learning on Apple silicon. Prior to version 0.29.4,
  there is a segmentation fault in mlx::core::load_gguf() when loading malicious GGUF files.
  Untrusted pointer from external gguflib library is dereferenced without validation, causing
  application crash. This issue has been patched in version 0.29.4.
