summary: An issue was discovered in OpenStack Keystone 14 through 26 before 26.1.1, 27.0.0,
  28.0.0, and 29.0.0. Restricted application credentials can create EC2 credentials. By using
  a restricted application credential to call the EC2 credential creation API, an authenticated
  user with only a reader role may obtain an EC2/S3 credential that carries the full set of
  the parent user's S3 permissions, effectively bypassing the role restrictions imposed on the
  application credential. Only deployments that use restricted application credentials in combination
  with the EC2/S3 compatibility API (swift3 / s3api) are affected.
