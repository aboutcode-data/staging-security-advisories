summary: Weblate is a web based localization tool. In versions 5.14 and below,  Weblate leaks
  the IP address of the project member inviting the user to the project in the audit log. The
  audit log includes IP addresses from admin-triggered actions, which can be viewed by invited
  users. This issue is fixed in version 5.14.1.
