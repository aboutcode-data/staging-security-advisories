summary: A vulnerability in the Ollama server version 0.5.11 allows a malicious user to cause
  a Denial of Service (DoS) attack by customizing the manifest content and spoofing a service.
  This is due to improper validation of array index access when downloading a model via the
  /api/pull endpoint, which can lead to a server crash.
