summary: Kitware VTK (Visualization Toolkit) through 9.5.0 contains a heap use-after-free vulnerability
  in vtkGLTFDocumentLoader. The vulnerability manifests during mesh object copy operations where
  vector members are accessed after the underlying memory has been freed, specifically when
  handling GLTF files with corrupted or invalid mesh reference structures.
