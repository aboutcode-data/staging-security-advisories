summary: SAP Business Object (Adaptive Job Server) - versions 420, 430, allows remote execution
  of arbitrary commands on Unix, when program objects execution is enabled, to authenticated
  users with scheduling rights, using the BI Launchpad, Central Management Console or a custom
  application based on the public java SDK. Programs could impact the confidentiality, integrity
  and availability of the system.
