summary: A vulnerability, which was classified as problematic, has been found in Huashengdun
  WebSSH up to 1.6.2. Affected by this issue is some unknown functionality of the component
  Login Page. The manipulation of the argument hostname/port leads to cross site scripting.
  The attack may be launched remotely. The exploit has been disclosed to the public and may
  be used. The vendor was contacted early about this disclosure but did not respond in any way.
