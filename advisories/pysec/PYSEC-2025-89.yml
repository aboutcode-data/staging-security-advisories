summary: NUT-14 allows cashu tokens to be created with a preimage hash. However, nutshell (cashubtc/nuts)
  before 0.18.0 do not validate the size of preimage when the token is spent. The preimage is
  stored by the mint and attacker can exploit this vulnerability to fill the mint's db nd disk
  with arbitrary data.
