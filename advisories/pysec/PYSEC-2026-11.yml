summary: "Apache Airflow versions 3.1.0 through 3.1.6 contain an authorization flaw that can\
  \ allow an authenticated user with custom permissions limited to task access to view task\
  \ logs without having task log access. \n\nUsers are recommended to upgrade to Apache Airflow\
  \ 3.1.7 or later, which resolves this issue."
