summary: A vulnerability was found in LangChain langchain_community 0.0.26. It has been classified
  as critical. Affected is the function load_local in the library libs/community/langchain_community/retrievers/tfidf.py
  of the component TFIDFRetriever. The manipulation leads to server-side request forgery. It
  is possible to launch the attack remotely. The exploit has been disclosed to the public and
  may be used. Upgrading to version 0.0.27 is able to address this issue. It is recommended
  to upgrade the affected component. The identifier of this vulnerability is VDB-255372.
