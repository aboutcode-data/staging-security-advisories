summary: MLX is an array framework for machine learning on Apple silicon. Prior to version 0.29.4,
  there is a heap buffer overflow in mlx::core::load() when parsing malicious NumPy .npy files.
  Attacker-controlled file causes 13-byte out-of-bounds read, leading to crash or information
  disclosure. This issue has been patched in version 0.29.4.
