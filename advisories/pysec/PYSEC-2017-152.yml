summary: A flaw was found in instack-undercloud 7.2.0 as packaged in Red Hat OpenStack Platform
  Pike, 6.1.0 as packaged in Red Hat OpenStack Platform Oacta, 5.3.0 as packaged in Red Hat
  OpenStack Newton, where pre-install and security policy scripts used insecure temporary files.
  A local user could exploit this flaw to conduct a symbolic-link attack, allowing them to overwrite
  the contents of arbitrary files.
