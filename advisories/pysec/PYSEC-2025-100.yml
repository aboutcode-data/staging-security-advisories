summary: "CodeChecker is an analyzer tooling, defect database and viewer extension for the Clang\
  \ Static Analyzer and Clang Tidy. \n\n\n\n\nCodeChecker versions up to 6.26.1 contain a buffer\
  \ overflow vulnerability in the internal ldlogger library, which is executed by the CodeChecker\
  \ log command.\n\n\n\n\n\nThis issue affects CodeChecker: through 6.26.1."
