summary: In OpenCTI through 5.2.4, a broken access control vulnerability has been identified
  in the profile endpoint. An attacker can abuse the identified vulnerability in order to arbitrarily
  change their registered e-mail address as well as their API key, even though such action is
  not possible through the interface, legitimately.
