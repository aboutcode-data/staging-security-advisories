summary: Akamai edge servers contained a bug due to improper processing of requests specifying
  “Transfer-Encoding” as a custom hop-by-hop header. Whether this vulnerability was exploitable
  in practice depended on the internal Akamai processing path chosen for delivery of that particular
  request and the origin server’s behavior when receiving such a request.
