summary: |
  Red Hat OpenShift Service Mesh 2.6.15

  This update has a security impact of Important. A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed severity rating, is available for each vulnerability from the CVE link(s) in the References section.

  Red Hat OpenShift Service Mesh 2.6.15, which is based on the open source Istio project, addresses a variety of problems in a microservice architecture by creating a centralized point of control in an application.

  Security Fix(es):
  * proxyv2-rhel9: Incorrect parsing of IPv6 host literals in net/url (CVE-2026-25679)
