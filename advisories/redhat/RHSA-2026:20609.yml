summary: "An update for skopeo is now available for Red Hat Enterprise Linux 9.6 Extended Update\
  \ Support.\n\nRed Hat Product Security has rated this update as having a security impact of\
  \ Important. A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed\
  \ severity rating, is available for each vulnerability from the CVE link(s) in the References\
  \ section.\n\nThe skopeo command lets you inspect images from container image registries,\
  \ get images and image layers, and use signatures to create and verify files. \n\nSecurity\
  \ Fix(es):\n\n* github.com/go-jose/go-jose/v3: github.com/go-jose/go-jose/v4: Go JOSE: Denial\
  \ of Service via crafted JSON Web Encryption (JWE) object (CVE-2026-34986)\n\n* crypto/tls:\
  \ golang: Go crypto/tls: Denial of Service via multiple TLS 1.3 key update messages (CVE-2026-32283)\n\
  \n* crypto/x509: crypto/tls: golang: Go: Denial of Service vulnerability in certificate chain\
  \ building (CVE-2026-32280)\n\nFor more details about the security issue(s), including the\
  \ impact, a CVSS score, acknowledgments, and other related information, refer to the CVE page(s)\
  \ listed in the References section."
