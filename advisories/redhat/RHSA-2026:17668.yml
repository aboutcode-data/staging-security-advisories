summary: "Red Hat build of Apache Camel 4.18.1 for Spring Boot patch release and security update\
  \ is now available.\n\nRed Hat Product Security has rated this update as having a security\
  \ impact of\nImportant. A Common Vulnerability Scoring System (CVSS) base score, which gives\n\
  a detailed severity rating, is available for each vulnerability from the CVE\nlink(s) in the\
  \ References section.\n\nRed Hat build of Apache Camel 4.18.1 for Spring Boot patch release\
  \ and security update is now available.\n\nThe purpose of this text-only errata is to inform\
  \ you about the security issues fixed.\n\nSecurity Fix(es):\n\n* artemis-server: Apache Artemis,\
  \ Apache ActiveMQ Artemis: Message injection and exfiltration due to missing authentication\
  \ (CVE-2026-27446)\n\n* spring-boot: Spring Boot: Authentication bypass via misconfigured\
  \ Health Group additional path (CVE-2026-22731)\n   \n* plexus-utils: Plexus-utils: Directory\
  \ Traversal in extractFile method (CVE-2025-67030)\n\n* netty-codec-http: Netty: Request smuggling\
  \ via incorrect parsing of HTTP/1.1 chunked transfer encoding extension values (CVE-2026-33870)\n\
  \n* netty-codec-http: Netty: Denial of Service via HTTP/2 CONTINUATION frame flood (CVE-2026-33871)\n\
  \n* netty-codec-http2: Netty: Denial of Service via HTTP/2 CONTINUATION frame flood (CVE-2026-33871)\n\
  \n* jetty-ee10-annotations: early return from the JASPIAuthenticator class without clearing\
  \ ThreadLocal variables (CVE-2026-5795)\n\n* jetty-ee10-apache-jsp: early return from the\
  \ JASPIAuthenticator class without clearing ThreadLocal variables (CVE-2026-5795)\n\n* jetty-ee10-plus:\
  \ early return from the JASPIAuthenticator class without clearing ThreadLocal variables (CVE-2026-5795)\n\
  \n* jetty-ee10-servlet: early return from the JASPIAuthenticator class without clearing ThreadLocal\
  \ variables (CVE-2026-5795)\n\n* jetty-ee10-servlets: early return from the JASPIAuthenticator\
  \ class without clearing ThreadLocal variables (CVE-2026-5795)\n\n* jetty-ee10-webapp: early\
  \ return from the JASPIAuthenticator class without clearing ThreadLocal variables (CVE-2026-5795)\n\
  \n* kafka-clients: Apache Kafka Clients: Information disclosure and data corruption due to\
  \ race condition in producer buffer management (CVE-2026-35554)\n\n* camel-infinispan: camel-infinispan:\
  \ Remote Code Execution via Unsafe Deserialization (CVE-2026-6857)\n\n* bcprov-debug-jdk15on:\
  \ GOSTCTR implementation unable to process more than 255 blocks correctly (CVE-2025-14813)\n\
  \n* bcprov-jdk15on: GOSTCTR implementation unable to process more than 255 blocks correctly\
  \ (CVE-2025-14813)\n\n* bcprov-jdk18on: GOSTCTR implementation unable to process more than\
  \ 255 blocks correctly (CVE-2025-14813)\n\n* bcprov-lts8on: GOSTCTR implementation unable\
  \ to process more than 255 blocks correctly (CVE-2025-14813)\n\n* bcpkix-jdk15on: PKIX draft\
  \ CompositeVerifier accepts empty signature sequence as valid (CVE-2026-5588)\n\n* bcpkix-jdk18on:\
  \ PKIX draft CompositeVerifier accepts empty signature sequence as valid (CVE-2026-5588)\n\
  \n* bcpg-jdk18on: unbounded PGP AEAD chunk size leads to pre-auth resource exhaustion (CVE-2026-3505)\n\
  \n* bcprov-debug-jdk15on: LDAP injection vulnerability in LDAPStoreHelper.java (CVE-2026-0636)\n\
  \n* bcprov-jdk15on: LDAP injection vulnerability in LDAPStoreHelper.java (CVE-2026-0636)\n\
  \n* bcprov-jdk18on: LDAP injection vulnerability in LDAPStoreHelper.java (CVE-2026-0636)\n\
  \n* bcprov-lts8on: LDAP injection vulnerability in LDAPStoreHelper.java (CVE-2026-0636)\n\n\
  * spring-boot: Spring Boot: Weak pseudo-random number generation can lead to information disclosure.\
  \ (CVE-2026-40975)\n\n* camel-mail: Camel-Mail: Altered application behavior via header injection\
  \ (CVE-2026-33454)\n\n* camel-jms: Apache Camel: Remote Code Execution and Arbitrary File\
  \ Write via case-variant header injection (CVE-2026-40453)\n\n* camel-google-pubsub: Apache\
  \ Camel: Remote Code Execution and Arbitrary File Write via case-variant header injection\
  \ (CVE-2026-40453)\n\n* camel-http: Apache Camel: Remote Code Execution and Arbitrary File\
  \ Write via case-variant header injection (CVE-2026-40453)\n\n* camel-http-base: Apache Camel:\
  \ Remote Code Execution and Arbitrary File Write via case-variant header injection (CVE-2026-40453)\n\
  \n* camel-http-common: Apache Camel: Remote Code Execution and Arbitrary File Write via case-variant\
  \ header injection (CVE-2026-40453)\n\n* camel-http-starter: Apache Camel: Remote Code Execution\
  \ and Arbitrary File Write via case-variant header injection (CVE-2026-40453)\n\n* camel-jms:\
  \ Apache Camel: Remote Code Execution via deserialization of JMS ObjectMessage (CVE-2026-40860)\n\
  \n* camel-amqp: Apache Camel: Remote Code Execution via deserialization of JMS ObjectMessage\
  \ (CVE-2026-40860)\n\n* camel-http-base: Apache Camel: Information disclosure and authentication\
  \ bypass in embedded HTTP/management servers (CVE-2026-40022)\n\n* camel-http-common: Apache\
  \ Camel: Information disclosure and authentication bypass in embedded HTTP/management servers\
  \ (CVE-2026-40022)\n\n* camel-http: Apache Camel: Information disclosure and authentication\
  \ bypass in embedded HTTP/management servers (CVE-2026-40022)\n\n* camel-http-starter: Apache\
  \ Camel: Information disclosure and authentication bypass in embedded HTTP/management servers\
  \ (CVE-2026-40022)\n\n* camel-infinispan-common: Apache Camel camel-infinispan: Arbitrary\
  \ code execution via deserialization of untrusted data (CVE-2026-40858)\n\n* camel-infinispan-embedded:\
  \ Apache Camel camel-infinispan: Arbitrary code execution via deserialization of untrusted\
  \ data (CVE-2026-40858)\n\n* camel-infinispan: Apache Camel camel-infinispan: Arbitrary code\
  \ execution via deserialization of untrusted data (CVE-2026-40858)\n\n* mina-core: Apache\
  \ MINA: Arbitrary code execution via classname allowlist bypass (CVE-2026-41635)\n\n* spring-boot:\
  \ Spring Boot: Remote code execution via timing attack in DevTools remote secret comparison\
  \ (CVE-2026-40972)\n\n* camel-coap: Apache Camel camel-coap: Remote code execution via CoAP\
  \ URI query parameter injection (CVE-2026-33453)\n\n* jetty-http: HTTP request smuggling via\
  \ chunked extension quoted-string parsing (CVE-2026-2332)\n\n* spring-boot: Spring Boot: Arbitrary\
  \ Code Execution and Session Hijacking via predictable temporary directory (CVE-2026-40973)"
