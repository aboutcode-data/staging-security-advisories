summary: "An update for the go-toolset:rhel8 module is now available for Red Hat Enterprise\
  \ Linux 8.\n\nRed Hat Product Security has rated this update as having a security impact of\
  \ Important. A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed\
  \ severity rating, is available for each vulnerability from the CVE link(s) in the References\
  \ section.\n\nGo Toolset provides the Go programming language tools and libraries. Go is alternatively\
  \ known as golang. \n\nSecurity Fix(es):\n\n* golang: internal/syscall/unix: Root.Chmod can\
  \ follow symlinks out of the root (CVE-2026-32282)\n\n* crypto/tls: golang: Go crypto/tls:\
  \ Denial of Service via multiple TLS 1.3 key update messages (CVE-2026-32283)\n\n* crypto/x509:\
  \ crypto/tls: golang: Go: Denial of Service vulnerability in certificate chain building (CVE-2026-32280)\n\
  \n* golang: cmd/compile: no-op interface conversion bypasses overlap checking (CVE-2026-27144)\n\
  \n* cmd/go: golang: Go (golang) and cmd/go: Arbitrary Code Execution via malicious SWIG file\
  \ names (CVE-2026-27140)\n\n* golang: cmd/compile: possible memory corruption after bound\
  \ check elimination (CVE-2026-27143)\n\nFor more details about the security issue(s), including\
  \ the impact, a CVSS score, acknowledgments, and other related information, refer to the CVE\
  \ page(s) listed in the References section."
