summary: "An update for the mariadb:11.8 module is now available for Red Hat Enterprise Linux\
  \ 9.\n\nRed Hat Product Security has rated this update as having a security impact of Moderate.\
  \ A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed severity\
  \ rating, is available for each vulnerability from the CVE link(s) in the References section.\n\
  \nMariaDB is a multi-user, multi-threaded SQL database server that is binary compatible with\
  \ MySQL. \n\nSecurity Fix(es):\n\n* MariaDB: MariaDB: Remote Code Execution or Denial of Service\
  \ via JSON_SCHEMA_VALID() function vulnerability (CVE-2026-32710)\n\nFor more details about\
  \ the security issue(s), including the impact, a CVSS score, acknowledgments, and other related\
  \ information, refer to the CVE page(s) listed in the References section."
