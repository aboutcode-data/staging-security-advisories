summary: "Red Hat JBoss Web Server 6.2.3 zip release is now available for Red Hat Enterprise\
  \ Linux 8, Red Hat Enterprise Linux 9, Red Hat Enterprise Linux 10, and Windows Server.\n\n\
  Red Hat Product Security has rated this update as having a security impact of Important. A\
  \ Common Vulnerability Scoring System (CVSS) base score, which gives a detailed severity rating,\
  \ is available for each vulnerability from the CVE link(s) in the References section.\n\n\
  Red Hat JBoss Web Server is a fully integrated and certified set of components for hosting\
  \ Java web applications. It is comprised of the Apache Tomcat Servlet container, JBoss HTTP\
  \ Connector (mod_cluster), the PicketLink Vault extension for Apache Tomcat, and the Tomcat\
  \ Native library.\n\nThis release of Red Hat JBoss Web Server 6.2.3 serves as a replacement\
  \ for Red Hat JBoss Web Server 6.2.2. This release includes bug fixes, enhancements and component\
  \ upgrades, which are documented in the Release Notes that are linked to in the References\
  \ section.\n\nSecurity Fix(es):\n\n* tomcat: Apache Tomcat: HTTP Request/Response Smuggling\
  \ via invalid chunk extension (CVE-2026-24880)\n* tomcat: Apache Tomcat: Open Redirect vulnerability\
  \ via LoadBalancerDrainingValve (CVE-2026-25854)\n* tomcat: Apache Tomcat: Authentication\
  \ bypass due to CLIENT_CERT soft fail misconfiguration (CVE-2026-29145)\n* tomcat: Apache\
  \ Tomcat: Information disclosure via Padding Oracle vulnerability in EncryptInterceptor (CVE-2026-29146)\n\
  * tomcat: Apache Tomcat: Information disclosure due to improper encoding in JsonAccessLogValve\
  \ (CVE-2026-34483)\n* tomcat: Apache Tomcat: Information disclosure via sensitive data in\
  \ log files (CVE-2026-34487)\n* tomcat: Apache Tomcat: Authentication bypass via client certificate\
  \ misconfiguration (CVE-2026-34500) \n\nFor more details about the security issue(s), including\
  \ the impact, a CVSS score, acknowledgments, and other related information, refer to the CVE\
  \ page(s) listed in the References section."
