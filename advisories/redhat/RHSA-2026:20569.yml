summary: "An update for buildah is now available for Red Hat Enterprise Linux 10.0 Extended\
  \ Update Support.\n\nRed Hat Product Security has rated this update as having a security impact\
  \ of Important. A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed\
  \ severity rating, is available for each vulnerability from the CVE link(s) in the References\
  \ section.\n\nThe buildah package provides a tool for facilitating building OCI container\
  \ images. Among other things, buildah enables you to: Create a working container, either from\
  \ scratch or using an image as a starting point; Create an image, either from a working container\
  \ or using the instructions in a Dockerfile; Build both Docker and OCI images. \n\nSecurity\
  \ Fix(es):\n\n* github.com/go-jose/go-jose/v3: github.com/go-jose/go-jose/v4: Go JOSE: Denial\
  \ of Service via crafted JSON Web Encryption (JWE) object (CVE-2026-34986)\n\n* crypto/x509:\
  \ golang: Go crypto/x509: Denial of Service via inefficient certificate chain validation (CVE-2026-32281)\n\
  \n* crypto/tls: golang: Go crypto/tls: Denial of Service via multiple TLS 1.3 key update messages\
  \ (CVE-2026-32283)\n\n* crypto/x509: crypto/tls: golang: Go: Denial of Service vulnerability\
  \ in certificate chain building (CVE-2026-32280)\n\nFor more details about the security issue(s),\
  \ including the impact, a CVSS score, acknowledgments, and other related information, refer\
  \ to the CVE page(s) listed in the References section."
