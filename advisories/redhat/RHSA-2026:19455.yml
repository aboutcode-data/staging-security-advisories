summary: "An update for dovecot is now available for Red Hat Enterprise Linux 8.4 Advanced Mission\
  \ Critical Update Support and Red Hat Enterprise Linux 8.4 Extended Update Support Long-Life\
  \ Add-On.\n\nRed Hat Product Security has rated this update as having a security impact of\
  \ Important. A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed\
  \ severity rating, is available for each vulnerability from the CVE link(s) in the References\
  \ section.\n\nDovecot is an IMAP server for Linux and other UNIX-like systems, written primarily\
  \ with security in mind. It also contains a small POP3 server, and supports e-mail in either\
  \ the maildir or mbox format. The SQL drivers and authentication plug-ins are provided as\
  \ subpackages. \n\nSecurity Fix(es):\n\n* dovecot: ManageSieve: Denial of Service via crafted\
  \ SASL initial response in AUTHENTICATE command (CVE-2025-59032)\n\n* dovecot: denial of service\
  \ via crafted message before authentication (CVE-2026-27858)\n\n* dovecot: denial of service\
  \ via specially crafted NOOP command (CVE-2026-27857)\n\nFor more details about the security\
  \ issue(s), including the impact, a CVSS score, acknowledgments, and other related information,\
  \ refer to the CVE page(s) listed in the References section."
