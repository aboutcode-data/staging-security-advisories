summary: |
  An update for php8.4 is now available for Red Hat Enterprise Linux 10.

  Red Hat Product Security has rated this update as having a security impact of Important. A Common Vulnerability Scoring System (CVSS) base score, which gives a detailed severity rating, is available for each vulnerability from the CVE link(s) in the References section.

  PHP is an HTML-embedded scripting language. PHP attempts to make it easy for developers to write dynamically generated web pages. PHP also offers built-in database integration for several commercial and non-commercial database management systems, so writing a database-enabled webpage with PHP is fairly simple. The most common use of PHP coding is probably as a replacement for CGI scripts.

  Security Fix(es):

  * PHP: PHP: Denial of Service via improper handling of signed characters in ctype functions (CVE-2026-7258)

  * PHP: PHP-FPM: PHP-FPM: Cross-Site Scripting vulnerability via improper URL sanitation (CVE-2026-6735)

  * php: NULL pointer dereference in SOAP apache:Map decoder with missing <value> (CVE-2026-7262)

  * php: signed integer overflow in metaphone() (CVE-2026-7568)

  * php: denial of service via DOMNode::C14N() (CVE-2026-7263)

  * php: global buffer over-read in mb_convert_encoding() with attacker-supplied encoding (CVE-2026-6104)

  For more details about the security issue(s), including the impact, a CVSS score, acknowledgments, and other related information, refer to the CVE page(s) listed in the References section.
