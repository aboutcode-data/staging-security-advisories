summary: "Assisted installer RHEL 9 components for the multicluster engine for Kubernetes 2.10.2\
  \ General Availability release, with updates to container images.\n\nAssisted Installer RHEL\
  \ 9 integrates components for the general multicluster engine\nfor Kubernetes 2.10.2 release\
  \ that simplify the process of deploying OpenShift Container\nPlatform clusters.\n\nThe multicluster\
  \ engine for Kubernetes provides the foundational components\nthat are necessary for the centralized\
  \ management of multiple\nKubernetes-based clusters across data centers, public clouds, and\
  \ private\nclouds. \n\nYou can use the engine to create new Red Hat OpenShift Container Platform\n\
  clusters, or to import existing Kubernetes-based clusters for management.\n\nAfter the clusters\
  \ are managed, you can use the APIs that\nare provided by the engine to distribute configuration\
  \ based on placement\npolicy."
