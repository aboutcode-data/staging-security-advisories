summary: "An update for skopeo is now available for Red Hat Enterprise Linux 10.\n\nRed Hat\
  \ Product Security has rated this update as having a security impact of Important. A Common\
  \ Vulnerability Scoring System (CVSS) base score, which gives a detailed severity rating,\
  \ is available for each vulnerability from the CVE link(s) in the References section.\n\n\
  The skopeo command lets you inspect images from container image registries, get images and\
  \ image layers, and use signatures to create and verify files. \n\nSecurity Fix(es):\n\n*\
  \ net/url: Incorrect parsing of IPv6 host literals in net/url (CVE-2026-25679)\n\nFor more\
  \ details about the security issue(s), including the impact, a CVSS score, acknowledgments,\
  \ and other related information, refer to the CVE page(s) listed in the References section."
