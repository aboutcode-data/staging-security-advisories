summary: "An update for Red Hat Data Grid 8 is now available.\n \nRed Hat Product Security has\
  \ rated this update as having a security impact of Important. A Common Vulnerability Scoring\
  \ System (CVSS) base score, which gives a detailed severity rating, is available for each\
  \ vulnerability from the CVE link(s) in the References section.\n\nRed Hat Data Grid is an\
  \ in-memory, distributed, NoSQL datastore solution. It increases application response times\
  \ and allows for dramatically improving performance while providing availability, reliability,\
  \ and elastic scale.\n \nData Grid 8.6.1 replaces Data Grid 8.6.0 and includes bug fixes and\
  \ enhancements. Find out more about Data Grid 8.6.1 in the Release Notes[3].\n\nSecurity Fix(es):\n\
  * CVE-2026-33871 netty-codec-http: Netty: Denial of Service via HTTP/2 CONTINUATION frame\
  \ flood [jdg-8] (CVE-2026-33871)\n\n* CVE-2026-33870 netty-codec-http: Netty: Request smuggling\
  \ via incorrect parsing of HTTP/1.1 chunked transfer encoding extension values [jdg-8] (CVE-2026-33870)\n\
  \n* CVE-2026-42043 axios: Axios: NO_PROXY bypass via crafted URL [jdg-8] (CVE-2026-42043)\n\
  \n* CVE-2026-42041 axios: Axios: Authentication bypass due to prototype pollution of HTTP\
  \ error handling [jdg-8.6] (CVE-2026-42041)\n\n* CVE-2026-42039 axios: Axios: Denial of Service\
  \ via unbounded recursion in toFormData with deeply nested request data [jdg-8.6] (CVE-2026-42039)\n\
  \n* CVE-2026-42033 axios: Axios: HTTP Transport Hijacking via Prototype Pollution [jdg-8.6]\
  \ (CVE-2026-42033)\n\n* CVE-2026-40975 spring-boot: Spring Boot: Weak pseudo-random number\
  \ generation can lead to information disclosure. [jdg-8.6] (CVE-2026-40975)\n\n* CVE-2026-4800\
  \ lodash: lodash: Arbitrary code execution via untrusted input in template imports [jdg-8.6]\
  \ (CVE-2026-4800)\n\n* CVE-2026-41240 dompurify: DOMPurify: Cross-Site Scripting (XSS) via\
  \ inconsistent tag sanitization [jdg-8.6] (CVE-2026-41240)\n\n* CVE-2026-34481 log4j-layout-template-json:\
  \ Apache Log4j JsonTemplateLayout: Denial of Service via invalid JSON output [jdg-8.6] (CVE-2026-34481)\n\
  \n* CVE-2026-34480 log4j-core: Apache Log4j Core: Invalid XML output causes denial of service\
  \ in logging [jdg-8.6] (CVE-2026-34480)\n\n* CVE-2026-34478 log4j-core-test: Apache Log4j\
  \ Core: Log injection via CRLF sequences due to configuration attribute renames [jdg-8.6]\
  \ (CVE-2026-34478)\n\nFor more details about the security issue(s), including the impact,\
  \ a CVSS score, acknowledgments, and other related information, refer to the CVE page(s) listed\
  \ in the References section."
