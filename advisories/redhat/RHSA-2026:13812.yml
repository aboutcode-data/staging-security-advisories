summary: "Updated RHEL-8 based Middleware Containers container images are now available\n\n\
  The RHEL-8 based Middleware Containers container images have been updated to address the following\
  \ security advisory: \nRHSA-2026:11077 \nRHSA-2026:7667\nRHSA-2026:8534\nRHSA-2026:9745\n\
  (see References)\n\nSecurity Fixes:\n* rsync: Rsync: Out of bounds array access via negative\
  \ index (CVE-2025-10158)\n* gnutls: Stack-based Buffer Overflow in gnutls_pkcs11_token_init()\
  \ Function (CVE-2025-9820)\n* gnutls: GnuTLS: Denial of Service via excessive resource consumption\
  \ during certificate verification (CVE-2025-14831)\n* openssh: OpenSSH GSSAPI: Information\
  \ disclosure or denial of service due to uninitialized variables (CVE-2026-3497) \n* nghttp2:\
  \ nghttp2: Denial of Service via malformed HTTP/2 frames after session termination (CVE-2026-27135)\n\
  * libarchive: libarchive: Information disclosure via heap out-of-bounds read in RAR archive\
  \ processing  (CVE-2026-4424)\n* python: Python: Command-line option injection in webbrowser.open()\
  \ via crafted URLs  (CVE-2026-4519)\n* libarchive: libarchive: Arbitrary code execution via\
  \ integer overflow in ISO9660 image processing  (CVE-2026-5121) \n* python: Python: Arbitrary\
  \ code execution or information disclosure via use-after-free in decompression modules (CVE-2026-6100)\n\
  * python: cpython: Python: Arbitrary code execution via command injection in webbrowser.open()\
  \ API (CVE-2026-4786)\n\nUsers of RHEL-8 based Middleware Containers container images are\
  \ advised to upgrade to these updated images, which contain backported patches to correct\
  \ these security issues, fix these bugs and add these enhancements. Users of these images\
  \ are also encouraged to rebuild all container images that depend on these images.\n\nYou\
  \ can find images updated by this advisory in Red Hat Container Catalog (see References)."
