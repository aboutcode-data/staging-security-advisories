aliases: []
summary: "Next.js Vulnerable to Denial of Service with Server Components\nA vulnerability affects\
  \ certain React Server Components packages for versions 19.x and frameworks that use the affected\
  \ packages, including Next.js 13.x, 14.x, 15.x, and 16.x using the App Router. The issue is\
  \ tracked upstream as [CVE-2026-23870](https://github.com/facebook/react/security/advisories/GHSA-rv78-f8rc-xrxh).\
  \ \n\nA specially crafted HTTP request can be sent to any App Router Server Function endpoint\
  \ that, when deserialized, may trigger excessive CPU usage. This can result in denial of service\
  \ in unpatched environments."
