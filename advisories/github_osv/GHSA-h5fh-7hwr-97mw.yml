summary: "Kimai has an arbitrary file read in its invoice PDF renderer (admin)\n## Summary\n\
  \nUsers with the role `System-Admin` (`ROLE_SYSTE_ADMIN`) and the permission `upload_invoice_template`\
  \ can upload PDF invoice templates, which can call `pdfContext.setOption('associated_files',\
  \ ...)` inside the sandboxed Twig render. \n\nThis is forwarded to mPDF's `SetAssociatedFiles()`,\
  \ whose writer calls `file_get_contents($entry['path'])` during PDF output and embeds the\
  \ bytes as a FlateDecode stream in the PDF. Any file readable by the PHP worker is returned\
  \ to the attacker inside the rendered invoice.\n\n## Root cause\n\n1. `src/Twig/SecurityPolicy/StrictPolicy.php:123-128`\
  \ explicitly whitelists `PdfContext::setOption()`:\n   ```php\n   if ($obj instanceof PdfContext)\
  \ {\n       if ($lcm !== 'setoption') { throw ...; }\n       return;\n   }\n   ```\n\n2. `src/Pdf/MPdfConverter.php`\
  \ keeps `associated_files` in the pass-through allowlist:\n   ```php\n   $allowed = ['mode','format','default_font_size','default_font',\
  \ ... , 'associated_files','additional_xmp_rdf'];\n   ```\n   and then forwards it to mPDF:\n\
  \   ```php\n   if (array_key_exists('associated_files', $options) && is_array($options['associated_files']))\
  \ {\n       $associatedFiles = $options['associated_files'];\n       unset($options['associated_files']);\n\
  \   }\n   ...\n   $mpdf->SetAssociatedFiles($associatedFiles);\n   ```\n\n3. mPDF 8.3.1 `MetadataWriter::writeAssociatedFiles()`\
  \ calls `file_get_contents`, which respects PHP stream wrappers:\n   ```php\n   if (isset($file['path']))\
  \ {\n       $fileContent = @file_get_contents($file['path']);\n   }\n   ...\n   $filestream\
  \ = gzcompress($fileContent);\n   $this->writer->write('<</Type /EmbeddedFile');\n   ```\n\
  \nThe sandbox and the option allowlist were both written defensively (short whitelists, not\
  \ blacklists), but neither side considered that `associated_files` is a PDF/A file-embedding\
  \ feature whose `path` key is a sink.\n\n## Fix\n\nThe implemented fix has two aspects:\n\n\
  1. The `PdfContext` now works with a strict allow-list, that excludes `associated_files`\n\
  2. The `MPdfConverter` now removes any `path` from the `$associatedFiles` array, which can\
  \ still be used by plugins:\n```php\n        if (\\count($associatedFiles) > 0) {\n      \
  \      // remove \"path\" so mPDF will not use file_get_contents() on local files\n      \
  \      // callers must pre-read and pass the bytes via \"content\"\n            $associatedFiles\
  \ = array_map(static function ($entry): array {\n                if (!\\is_array($entry))\
  \ {\n                    return [];\n                }\n\n                if (\\array_key_exists('path',\
  \ $entry)) {\n                    unset($entry['path']);\n                }\n\n          \
  \      return $entry;\n            }, $associatedFiles);\n            $mpdf->SetAssociatedFiles($associatedFiles);\n\
  \        }\n\n```"
