summary: "FacturaScripts Vulnerable to Remote Code Execution (RCE) via Zip Slip in Plugin Upload\
  \ Mechanism\n### Summary\nA Critical vulnerability exists in the `Plugins::add()` function.\
  \ The system fails to properly validate the file paths within uploaded ZIP archives. This\
  \ allows an attacker to perform a Zip Slip attack, leading to Arbitrary File Write and Remote\
  \ Code Execution (RCE) by overwriting sensitive .php files outside the designated plugins\
  \ directory.\n\n### Details\nThe vulnerability is located in Plugins.php. While the `testZipFile`\
  \ function attempts to validate that the ZIP contains only one root folder, it does not sanitize\
  \ or validate the individual file paths within that folder.\n```js\n// Vulnerable logic in\
  \ Plugins.php\nfor ($index = 0; $index < $zipFile->numFiles; $index++) {\n    $data = $zipFile->statIndex($index);\n\
  \    $path = explode('/', $data['name']);\n    if (count($path) > 1) {\n        $folders[$path[0]]\
  \ = $path[0];\n    }\n} \n```\nAn attacker can bypass this check by naming a file `ValidPluginName/../../shell.php`.\
  \ The explode function will see ValidPluginName as the root folder, satisfying the `count($folders)\
  \ != 1` check. However, during extraction, the `../../` sequence triggers a path traversal,\
  \ allowing the file to be written anywhere the web server has permissions the root directory.\n\
  ### PoC\nPrepare Malicious ZIP: Use a tool (like evilarc) or a script to create a ZIP file\
  \ where one of the entries is named: `MyPlugin/../../rce.php`\nInject Payload: Inside rce.php,\
  \ put a simple shell: \n`<?php system($_GET['cmd']); ?>`\nUpload: Navigate to the \"Add Plugin\"\
  \ section in FacturaScripts and upload the malicious ZIP.\nExecution: Access the shell via\
  \ https://target.com/rce.php?cmd=whoami.\n\n### Impact\nConfidentiality: High (Attacker can\
  \ read all database configs and files).\nIntegrity: High (Attacker can modify any file on\
  \ the server).\nAvailability: High (Attacker can delete the entire installation).\n> https://github.com/ZeroXJacks/CVEs/blob/main/2026/CVE-2026-27891.md"
