summary: "Ironic Standalone Operator's prometheus metrics exporter bound to all interfaces\n\
  ## Impact\n\nThe Ironic Standalone Operator (IRSO) is the operator to maintain an Ironic deployment\
  \ for Metal3. The Prometheus metrics exporter binds to 0.0.0.0 (all network interfaces) by\
  \ default with no authentication. The default config is disabled. If enabled, this exposes\
  \ operational metrics to any host on adjacent networks. Deployments running IrSO v0.7.0 through\
  \ v0.8.1 with the Prometheus exporter enabled are affected. Versions prior to v0.7.0 do not\
  \ have the Prometheus exporter feature.\n\n## Patches\n\nThe exporter now exposes a configurable\
  \ bindAddress field. Users should upgrade to v0.9.0 or later. \n\n## Workarounds\n\nUsers\
  \ on older versions than v0.9.0 should use host-level firewall rules (iptables/nftables) to\
  \ restrict access to the metrics port from unintended networks, or disable the metrics service.\n\
  \n## Resources\n\n- https://github.com/metal3-io/ironic-standalone-operator/pull/635"
