  - CVE-2026-40110
summary: "Jupyter Server has a  CORS Origin Validation Bypass via `re.match()` in `allow_origin_pat`\
  \ (from huntr)\nJupyter Server uses `re.match()` to validate the Origin header against the\
  \ `allow_origin_pat` configuration.\n\nSince `re.match()` only anchors at the start of the\
  \ string, an attacker who controls a domain like `http://trusted.example.com.evil.com/` passes\
  \ validation against a pattern intended to match only `trusted.example.com`.\n\n### Impact\n\
  \n<=2.17.0\n\n### Patches\n\n057869a327c46730afede3eab0ca2d2e3e74acea, 49b34392feaa97735b3b777e3baf8f22f2a14ed8\
  \ \n\n### Workarounds\n\nWrap your `allow_origin_pat` value with `^` and `$`\n\n### References\n\
  \nhttps://github.com/jupyter-server/jupyter_server/pull/603\nhttps://docs.python.org/3/library/re.html#re.fullmatch\n\
  https://docs.python.org/3/library/re.html#re.match"
