summary: "Argo Vulnerable to Unauthenticated Memory Exhaustion (DoS) in Webhook Interceptor\n\
  **Severity:** Medium\n**Component:** Webhook Interceptor (`server/auth/webhook`)\n**Vulnerability\
  \ Type:** Denial of Service (DoS)\n\n## Description\nThe Webhook Interceptor loads the entire\
  \ request body into memory before authenticating the request or verifying its signature. This\
  \ occurs on the `/api/v1/events/` endpoint, which is publicly accessible (albeit intended\
  \ for webhooks). An attacker can send a request with an extremely large body (e.g., multiple\
  \ gigabytes), causing the Argo Server to allocate excessive memory, potentially leading to\
  \ an Out-Of-Memory (OOM) crash and denial of service.\n\n## Vulnerable Code\nIn `server/auth/webhook/interceptor.go`:\n\
  ```go\nfunc (i *WebhookInterceptor) addWebhookAuthorization(r *http.Request, kube kubernetes.Interface)\
  \ error {\n    // ... basic checks ...\n    \n    // Vulnerability: Reads entire body into\
  \ memory unconditionally\n    buf, _ := io.ReadAll(r.Body)\n    defer func() { r.Body = io.NopCloser(bytes.NewBuffer(buf))\
  \ }()\n    \n    // ... subsequent logic finds correct service account and secret ...\n  \
  \  // ... verification happens later ...\n}\n```\nThe `io.ReadAll` call happens before the\
  \ signature verification loop.\n\n## Impact\n- **Service Availability:** An attacker can crash\
  \ the Argo Server, disrupting workflow execution and API access for all users.\n\n## PoC (Conceptual)\n\
  1.  Target the webhook endpoint: `POST /api/v1/events/some-namespace`\n2.  Send a `Content-Length:\
  \ 1000000000` (1GB) header.\n3.  Stream 1GB of random data.\n4.  Monitor server memory usage.\
  \ It will spike until 1GB is allocated or the process crashes.\n\n## Recommendation\n1.  **Limit\
  \ Body Size:** Enforce a strict limit on webhook body size (e.g., 10MB) using `http.MaxBytesReader`.\n\
  2.  **Streaming Verification:** If possible, verify the signature in a streaming fashion or\
  \ use a temporary file for large payloads (though typically webhooks are small)."
