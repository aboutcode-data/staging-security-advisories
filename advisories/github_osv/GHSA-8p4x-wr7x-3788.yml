summary: "python-liquid: Absolute paths escape filesystem loader search path\n### Impact\nThe\
  \ built-in `FileSystemLoader` and `CachingFileSystemLoader` do not guard against reading files\
  \ outside their search paths when given an absolute path to resolve. This allows malicious\
  \ template authors to load and render arbitrary files via the `{% include %}` and `{% render\
  \ %}` tags. Targeted files would need to contain valid Liquid markup and be readable by the\
  \ application process.\n\n### Patches\nThe issue is fixed in version 2.2.0 with the inclusion\
  \ of a `template_path.is_absolute()` condition in `liquid/builtin/loaders/file_system_loader.py`.\n\
  \n```python\n        if os.path.pardir in template_path.parts or template_path.is_absolute():\n\
  \            raise TemplateNotFoundError(template_name)\n```\n\n### Workarounds\n\nCreate\
  \ a custom template loader by inheriting from `FileSystemLoader` and overriding `resolve_path()`.\
  \ Use an instance of the custom loader as the `loader` argument when instantiating your Liquid\
  \ environment. \n\n```python\nimport os\nfrom pathlib import Path\n\nfrom liquid import Environment\n\
  from liquid import FileSystemLoader\nfrom liquid.exceptions import TemplateNotFoundError\n\
  \n\nclass MyFileSystemLoader(FileSystemLoader):\n    def resolve_path(self, template_name:\
  \ str) -> Path:\n        template_path = Path(template_name)\n\n        if self.ext and not\
  \ template_path.suffix:\n            template_path = template_path.with_suffix(self.ext)\n\
  \n        if os.path.pardir in template_path.parts or template_path.is_absolute():\n     \
  \       raise TemplateNotFoundError(template_name)\n\n        for path in self.search_path:\n\
  \            source_path = path.joinpath(template_path)\n            if not source_path.exists():\n\
  \                continue\n            return source_path\n\n        raise TemplateNotFoundError(template_name)\n\
  \n\nenv = Environment(loader=MyFileSystemLoader(\"path/to/templates/\"))\n```"
