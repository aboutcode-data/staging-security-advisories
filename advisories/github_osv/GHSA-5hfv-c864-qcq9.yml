summary: "CI4MS has a Deactivated User Session Bypass (active=0)\n### Summary\nThe auth filter\
  \ has the deactivated/banned user check commented out. \n\n### Details\nCodeIgniter Shield's\
  \ `loggedIn()` re-checks the `status` field (catching `status='banned'`), but does **not**\
  \ re-check the `active` field for existing sessions. When an admin deactivates a user (`active=0`)\
  \ after they have already logged in:\n- Their session cookie remains valid\n- `auth()->loggedIn()`\
  \ still returns `true`\n- The commented-out code is the only mechanism that would have checked\
  \ `!$user->active`\n\n### Evidence\n<img width=\"981\" height=\"654\" alt=\"image\" src=\"\
  https://github.com/user-attachments/assets/6f75d144-5bcf-4a3f-bc35-bb0715c3ed05\" />\n\n\n\
  ### Impact\n- User deactivation does NOT immediately revoke backend access\n- Deactivated\
  \ user retains full access until session expires (default: 7200s)\n\n### Additional note\n\
  The commented-out block appears to be a deferred placeholder — it was written but disabled\
  \ from the very first commit that introduced the filter, and has never been active. The later\
  \ addition of SessionTracker (v0.31.4.0) suggests the dev was aware of the session revocation\
  \ gap, but account-level deactivation (users.active = 0) remains unenforced. Could you verify\
  \ if this is intentionally pending or simply forgotten and not documented?."
