summary: "Diesel: Command injection in Diesel's implementation of `COPY FROM`/`COPY TO`\nDiesel\
  \ allows users to configure various options for PostgreSQL's `COPY FROM` and `COPY TO` statements.\
  \ These configurations are partially provided as strings or characters. \n\nDiesel did not\
  \ check if any these user-provided options contain a quote character `'`, which can lead to\
  \ the injection of additional options in the current `COPY FROM`/`COPY TO` statement. \n\n\
  This vulnerability affects any user of `COPY FROM`/`COPY TO` that passes user-provided input\
  \ to any of the affected functions. It can result in modifications of options in the current\
  \ statement, but it is not possible inject additional statements.\n\n## Mitigation\n\nThe\
  \ preferred mitigation to the outlined problem is to update to Diesel version 2.3.8 or newer,\
  \ which includes fixes for the problem.\n\n## Resolution\n\nDiesel now correctly escapes any\
  \ quotes contained in the provided arguments."
