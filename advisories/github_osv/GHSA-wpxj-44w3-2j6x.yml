summary: "Nautobot: REST API permits creation of GenericForeignKey references to objects that\
  \ the user should not be able to reference\n### Impact\n\nIn the case of inter-object references\
  \ via `GenericForeignKey` (a pattern allowing an object to reference another object that may\
  \ belong to one of several different \"content types\" or database tables), when creating\
  \ or updating an object containing a `GenericForeignKey`, Nautobot's REST API failed to enforce\
  \ user \"view\" permissions when determining whether a given reference to another object would\
  \ be valid. \n\nAs a concrete example, a user:\n\n- who has permission to create or update\
  \ `ImageAttachment` records\n- but who lacks permission to view (some or all) `Device` records\n\
  - _but who knows (via some other mechanism) the UUID of a specific `Device` that they do not\
  \ otherwise have access to_\n\ncould create via the REST API an `ImageAttachment` linked to\
  \ that specific `Device`.\n\nOther models that use `GenericForeignKey` and may be writable\
  \ via the REST API, and hence have a similar vulnerability to `ImageAttachment`, may include:\n\
  \n- `ApprovalWorkflow`\n- `Cable`\n- `ConfigContext`\n- `ContactAssociation`\n- `DataCompliance`\n\
  - `Device`\n- `ExportTemplate`\n- `GraphQLQuery`\n- `Note`\n- `ObjectMetadata`\n- `RelationshipAssociation`\n\
  - `StaticGroupAssociation`\n- `VirtualMachine`\n\nAdditionally, any Nautobot Apps that provide\
  \ models with a REST API and use GenericForeignKey may have a similar vulnerability for their\
  \ models.\n\n### Patches\n\nA general-purpose fix has been implemented in Nautobot 2.4.33\
  \ and 3.1.2, which ensures correct application of \"view\" permissions when creating or modifying\
  \ object references via `GenericForeignKey` throughout the REST API. Individual models/views/serializers\
  \ generally will not require any specific code changes to benefit from this fix.\n\n### Workarounds\n\
  \nNo known workarounds at this time.\n\n### References\n\n- 2.4.33 (<a href=\"https://github.com/nautobot/nautobot/commit/9918bdb9bcf1eb42cda72c344f420a64ef7665f1\"\
  >patch</a>)\n- 3.1.2 (<a href=\"https://github.com/nautobot/nautobot/commit/36cde7148a207234de6212ec074f321dbc9d1b5b\"\
  >patch</a>)"
