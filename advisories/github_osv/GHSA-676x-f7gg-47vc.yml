summary: "Netty Vulnerable to DNS Cache Poisoning via Missing Bailiwick Checks in CNAME Records\n\
  ### Summary\nNetty's DnsResolveContext fails to validate the origin (bailiwick) of CNAME records\
  \ in DNS responses.\n\n### Details\nIn `io.netty.resolver.dns.DnsResolveContext#buildAliasMap`,\
  \ the resolver processes the ANSWER section of a DNS response and blindly caches all CNAME\
  \ records it finds.\n\nAccording to https://datatracker.ietf.org/doc/html/rfc5452#section-6\
  \ \n\n```\nCare must be taken to only accept\n   data if it is known that the originator is\
  \ authoritative for the\n   QNAME or a parent of the QNAME.\n   One very simple way to achieve\
  \ this is to only accept data if it is\n   part of the domain for which the query was intended.\n\
  ```\n\n### Impact\nDNS Cache Poisoning (Bailiwick Bypass). Any application using Netty's DNS\
  \ resolver is impacted."
