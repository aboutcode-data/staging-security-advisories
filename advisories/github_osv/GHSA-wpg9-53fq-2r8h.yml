  - CVE-2026-42334
summary: "Mongoose's Improper Sanitization of $nor in sanitizeFilter May Allow NoSQL Injection\n\
  ### Impact\n\nThis vulnerability allows bypassing Mongoose’s sanitizeFilter query sanitization\
  \ mechanism via the `$nor` operator.\n\nWhen sanitizeFilter is enabled, Mongoose wraps query\
  \ operators in `$eq` to neutralize them. However, prior to the fix, `$nor` was not included\
  \ in the set of logical operators that are recursively sanitized. Because `$nor` accepts an\
  \ array (like `$and` and `$or`), and arrays do not trigger `hasDollarKeys()`, malicious operators\
  \ such as `$ne`, `$gt`, or `$regex` could be injected inside a `$nor` clause without being\
  \ sanitized.\n\nThis may lead to:\n\n- Authentication bypass\n- Unauthorized data access\n\
  - Data exfiltration\n\n**Affected users:**\n\nApplications that:\n\n- Explicitly enable sanitizeFilter\n\
  - Pass unsanitized user-controlled input directly into query methods (e.g., `Model.findOne(req.body)`)\
  \ and rely on `sanitizeFilter` to strip out query selectors\n\nApplications that validate\
  \ input schemas, whitelist fields, or avoid passing raw request bodies into queries are not\
  \ affected. For example, `Model.findOne({ user: req.body.user, pwd: req.body.pwd })` is not\
  \ affected.\n\n### Patches\n\nPatches have been released for all supported Mongoose release\
  \ lines:\n\n- `^6.13.9`\n- `^7.8.9`\n- `^8.22.1`\n- `^9.1.6`   \n\n### Workarounds\n\nDelete\
  \ `$nor` keys, use an additional schema validation library, or write middleware to strip out\
  \ `$nor` from query filters.\n\n### Resources\n\nsanitizeFilter documentation: https://mongoosejs.com/docs/api/mongoose.html#Mongoose.prototype.sanitizeFilter()\n\
  \nOriginal blog post on sanitizeFilter: https://thecodebarbarian.com/whats-new-in-mongoose-6-sanitizefilter.html"
