summary: "malla: Stored XSS via Meshtastic node names in multiple frontend pages\nNode names\
  \ (long_name, short_name) received via MQTT are stored in SQLite without sanitization and\
  \ rendered into the DOM without escaping.\nAny participant on a public Meshtastic MQTT broker\
  \ can set a malicious node name that executes JavaScript in the browser of every Malla dashboard\
  \ visitor.\n\nAffected files:\n\n - src/malla/templates/traceroute_graph.html (line ~832)\n\
  \ - src/malla/templates/map.html (lines ~945, 1078)\n - src/malla/templates/packet_detail.html\
  \ (lines ~1402, 1452)\n - src/malla/static/js/relay_node_analysis.js (line ~124)\n\nSteps\
  \ to reproduce\n\n 1. Publish a Meshtastic NODEINFO_APP packet to any public MQTT broker with\
  \ long_name set to a HTML entity i.e `<img src=x onerror=alert(1)>`\n 2. Wait for malla-capture\
  \ to store it\n 3. Open the dashboard\n\nImpact\n\nAllows unauthenticated remote attackers\
  \ to execute arbitrary JavaScript in the browser, such as: \n\n - Phishing overlays\n - Force\
  \ redirect to malicious websites\n - Injection of arbitrary third-party scripts (no CSP restrictions)\n\
  \ - Browser resource abuse \n - Persistent dashboard denial of service"
