summary: "Umbraco.Cms: Open Redirect Vulnerability in Surface Controllers\n### Impact\nSome\
  \ of the Surface Controllers in the CMS provide to support member related operations fail\
  \ to validate redirect URLs, making Razor templates that derive 'RedirectUrl' from user-controlled\
  \ query parameters vulnerable to malicious redirect attacks.\n\n### Patches\nThe issue is\
  \ resolved in versions 17.4.0 and 13.14.0.\n\n### Workarounds\nIf users cannot upgrade immediately,\
  \ they can mitigate the issue in their own site by ensuring every Razor form that posts to\
  \ `UmbLoginStatusController`, `UmbProfileController` or `UmbRegisterController` passes a concrete,\
  \ trusted `RedirectUrl` into `Html.BeginUmbracoForm's` route values. \n\nFor example:\n\n\
  ```cshtml\n  @using (Html.BeginUmbracoForm<UmbLoginStatusController>(\n      \"HandleLogout\"\
  ,\n      new { RedirectUrl = Model.Url() }))\n  {\n      <button type=\"submit\">Log out</button>\n\
  \  }\n```\n\n### Resources\n\nhttps://github.com/umbraco/Umbraco-CMS/pull/22565\nhttps://github.com/umbraco/Umbraco-CMS/pull/22561"
