summary: "FacturaScripts has Insecure Parameter Handling: Unauthorized Modification of Immutable\
  \ 'nick' Field\n### Summary\nThe application fails to validate the ```nick``` parameter during\
  \ a ```POST``` request to the ```EditUser``` controller. Although the UI prevents editing\
  \ this field, a user can bypass this restriction using a proxy to rename any account (including\
  \ the Administrator). This leads to Broken Access Control and potential Audit Log Corruption.\n\
  \n### Details\nThe vulnerability exists in the user update logic. When a ```POST``` request\
  \ is sent to ```/EditUser```, the backend processes the ```nick``` form-data parameter without\
  \ checking if it matches the original value or if the user has the privilege to change a unique\
  \ identifier that is intended to be immutable.\n\n### PoC\n***1.*** Log in to the dashboard\
  \ as any user  (e.g. admin user).\n\n***2.*** Go to your Profile  by clicking your username/avatar\
  \ in the top right.\n\n***3.*** Open Burp Suite and ensure Intercept is ON.\n\n***5.*** Click\
  \ the Save button in the UI.\n\n***6.*** In Burp Suite, locate  ```nick```  in the body:\n\
  \n<img width=\"1915\" height=\"1013\" alt=\"Screenshot_2026-03-04_05_26_32\" src=\"https://github.com/user-attachments/assets/aea4e6fd-beba-4a47-96da-8b9bd9075681\"\
  \ />\n\n\n***7.*** Change the value admin to Vulnerable (or any other string).\n\n***8.***\
  \ Click Forward in Burp Suite.\n\nThe application will log the user out. It is possible to\
  \ now log back in using the username \"Vulnerable\" and the original password.\n\n### Impact\n\
  An attacker can effectively sabotage the system’s audit trail, performing malicious actions\
  \ and then renaming their account to evade detection or frame other users. This breakdown\
  \ in accountability facilitates identity impersonation and risks data corruption, as internal\
  \ references to the original username become orphaned, undermining the overall integrity of\
  \ the multi-user environment.\n\n### Result\n\n#### Before \n\n<img width=\"1920\" height=\"\
  996\" alt=\"Screenshot_2026-03-04_05_25_30\" src=\"https://github.com/user-attachments/assets/3b2d34e5-a2b9-4da9-9a56-963fe1a8fd65\"\
  \ />\n\n#### After\n\n<img width=\"1920\" height=\"955\" alt=\"Screenshot_2026-03-04_05_27_00\"\
  \ src=\"https://github.com/user-attachments/assets/af1de0ef-2b55-4d29-9557-29ee26a3775a\"\
  \ />"
