summary: "Gryph Agents Payload Filter Fails to Strip Tool Payload for Sensitive Content\nGryph\
  \ implements logging levels that determine what content is logged to a local sqlite database.\
  \ The README incorrectly mentions that the default log level is minimal while it is standard.\
  \  Source code review shows sensitive `file-write` content remains in the stored `payload`\
  \ as `ContentPreview`, `OldString`, or `NewString` at the default `standard` logging level\
  \ and at `full`. This leads to logging of potentially sensitive file content in the local\
  \ sqlite database, violating Gryphs sensitive file filter and log level contracts. \n\n###\
  \ Impact\n\nPotentially sensitive data accessed or written by coding agents may be logged\
  \ to local sqlite database. Users of Gryph are affected ONLY if their local sqlite database\
  \ is stolen or exported to remote system with the assumption that no sensitive data is logged.\n\
  \n### Patches\n\nFixed in v0.7.0"
