summary: "Automad has Broken Access Control: Unauthenticated exposure of administrator bcrypt\
  \ password hashes and TOTP secrets via public API endpoint\n### Summary\n\n A Broken Access\
  \ Control vulnerability allows an unauthenticated attacker to retrieve the bcrypt password\
  \ hash of every administrator account with a single POST request. The `/_api/user-collection/create-first-user`\
  \ setup endpoint remains publicly accessible once initial configuration is complete and returns\
  \ full serialized user data in the JSON response body.  \n\n### Details\n\nAffected version:\
  \ \n - bcrypt hash exposure: `>= 2.0.0-alpha.1, <= 2.0.0-beta.27`\n - TOTP secret exposure:\
  \ only `2.0.0-beta.27`\n\n### Impact\n\nAny Automad installation reachable over HTTP is at\
  \ risk no prior account, credentials, or special network position are required to exploit\
  \ this vulnerability.\n\nPotential impacts include:\n\n- **Credential hash exposure enabling\
  \ offline brute-force or dictionary attacks:** \n  bcrypt password hashes for every administrator\
  \ are returned in a single unauthenticated response. While hashes are not plaintext passwords,\
  \ the salt embedded in the hash is not secret it is visible in the response. Administrators\
  \ using common or weak passwords are at direct risk of having their plaintext password recovered.\n\
  - **TOTP secret exposure:** \n  The TOTP secret is included in the response starting with\
  \ version `2.0.0-beta.27`, the first release introducing TOTP-based two-factor authentication.\
  \ If an attacker successfully recovers a plaintext password, two-factor authentication can\
  \ be bypassed entirely. *Only version `2.0.0-beta.27` is affected by this specific issue.*\
  \  \n- **Information disclosure:** \n  The response discloses the absolute filesystem path\
  \ to the configuration directory. While the directory structure is publicly documented, the\
  \ absolute server path may expose environment-specific information.\n\n## Remediation\n\n\
  Update to version 2.0.0-beta.28 or later.\n\nThis issue was reported privately and fixed prior\
  \ to public disclosure."
