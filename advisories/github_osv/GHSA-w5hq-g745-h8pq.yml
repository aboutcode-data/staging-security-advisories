summary: "uuid: Missing buffer bounds check in v3/v5/v6 when buf is provided\n### Summary\n\n\
  The `v3()`, `v5()`, and `v6()` [API methods](https://github.com/uuidjs/uuid#api-summary) (not\
  \ `uuid` release versions) accept external output buffers but do not reject out-of-range writes\
  \ (small `buf` or large `offset`).  \nBy contrast, `v4()`, `v1()`, and `v7()` API methods\
  \ explicitly throw `RangeError` on invalid bounds.\n\nThis inconsistency allows **silent partial\
  \ writes** into caller-provided buffers.\n\n\n### Affected code\n\n- `src/v35.ts` (`v3()`/`v5()`\
  \ path) writes `buf[offset + i]` without bounds validation.\n- `src/v6.ts` writes `buf[offset\
  \ + i]` without bounds validation.\n\n### Reproducible PoC\n\n```bash\ncd /home/StrawHat/uuid\n\
  npm ci\nnpm run build\n\nnode --input-type=module -e \"\nimport {v4,v5,v6} from './dist-node/index.js';\n\
  const ns='6ba7b810-9dad-11d1-80b4-00c04fd430c8';\nfor (const [name,fn] of [\n  ['v4()',()=>v4({},new\
  \ Uint8Array(8),4)],\n  ['v5()',()=>v5('x',ns,new Uint8Array(8),4)],\n  ['v6()',()=>v6({},new\
  \ Uint8Array(8),4)],\n]) {\n  try { fn(); console.log(name,'NO_THROW'); }\n  catch(e){ console.log(name,'THREW',e.name);\
  \ }\n}\"\n```\n\nObserved:\n\n- `v4() THREW RangeError`\n- `v5() NO_THROW`\n- `v6() NO_THROW`\n\
  \nExample partial overwrite evidence captured during audit:\n\n```text\nsame true buf [\n\
  \  170, 170, 170, 170,\n   75, 224, 100,  63\n]\nv6 [\n  187, 187, 187, 187,\n   31,  19,\
  \ 185,  64\n]\n```\n\n### Security impact\n\n- **Primary**: integrity/robustness issue (silent\
  \ partial output).\n- If an application assumes full UUID writes into preallocated buffers,\
  \ this can produce malformed/truncated/partially stale identifiers without error.\n- In systems\
  \ where caller-controlled offsets/buffer sizes are exposed indirectly, this may become a security-relevant\
  \ logic flaw.\n\n### Suggested fix\n\nAdd the same guard used by `v4()`/`v1()`/`v7()`:\n\n\
  ```ts\nif (offset < 0 || offset + 16 > buf.length) {\n  throw new RangeError(`UUID byte range\
  \ ${offset}:${offset + 15} is out of buffer bounds`);\n}\n```\n\nApply to:\n\n- `src/v35.ts`\
  \ (covers `v3()` and `v5()`)\n- `src/v6.ts`"
