  \ | >= 8.0.0, <= 8.0.26 | 8.0.27\n[Microsoft.AspNetCore.App.Runtime.linux-musl-x64](https://www.nuget.org/packages/Microsoft.AspNetCore.App.Runtime.linux-musl-x64)\
  \     | >= 8.0.0, <= 8.0.26 | 8.0.27\n[Microsoft.AspNetCore.App.Runtime.linux-x64](https://www.nuget.org/packages/Microsoft.AspNetCore.App.Runtime.linux-x64)\
  \               | >= 8.0.0, <= 8.0.26 | 8.0.27\n[Microsoft.AspNetCore.App.Runtime.osx-arm64](https://www.nuget.org/packages/Microsoft.AspNetCore.App.Runtime.osx-arm64)\
  \               | >= 8.0.0, <= 8.0.26 | 8.0.27\n[Microsoft.AspNetCore.App.Runtime.osx-x64](https://www.nuget.org/packages/Microsoft.AspNetCore.App.Runtime.osx-x64)\
  \                   | >= 8.0.0, <= 8.0.26 | 8.0.27\n\n## Advisory FAQ\n\n### <a name=\"how-affected\"\
  ></a>How do I know if I am affected?\n\nIf using a package listed in [affected packages](#affected-packages),\
  \ an application is exposed to the vulnerability.\n\n### <a name=\"how-fix\"></a>How do I\
  \ fix the issue?\n\n1. To fix the issue please install the latest version of .NET 8.0, NET\
  \ 9.0, or .NET 10.0, as appropriate. If developers have installed one or more .NET SDKs through\
  \ Visual Studio, Visual Studio will prompt them to update Visual Studio, which will also update\
  \ the application's .NET  SDKs.\n2. If an application references the vulnerable package, update\
  \ the package reference to the patched version. Developers can list the versions they have\
  \ installed by running the `dotnet --info` command. \n\nOnce developers have installed the\
  \ updated runtime or SDK, they should restart their apps for the update to take effect.\n\n\
  Additionally, if developers have deployed [self-contained applications](https://docs.microsoft.com/dotnet/core/deploying/#self-contained-deployments-scd)\
  \ targeting any of the impacted versions, these applications are also vulnerable and must\
  \ be recompiled and redeployed.\n\n## Other Information\n\n### Reporting Security Issues\n\
  \nIf a potential security issue has been found in a supported version of .NET, please report\
  \ it to the Microsoft Security Response Center (MSRC) via the [MSRC Researcher Portal](https://msrc.microsoft.com/report/vulnerability/new).\
  \ Further information can be found in the MSRC [Report an Issue FAQ](https://www.microsoft.com/msrc/faqs-report-an-issue).\n\
  \nSecurity reports made through MSRC may qualify for the Microsoft .NET Bounty. Details of\
  \ the Microsoft .NET Bounty Program including terms and conditions are at https://aka.ms/corebounty.\n\
  \n### Support\n\nQuestions about this issue can be submitted to the .NET GitHub organization.\
  \ The main repos are located at https://github.com/dotnet/runtime. The Announcements repo\
  \ (https://github.com/dotnet/Announcements) will contain this bulletin as an issue and will\
  \ include a link to a discussion issue. Questions can be submitted through the linked discussion\
  \ issue.\n\n### Disclaimer\n\nThe information provided in this advisory is provided \"as is\"\
