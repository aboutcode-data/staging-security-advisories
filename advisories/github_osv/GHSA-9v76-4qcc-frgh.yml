summary: "Microsoft Security Advisory CVE-2026-42899 – ASP.NET Core Denial of Service Vulnerability\n\
  ## Executive Summary: \n\nMicrosoft is releasing this security advisory to provide information\
  \ about a vulnerability in .NET 8.0, .NET 9.0, and .NET 10.0. This advisory also provides\
  \ guidance on what developers can do to update their applications to remove this vulnerability.\n\
  \nLoop with unreachable exit condition ('infinite loop') in ASP.NET Core allows an unauthorized\
  \ attacker to deny service over a network.\n\n## Announcement\n\nAnnouncement for this issue\
  \ can be found at https://github.com/dotnet/announcements/issues/397\n\n## CVSS Details\n\n\
  - **Version:** 3.1\n- **Severity:** \n- **Score:** 7.5\n- **Vector:** AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:H/E:U/RL:O/RC:C\
  \ \n- **Weakness:** CWE-835: Loop with Unreachable Exit Condition ('Infinite Loop')\n\n##\
  \ Affected Platforms\n\n- **Platforms:** All\n- **Architectures:** All\n\n## <a name=\"affected-packages\"\
  ></a>Affected Packages\nThe vulnerability affects any Microsoft .NET project if it uses any\
  \ of affected package versions listed below\n\n### <a name=\".NET 10\"></a>.NET 10\nPackage\
  \ name | Affected version | Patched version\n------------ | ---------------- | -------------------------\n\
  [Microsoft.AspNetCore.App.Runtime.win-arm](https://www.nuget.org/packages/Microsoft.AspNetCore.App.Runtime.win-arm)\
