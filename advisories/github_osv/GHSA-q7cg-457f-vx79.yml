summary: "joi has an uncaught RangeError on deeply nested input through recursive `link()` schemas\n\
  ### Impact\nDenial of service via untrapped exception in services validating user-supplied\
  \ JSON / object input with recursive link schemas. \n\nThe blast radius depends on how the\
  \ application invokes joi:\n- Highest impact: `validate()` called without `try/catch` in a\
  \ request handler would cause an unhandled exception, potentially crashing the process.\n\
  - Lower impact: `validateAsync()` or `validate()` inside a `try/catch`, the validation fails,\
  \ but the error type is `RangeError` rather than a structured `ValidationError`, complicating\
  \ error handling.\n\n### Patches\nUpgrade to version >= 18.2.1.\n\n### Workarounds\nTry/catch\
  \ the validation to avoid uncaught exceptions.\n\n### Resources\n- Pull request: hapijs/joi#3113"
