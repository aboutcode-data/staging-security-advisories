summary: "Graphite Has a Pickle Deserialization Vulnerability\n### Impact\n**Type of vulnerability:**\
  \ Insecure Deserialization via Python's `pickle` module.\n\n**Who is impacted:**  \nUsers\
  \ of *Graphite graph database engine* versions **before 0.2** who load database files from\
  \ untrusted or third-party sources.  \nAn attacker could craft a malicious database file that\
  \ executes arbitrary code when loaded by the engine. This is possible because the engine used\
  \ `pickle` for serialization, which is known to be unsafe for untrusted data.\n\n### Patches\n\
  The vulnerability has been patched starting from **version 0.2**.  \nAll users should upgrade\
  \ to **version 0.2 or later** (the current version is 0.4 at publishing time).  \nIn version\
  \ 0.2 and above, the engine uses **JSON** instead of `pickle` for database storage, eliminating\
  \ the deserialization risk.\n\n### Workarounds\nIf users cannot upgrade immediately:\n\n1.\
  \ **Do not load database files from untrusted or unknown sources** when using versions <0.2.\n\
  2. **Migrate existing pickle-based databases** to the new JSON format using the provided migration\
  \ module:\n\n```python\nfrom graphite.Migration import convert_pickle_to_json\nconvert_pickle_to_json(\"\
  path/to/old_database.pkl\", \"path/to/new_database.json\")\n```\n\nAfter migration, you can\
  \ safely use the database with version 0.2+.\n\n**Note:** Versions 0.2 and later will show\
  \ a **warning** when attempting to load legacy pickle files, reminding you to migrate them.\
  \ Also, **you can't load pickle files** in 0.2 and later.\n\n### Resources\n- Upgrade to [v0.2\
  \ or newer](https://github.com/mkh-user/graphite/releases)\n- Migration guide: See `graphite.Migration`\
  \ module documentation\n- More on pickle security: [Python docs – pickle security](https://docs.python.org/3/library/pickle.html#module-pickle)"
