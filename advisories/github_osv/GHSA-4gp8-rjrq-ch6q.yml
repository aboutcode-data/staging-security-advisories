summary: "link-preview-js vulnerable to IPv6 and internal loopback attacks\n### Impact\nThe\
  \ library did not check for IPv6 loopback attacks. There was also a DNS attack, where an address\
  \ could be resolved into an internal IP. This could cause internal data leaks.\n\n### Patches\n\
  Problem has been patched in version 4.0.1. However, it cannot be completely solved by the\
  \ package alone. The regex used for validation has been tightened for IPv6 addresses. \n\n\
  The DNS resolving, however, is more difficult. The regex has been tightened to prohibit .internal,\
  \ .local, .nip.io and .sslip.io addresses, however there can be other services not on the\
  \ list, therefore it is imperative that users use the resolveDNSHost option to do DNS resolution\
  \ before fetching content. To that regard a (scary) error message has been added when the\
  \ option is not set.\n\n### Workarounds\nUsers can do their own validation before fetching\
  \ content.\n\nReported by https://github.com/Andrew-most-likely"
