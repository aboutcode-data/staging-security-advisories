summary: "OpenClaw: OpenShell FS bridge reads pin and verify the opened file before returning\
  \ bytes\n## Summary\nOpenShell FS bridge reads pin and verify the opened file before returning\
  \ bytes \n\n## Affected Packages / Versions\n- Package: openclaw (npm)\n- Affected versions:\
  \ <= 2026.4.21\n- Fixed version: 2026.4.22\n\n## Impact\nA time-of-check/time-of-use race\
  \ around OpenShell sandbox filesystem reads could let a symlink swap cause bytes outside the\
  \ intended mount root to be read.\n\n## Fix\nOpenShell reads now open the file with no-follow\
  \ semantics where available, validate the pinned file descriptor against the canonical mount\
  \ root, reject unsafe hardlink/symlink cases, and use a strict fallback ancestor walk on platforms\
  \ without fd-path readback.\n\n## Fix Commit(s)\n- 95119017c847c737bd113f0bff728c4666d79c45\n\
  \n## Verification\n- The fix commit is contained in the public v2026.4.22 tag.\n- openclaw@2026.4.22\
  \ is published on npm and the compiled package contains the fix.\n- Focused regression coverage\
  \ for this path passed before publication.\n\nThanks @VladimirEliTokarev for reporting."
