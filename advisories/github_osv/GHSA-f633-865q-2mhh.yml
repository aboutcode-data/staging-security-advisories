summary: "MantisBT is Vulnerable to Stored XSS in Saved-Filter Owner Column\nIncorrect escaping\
  \ of a saved filter's owner allows an attacker to inject arbitrary HTML on systems where $g_show_user_realname\
  \ = ON.\n\n### Impact\nCross-site scripting (XSS).\n\nNote that By default, only users with\
  \ *Manager* access level or above can save their filters publicly\n\n### Patches\n- 44f490bcf20fd491c1b8f3fc9dd041d8c2a30010\n\
  \n### Workarounds\n- Prevent display of users' real name (set `$g_ show_user_realname = OFF;`\
  \ in configuration)\n- Restrict ability to store filters (set $`g_stored_query_create_threshold`\
  \ / $`g_stored_query_create_shared_threshold` to `NOBODY` \n\n### Credits\nThanks to siunam\
  \ (Tang Cheuk Hei) for discovering and responsibly reporting the issue."
