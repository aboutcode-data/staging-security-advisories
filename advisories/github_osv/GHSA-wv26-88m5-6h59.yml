summary: "External Secrets Operator has Namespace Isolation Bypass in CAProvider ConfigMap Resolution\
  \ for SecretStore\n### Impact\n\nNamespaced SecretStore resources that used CAProvider with\
  \ type `ConfigMap` could resolve CA material from another namespace when `caProvider.namespace`\
  \ was set. \nThis bypassed the namespace boundary enforced for SecretStore-backed references\
  \ in providers that rely on the shared runtime CA resolver. \n\nThe accessible data is used\
  \ as CA validation material, hence it is not directly exposed.\n\nImpact:\n- Direct data exfiltration\
  \ risk: low\n- Existence disclosure: an attacker can infer whether a target ConfigMap/key\
  \ exists in another namespace.\n- Trust-boundary violation: a tenant can make its SecretStore\
  \ consume CA material owned by another namespace."
