summary: "SpiceDB: Caveat structures with nested lists can result in improper cache reuse\n\
  ### Impact\nUsers are impacted if:\n\n- They have a caveat structure with a nested list, e.g.:\n\
  \  \n```zed\n  caveat shape(x list<any>) {\n    x == [[\"a\"], \"b\"]\n  }\n  ```\n- Their\
  \ system exercises that caveat with either [CheckBulkPermission](https://buf.build/authzed/api/docs/main%3Aauthzed.api.v1#authzed.api.v1.PermissionsService.CheckBulkPermissions)\
  \ or else [LookupResources](https://buf.build/authzed/api/docs/main%3Aauthzed.api.v1#authzed.api.v1.PermissionsService.LookupResources)\
  \ running with the `--experimental-lookup-resources-version` flag set to `lr3`, implying they\
  \ are using the experimental version 3 of `LookupResources`\n-  An attacker can cause the\
  \ system to craft a request to SpiceDB where either:\n    1. It's a `CheckBulk` request where\
  \ there are two check items that are identical except for their combined caveat context, and\
  \ one of the caveat contexts evaluates positively and the other evaluates negatively\n   \
  \ 2. It's a `LookupResources` request where two resources have the same evaluation contents\
  \ except for their caveat context, and one would evaluate positively and the other would evaluate\
  \ negatively\n\nIf all of the above are true, it would be possible for SpiceDB to erroneously\
  \ return that a user has access to a resource that they do not have access to.\n\n### Patches\n\
  This problem was addressed in https://github.com/authzed/spicedb/pull/3065 and released in\
  \ version v1.52.0.\n\n### Workarounds\nIf using v3 of `LookupResources`, turn the flag off.\n\
  \nIf possible, refactor the `caveat` declaration structure so that it does not operate on\
  \ a list of lists, but rather any other composite structure."
