summary: "AWS Advanced Go Wrapper has Privilege Escalation in Aurora PostgreSQL instance\nAurora\
  \ PostgreSQL is a fully managed relational database engine that's compatible with PostgreSQL.\n\
  \nAn issue in Aurora PostgreSQL using the AWS Go Wrapper waa identified, see CVE-2026-11401.\n\
  \n\nImpact\nAn issue in AWS Wrappers for Amazon Aurora PostgreSQL may allow for privilege\
  \ escalation to rds_superuser role. A low privilege authenticated user can create a crafted\
  \ function that could be executed with permissions of other Amazon Relational Database Service\
  \ (RDS) users.\n\nImpacted versions: AWS Go Wrapper 2026-04-06\n\nPatches\nThis issue has\
  \ been addressed in  AWS Go Wrapper 2026-05-26. Maintainers recommend upgrading to the latest\
  \ version and ensuring any forked or derivative code is patched to incorporate the new fixes.\
  \ \n\nWorkarounds\nRemove the public schema from the search path.\n\nReferences\nIf there\
  \ are any questions or comments about this advisory, contact [AWS/Amazon] Security via the\
  \ [vulnerability reporting page](https://aws.amazon.com/security/vulnerability-reporting)\
  \ or directly via email to [aws-security@amazon.com](mailto:aws-security@amazon.com). Please\
  \ do not create a public GitHub issue."
