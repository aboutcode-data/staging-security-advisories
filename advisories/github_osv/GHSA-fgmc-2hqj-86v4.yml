summary: "Vantage6: Set admin user and password from environment or configuration\n### Impact\n\
  Vantage6 currently provides an initial user with username `root` and password `root`. This\
  \ is not ideal for the following reasons:\n- Attackers know that almost all vantage6 servers\
  \ have a user with username `root` that probably has admin rights\n- The initial password\
  \ is very weak and it is possible that administrators forget to reset it.\n\n### Patches\n\
  No\n\n### Workarounds\nIt is possible to delete the `root` user after it has been used to\
  \ create other users\n\n### References\nWe could consider doing this like [mongodb](https://hub.docker.com/_/mongo)\n\
  \n### Additional info\n\nLuis uses the following patch to mitigate it:\n```diff\ndiff --git\
  \ a/vantage6-server/vantage6/server/__init__.py b/vantage6-server/vantage6/server/__init__.py\n\
  index ea362c1e..c6dcbbd9 100644\n--- a/vantage6-server/vantage6/server/__init__.py\n+++ b/vantage6-server/vantage6/server/__init__.py\n\
  @@ -618,18 +618,30 @@ class ServerApp:\n             # TODO use constant instead of 'Root'\
  \ literal\n             root = db.Role.get_by_name(\"Root\")\n \n-            log.warn(\n\
  -                f\"Creating root user: \"\n-                f\"username={SUPER_USER_INFO['username']},\
  \ \"\n-                f\"password={SUPER_USER_INFO['password']}\"\n-            )\n+    \
  \        # Temporary patch\n+            # read initial root password from file (docker secret)\
  \ if provided\n+            # TODO: This is a workaround so we don't have an insecure vserver\n\
  +            #       at the start. Ideally, we would provide an already hashed\n+        \
  \    #       password. But as hashing is implemented via @validates on\n+            #   \
  \    the field 'password', there isn't a nice way around this.\n+            if os.environ.get(\"\
  V6_INITIAL_ROOT_PASSWORD_FILE\"):\n+                with open(\n+                    os.environ.get(\"\
  V6_INITIAL_ROOT_PASSWORD_FILE\")\n+                ) as password_file:\n+                \
  \    initial_root_password = password_file.read().strip()\n+                log.info(\n+ \
  \                   f\"Creating root user with password provided via V6_INITIAL_ROOT_PASSWORD_FILE\"\
  \n+                )\n+            else:\n+                initial_root_password = SUPER_USER_INFO[\"\
  password\"]\n+                log.warn(f\"Creating root user with default credentials!\")\n\
  \ \n             user = db.User(\n                 username=SUPER_USER_INFO[\"username\"],\n\
  \                 roles=[root],\n                 organization=org,\n                 email=\"\
  root@domain.ext\",\n-                password=SUPER_USER_INFO[\"password\"],\n+          \
  \      password=initial_root_password,\n                 failed_login_attempts=0,\n      \
  \           last_login_attempt=None,\n             )\n```"
