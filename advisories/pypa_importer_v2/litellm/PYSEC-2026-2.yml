summary: "Two litellm versions published containing credential harvesting malware\nAfter an\
  \ API Token exposure from an exploited Trivy dependency,\ntwo new releases of `litellm` were\
  \ uploaded to PyPI containing automatically activated malware,\nharvesting sensitive credentials\
  \ and files, and exfiltrating to a remote API.\n\nThe malicious code runs during importing\
  \ any module from the package and scans\nthe file system and environment variables, collecting\
  \ all kinds of\nsensitive data, including but not limited to private SSH keys, credentials\
  \ to Git and\nDocker repositories, dotenv files, tokens to Kubernetes service accounts,\n\
  databases and LDAP configuration. Also exfiltrated are multiple shell history\nfiles and cryptowallet\
  \ keys. The malware actively attempts to obtain cloud access tokens\nfrom metadata servers\
  \ and retrieve secrets stored in AWS Secrets Manager.\nAll collected data are sent to the\
  \ domain models.litellm[.]cloud\n\nFurthermore, the code includes a persistence mechanism\
  \ by configuring\na SystemD service unit masqueraded as \"System Telemetry Service\" on the\
  \ host it\nruns on, and in a Kubernetes environment also by creating a new pod.\nThe persistence\
  \ script then contacts hxxps://checkmarx[.]zone/raw for\nfurther instructions.\n\nAnyone who\
  \ has installed and run the project should assume\nany credentials available to litellm environment\
  \ may have been exposed,\nand revoke/rotate them accordingly. The affected environment should\
  \ be\nisolated and carefully reviewed against any unexpected modifications \nand network traffic."
