summary: (CWE-400) Fixed an issue where the login endpoint was vulnerable to denial of service
  attacks via mass parallel requests. The server could crash and restart when receiving 100+
  parallel login requests through HTTP/2 single packet attacks (e.g., via Burp Suite). The endpoint
  now enforces rate limiting of 5 requests per second with a burst of 10 requests. Thanks to
  Axel Larsson & Jakob Ristner for contributing to this improvement under the Mattermost responsible
  disclosure policy.
